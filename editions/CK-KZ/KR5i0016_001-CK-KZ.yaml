front:
  text: 太上洞玄靈寶紫微金格高上玉皇本行集經闡微萬天至尊金闕玉皇上帝勅命曰於戲天道無親惟佑善人人道貴華必隆賜予古今不爽於茲爲烈况以大勳旣集世道攸關吾典垂成人心有賴太平之兆行見有基國家之興由茲綿遠天淸地甯人和三才建極儒典玄宗佛教三門同興仗玅典以爲之樞箋釋有道幸眞法旣已觀成剞劂莫遲庶幾早回人心速移世道有志者得遂靑雲無緣者亦通懴悔朕心早慰諸天於是咸安道法重新萬地因而共泰非同小可莫辭煩勞此日加意小心奉命惟謹他時施恩破格受福無窮今特命吾殿前天猷大元帥佑聖眞君前來奉勅示諭好生加意小心謄錄成帙陸續可付刋刻朕准爾等下方有好善矢誠之士幫助凡矢志幫助速完刻本之人准其功名卽速成就後福漸次增加爾等無妨以此大緣勸諭善人共成天事共受天福流行之處一方俱准免瘟㾮受持之士卽速免其本身災星臨照惡病不纏一家福惠一人受持一家免難一家受持一方免難在位之人受持俱令其所治之地若一方若一國若天下若四海皆得刀兵永息瘟㾮永免太平百年受持之人不惟一身受福准將來度上南宫受鍊進位天階勅命一下天上地下神員勿得違慢若有疑惑不信謗毁經文並疑惑爾等侍演執筆之事其人卽刻身體困倦惡病纏染若有疑惑加意謗毁並攺眞本以從俗本者著令雷部嚴察先斬後奏爾壇中人俱宜加意小心勸戒惟謹其有不信是經者爾等不必與之爭論但須拭目俟之看其受災受報又此經所在之處著令雷吏護衞是經是人一切惡魔不得侵近有違之者朕命所至化爲飛塵永無超生又或儒宗士子執其偏見慢易是經俱准神員令其功名滯塞永無上達衣食坎坷窮困終生子孫無發達之期死後有考掠之咎隨其生平作爲超生受報又或玄宗只信俗本不信眞本其罪更宜嚴重此爲明知故犯理所不容又或禪宗疑惑不信是經者俱准打入魔道永失正覺又或謗毁是經者其罪與十惡不善者同科其罪不通懴悔天律不赦如或有人戲侮吾像其罪尙可懴悔赦除若戲侮此經及戲侮傳經傳法之人其罪猶如戲侮謗毁吾金闕至尊眞身永無解免之條再無懴悔之路又此不信之人非是與經爲難實是與朕爲難所在一切神祗嚴肅治之不必奏聞此等罪報祇須年終彙奏可也凡爲朕之人民者宜自愛而勿蹈此罪焉欽哉
