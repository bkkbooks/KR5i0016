太微仰注我身腎府鮮開安鎭靈宅萬神總歸身生羽服舉形自飛北方洞陰朔單鬱絕五靈玄老黑帝三元符命上王適月命天仙戊己多力士辟水源三命正戊入力人任曰遣惠無爲君適百百九君有臣三千此度己身右玉皇誥命以錫北方洞陰朔單鬱絕五靈玄老黑帝五炁天君令統御北方諸天諸地日月星宿名山靈洞水府泉宫上聖高尊眞仙聖眾一切威靈符命所臨如誥奉行帝誥御世章第二十六天師張眞人曰太上大光明圓滿大神咒皆上帝之誥命也誥命到處星辰順度神祇安甯魔鬼潛踪水旱不作災疾不干天淸地甯國泰民安此皆天地自然之正氣所結絢爲雲篆結爲赤字序爲眞文合爲玉篇集爲赤書表其感應不爽轉移最神應時如心符合天地之機大道之運則曰大神咒此神咒玉字皆一元赤炁所結非臆説也有人伐木中有楷書天皇太平四字其體獨堅不受斧刃觀者異之以此知天地秀靈之氣何所不有陰陽造化之妙何處非奇是故天文絢爛則如星雲地文璀璨則如流峙人文光華則如詩書况赤炁生成天地其精神煥發更必有萬倍神奇者不能絢而成文乎夫人民何自而生聖賢何自而成不知自己之玄根安能知天地之玄根不知自己之赤炁安能知天地之赤炁且自己不能有大光明圓滿之願安能知天地大光明圓滿之大神咒天降殊恩妙法流行校正經文諸天詮解普福一世利益後人請勿詫異篤信受持以完全自己之赤炁玄根斯不負上帝所錫之大光明圓滿大神咒天地有心民物生成聖人有願世道太平經功圓滿大道流行眞言在處帝放光明箋釋藥師瑠璃光王世尊曰天下有四聖教有三萬理以定萬國所瞻各有志願明説一番示爾眾生信吾法門四大部洲統於一元三家聖賢學者宜遵教雖分門共此根源聖同此心滿願誰論願在安懷儒者本根願在救度佛子本原菩提慈心超絕語言玉皇上帝我佛世尊玄綱總握運御乾坤三教之主下定崑崙治四天下億載無更慈心廣大億兆生生靈哉帝子治世太平梵炁融結梵唄音聲梵天宗仰梵典流行梵王功大拜上瑤京口誦靈章逸韻誰賡摩訶般若吽泮分明集大神咒圓滿吾心藥乂神將護持功深瑠璃光中帝鑒慈忱同心救度災劫不侵吾有眞言帝有玅音舌根圓滿教化至今三教經書莫非神咒萬理歸源不遺不漏本行集經超乎宇宙包盡文章團結靈秀一切語言誰出其右順星治魔留淸去垢諷誦眞言人天護佑諸天詮解經旨獨透我降靈壇不先不後賜以箋釋禪關誰扣毘盧家風依然靈鷲神咒流行帝光依舊我是藥師琉璃光王觀照世間同帝恩光一十七種十二大願交朗互發無虧無欠稽首皈依莫尤莫怨成仙成佛總要大緣諷誦神咒福惠自天今日吉慶又啟法筵聖賢仙佛感應百千觀音勢至文殊普賢先天凖提定慧光圓各抒玅解各示眞傳神咒圓滿世界三千讀是經者吾爲摩頂受記不遷必來指引一切咸聽凡夫短景速證速修大羅天境吾願如是爾誠必秉敬奉帝書夙夜凛凛詮經説法醒乎不醒留示後人當躬深省正陽帝君曰佛門立教重威音音宜梵唄意思深眞傳普作眞言誦神玅秘於神咒吟圓滿帝光開至教宣揚赤炁正天心毘盧秘旨藥師授五老傳來度古今觀音世尊曰從聞思修義理深聞處分明有道臨舌吐靑蓮傳佛法潮平素月見天心輪王日日宣神咒帝座明明說梵音經傳五老觀音釋大悲心契無絃琴文昌帝君曰願心圓滿何須咒功不圓兮咒必眞尊勝楞嚴徵佛力靈書赤字頌皇仁聲音顯處光明現效驗靈時梵唄神三教從來歸一理詩書誦讀道歸身孚佑帝君曰眞言也放大光明圓滿皇心處處行一十七般皆秘咒百千萬世坐瑤京有聲不似無聲好無效都由有妄生五老眞傳傳世上木金水火永無傾斗母天尊頌曰金石琳琅宣揚帝光保持劫運圓滿瓊章道言是大神咒者元始之妙言玉皇之眞誥上淸自然之靈書九天始生之玄札空洞之靈章上聖之秘語玉宸之尊典成天立地開張萬眞安神鎭靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祇嘯命河源運役陰陽召神使仙此至眞之玅文神應自然致天高澄令地固安保鎭五嶽萬品存焉咒力圓滿章第二十七天師張眞人曰至哉神咒大哉咒力奇矣玅矣敻乎絕矣無以復加矣詮經者至此安能再贊一辭惟當冺厥言論無思無慮默會元始立説之心神遊天地未根日月未光之際安固本根可也又安敢浪費紙墨徒供後人覆瓿之用災梨禍棗徒供後人謗議之資然旣説到此處旣無説亦當勉强立説雖有説亦仍如無説這般大道到底教吾從何處説起雖曰詮經半部於此大道尙只説著三分讀經者至此試觀説經之聖於此大道不得已尊爲神咒又解之曰此元始之玅言玉皇之眞誥上淸自然之靈書乃復又明之曰九天始生之玄札空洞之靈章上聖之秘語玉宸之尊典不嫌言重語複亦爲於此大道無窮無盡無可執捉渾渾淪淪無可攀援至神至玅無可贊美挂一旣恐漏萬分疏不勝繁多由是可知道之爲道矣由是可知道之神力矣吾於此章勉强分玉宸之尊典以上數句爲表揚神咒成天立地以下數句爲表揚神咒之力上制天機以下數句爲表揚神咒之圓滿以下總讚之拘牽文義不可説道天語渾淪略指其要赤文玉字帝道愈光功圓行滿力量無疆箋釋九天應元雷祖天尊曰天尊憫世下降宏文文本赤炁縹緲氤氲輝煌絢爛結篆成雲迴環字勢團結縈紋集字成書是播靈圖有用則靈力量有餘上中下際三才同居保劫禦災處處甯諸是大神咒秘在帝都有得之者處處安居度人無量功德深醕綿彼皇祚享億萬春太平立見生成兆民丹室有此丹道通神爲民福主爲帝名臣神力獨運本量無垠鬼精破膽聖道彌眞天機秘密制御淸甯五方之神安固其形地祗紛紛呵護莫停山林永鎭河海淵渟陰陽太和仙聖效靈萬有萬安咸會帝庭靈意玄札天地之根靈圖秘語至道之門讀是經者契協乾元神咒流行普掃不祥五氣調和萬範開張天威不測天道咸彰旣全天德佩服天章天功浩大天語煌煌上天恩重瑞啟南天天開文運天啟法筵本行集經解釋成箋雷從地起雷祖在天詮經而下天語雷傳是經神玅受持無遷神咒力量護持無偏雷尊有願保護聖賢得是經者各宜勉焉關聖帝君曰立德立功學聖賢修眞修佛與昇仙全憑自已無窮力卓爾英雄孰敢先赤字玉章皆助道眞文秘語絕言詮敷揚無盡神通廣舉地安人更補天正陽帝君曰舉鼎移山更負舟這般力量不爲優開天闢地憑雙手引聖生仙據上游自此羣生知帝力須教苦海變瀛洲分明神咒神通大何不歸家自已修文昌帝君曰扶得乾坤做得人無虧人道做仙眞仙眞力量無窮盡力量周圓絕垢塵玉字赤書卽我性制天策地卽靈神這般力量眞然少元老法燈五老薪孚佑帝君曰學道何須力量强全無力量配柔剛無爲無作先天體若愚若呆夀命長試看尊經揚玉訣只憑赤炁顯陽光這般力量君須記圓滿之時佐玉皇斗母天尊頌曰神咒力强保制功高處處周圓不缺絲毫玉帝昔授五老上帝是時五帝跪捧其章秘題靈都之館天眞皇人昔書其文掌之於上淸眞境太玄玉都寒靈丹殿紫微上宫累經劫運而其文保固天根無有毁淪與運推遷是大神咒混之不濁禾嵗丿之愈淸毁之不滅滅之極明大有之文天眞所尊自無金名帝圖刻簡來生斯文隱秘不得闚聞有得之子保萬炁長存勤行修奉刻致神仙玅道體相章第二十八天師張眞人曰不圖爲説之至於斯也道本難説而説經教主竟自明明説出種種光彩種種眞實並種種神異居然日月星雲煥文章於碧落山嶽河漢佈境界於坤輿何文不顯何理不明前章已言至矣盡矣不能讚一辭矣乃讀至此章殊覺神志淸虛明見先天之體神思煥發實闚祖炁之根可以上會萬劫以前之萬劫下知萬劫以後之萬劫莫遠於四大部洲舉目若在當前莫微於太末小蟲回觀皆我分内乃知聖賢千經萬典三教正説喻説皆我心中本有者也尙不早思解脫固我天根速讀聖經保此赤炁天恩深重不可辜負自身重大要當愛惜吾卽此一章經文而論之玉帝昔授五老明此玉文赤炁原有主宰之帝必須帝宰降臨而後五帝順治一元密布而後五德歸宗一氣淸甯而後五行發育爲之溯其本原則皆自先天祖炁而來故説於開天首出之元始而傳於太上靈寶之玉宸証以神明天縱之皇人心心印合而猶必秘藏上淸眞境太玄玉都之内寒靈丹殿紫微上宫之中可知明有本原凝會之所並非虛擬其曰保固天根無有毁淪則自天而下之根可知矣與運推遷則其運之長短久暫時刻杪忽可驗矣大哉大有之文莫過於神咒神咒之眞卽所以傳此赤炁混之不濁禾嵗丿之愈淸明其體之眞實也毁之不滅滅之極明明其體之堅剛也合併讀之曰混之不濁禾嵗丿之愈淸毁之不滅滅之極明則體用交輝本源顯露彼凡得此赤炁以爲根者其體段亦當如是可知孰意藐哉一身具此玄微奈何任意戕賊自撥本根况天眞所尊則人不得不重之矣自無金名則萬理萬端萬有萬眞隨取隨擕隨用隨顯不拘一格難定文字卽太上道君所謂吾不知其名强名曰道者也斯文隱秘不得闚聞則闇修秘悟惟有一段天機而非泥乎語言文字亦非假乎言語論説者也果有保萬炁長存者乎則當勤行修奉如是之大神咒吾知天眞皇人薪傳不替毘盧古佛可以受記元始天尊金書立至矣道卽赤文千聖一門三才建立惟是爲根一得永得永不沉淪箋釋北極玄天上帝曰嗟爾眾生原有天根奈何不悟萬劫沉淪天根何在赤炁存存存得此炁保爾千春萬載不息以靈以神爲民福主爲帝大臣天宫尊貴淸淨絕倫自然快樂煩惱無因旣無惡魔亦無凶人賢聖往來左右羣眞雲嗷樂奏逸韻堪聽祥麟鼓舞瑞鳳齊鳴前執絳節後擁霓旌星軿鶴駕玉殿金城佛國無異極樂無邊玄玄玅境在大梵天奈何不悟自惹迍邅墮落無盡迴首何年上天憫世傳示玉篇民𡻕臘日吾降經筵尊經奥玅開闡有仙箋釋經義世有大縁果能尊重如是經文如是神咒修奉更勤吾必默佑衞以慶雲災殃永斷惡劫不臨靑雲路上報爾眞心天宫玅寶隨意而獲舉步安車隨處樂國爾等試思樂好苦好死好生好人好禽好凡好仙好自己心驚速尋好路勤奉眞經如此金言句句神靈况有箋釋開導分明世界眾生俯首咸聽吾卽金闕上帝化身好生救劫來此度人是亦神咒謗者必嗔雷部聽令念佛不神九天應元雷祖天尊曰一聲震動卽回心枉把千經萬典尋到此乃知神咒力從茲不敢一塵侵皈誠向道天根固去濁留淸萬劫存修奉勤行如是法維持護衞有雷尊正陽帝君曰正陽帝果吾修證保得天根萬劫存任爾禾嵗丿汚淸更顯隨人毁滅體難淪尊經修奉得神咒金格流傳顯道門法嗣從今天下出當遵玅旨復乾元文昌帝君曰吾自天香殿上來天香隨我正縈迴闡揚神咒眞機透開導羣生元始偕去濁留淸功已久生明少禾嵗丿福當加瓊林宴上誰居首當代哲人吉士家孚佑帝君曰人世從來不信神分明帝主語言眞旣有天香爲後驗當憑神咒助前因不生不滅禪機透萬炁萬年至道親幸有眞心還赤炁再從七曲覲皇人斗母天尊頌曰至道淵微體相分明帝圖修奉萬載生生洞玄靈寶玉皇功德品第三爾時玉虛上帝白天尊言惟願慈悲願爲四眾帝釋等及四梵天王一切諸天一切諸仙及未來一切眾生持是經人説利益事爾時天尊告玉虛上帝言快哉斯問不亦善乎汝以慈悲愍念眾生故請問於我天尊言曰若有三界十方無量國土及國王大臣或兵戈並起疫氣大行水旱蟲蝗凶災饑饉是其國君后𡚱太子宰輔大臣當發慈悲爲其黎庶遍勅國内州縣鎭宰令諸道流淸淨嚴潔於其觀内設大齋醮六時行道爲轉此經當得國土淸平五穀豐熟黎庶安泰請經保國章第二十九天師張眞人曰天尊憫世上帝度人説此經法傳斯玅道有道乃有經則求道於其經經在則道在故讀經以明道持經以修道從來法不孤起教無往授故我元始天尊玉皇上帝高處天宮晏坐無爲皇皇穆穆巍巍蕩蕩依然天地未根日月未光時氣象雖曰玄機默運濳孚萬方其神明則度人無盡而足跡要未嘗有所偏著力量未嘗有所震動體相未嘗有所滯礙又何假於言説自非有誠心向道進求秘密者專懇之忱迫爲肫切指示則何處又尋大藏法寶來玉虛上帝親與法會見上帝之光聞玉女之香聆上帝之法音於寶盖會下至是又見五老上帝爲眾心切求請經法與聞神咒之力量本原惟恐已入門者或生退悔未入門者難起信心故欲以修奉力指利益功庶乎道不虛行經不虛讀惟時天尊感動爲眾說法於是玉皇功德品著矣夫經以演道道在經求道以救人人惟求經其實經者徑也道之階梯也讀經而不知道經又何爲故凡讀經之士當明經旨何在經語何爲是此經也卽是此道也昔阿難尊者於佛將湼槃時請問結集經文首置何言佛云但置如是我聞四字試思語尙未發如是二字果何所指乎我聞者又何在乎玅哉佛乎可謂善於立言矣非卽指此不能説而又不可不説之道乎非卽指此人人共具一人各足之道乎不然吾門經首所謂道言者此道字將何所指一切道經中所謂轉誦此經者豈在口中喃喃之語乎哉且所謂國土淸平黎民安泰轉禍爲福轉死爲生者豈口中喃喃遂足以致之乎所謂轉之云者運行之謂也所謂此經者卽言語中所指當身中所具之奥玅也然則經可不必轉誦乎非也誦之者求其理也轉之者詣其實也今於請經保國章特明此意以爲讀經者之勸試觀經云十方國土遇災逢劫爲轉此經必云先發慈憫又曰六時行道果何所指耶卽云圓滿大神咒神而且靈所謂圓滿者何在也神而且靈者何在也知吾此説則讀此經得之矣卽讀三教之經亦得之矣不然舍本求末反曰經之言不驗可乎至於眞經保國自然之事不必疑惑箋釋協天大帝關聖帝君曰一部尊經玉皇心印以順氣機以順時令以御乾坤可神感應故誦之者宜昭誠敬悲此眾生舍本求之經言義理不肯修持惟徒口誦爲衣食資建立道場愈滋疑惑託言祈年託言祝國或以禳星或以祛疫聚歛貨財充已私槖假公濟私何嘗有益虛名動眾全無誠心徒延法眾酬經以金福利不得災禍已深不知聖人立説立經總爲度人共樂帝庭災劫不作國土淸甯正道旣興五穀豐登一心皈善樂境必昇示諸眾生度之無量成就保持終超無上善心圓滿秘語如神要知此義讀誦無愆天師慈憫發此言詮經旨大明是爲眞傳吾是漢代關聖帝君德可協天天威共聞保持國土扶助黎民災難我救𡨚抑我伸我還扶助孝子忠臣功在萬世心在億人詮解尊經教訓皆眞不是僞撰信念當純讀是經者我皆降臨保佑到底不負眞心讀是經者凛我法音阿難尊者曰山海慧自在如來一切佛書親手裁可恨世間徒口誦遂令天上共悲哀毘盧又闡釋迦行玅典今傳神咒開説不盡玉皇功德稽首經筵歎善哉正陽帝君曰仙聖當筵欲哄堂一點眞誠動十方解到天機皆爛熳自然法界普馨香從來三教難歸一由此千眞永不忘總在昭昭明明處窮經共見帝輝光文昌帝君曰七曲山中著述多胥疑僞造奈人何不知皆自天經出從此堪平苦海波救劫眞心今道出延年玅道咒非訛聖君賢相同修治如意揮時轉太和孚佑帝君曰孚佑帝君慈願多説經救度又如何眞言秘語傳沙界保國安民絶險波今朝詮解咸歸一後世聽聞自不訛全是天眞靈性發天香鼓動播天和斗母天尊頌曰心誠願滿國泰家甯煌煌天語運轉通靈若復有人入諸山林遇毒惡獸但能存想一念眞經山神衞護猛獸自退終不害己若入江入海採寶求珍値遇惡風如法持念是此眞經風浪頓止安穩達岸若在軍陣戈㦸旣接兩刄相交存心默念是此眞經是諸惡賊悉自退散若在牢獄枷鎻之中淨心定慮存念眞經𡨚枉自伸卽得解脱若爲邪精鬼賊眾苦所加如法持念是此眞經眾邪遠避自然除愈若人爲求嗣息如法尊重持念此經帝勅天曹明檢丹籍九品之内四果仙人運應數合謫降下生爲其作子才辯明慧人中尊貴若婦人臨難之月如法持念是此眞經卽得母子平安生福德男女人所愛敬若爲求官進職爵祿亨達貴遇人君如法持念是此眞經卽得職務遷轉子孫榮遇世世不絕若人欲求資財殷富如法奉持是此眞經卽得財寶充溢衣食自然慶流子孫傳之萬世若人被諸惡星之所照臨困苦床枕如法持念是此眞經是諸惡星返降吉祥若人命過應入地獄注名惡籍父母師長夫妻男女當爲亡人持念眞經或安置道場旛花供養卽得亡者鬼籍盡除神生淨土同苦罪眾咸蒙護度承斯勝利皆生天上濟生度死章第三十天師張眞人曰人生世上何事爲大生死爲大夫生死人之常也生則隨之而生死則隨之而死生有何歡死有何懼但恐生也徒生則生爲虛生死也徒死則死爲浪死斯眞無歡而有懼矣何謂虛生以大道全具之身不能信及自爲戕賊旣不肯忠主孝親廣行慈惠由義居仁動循典則而所行者皆是殘忍詭譎貪饕貨利害眾成家謀人利己之事是舍天地之生氣而取天地之敗氣矣如是之人生爲虛生而猶自鳴得意不知死則浪死而猶望好處託生蓋人以爲浮浪而死消歸烏有故生前任意作孼不知其生也有因其死也有果旣不能勤於修持叅悟大道則還元無日何處出頭背覺合塵全歸情念蓋人有性情道分情想節情乃能復性純想乃能無情故禪家亦謂九情一想則墮落純想無情則大覺純想者念念不斷純眞九情者節節全流愛欲故聖人説經指出種種景象種種境界種種法則無非欲人收此放心消磨情愛斯可守一而還貞留淸而去濁則生氣勃發生機活潑生命延而鬼路絶矣故曰但能存想又曰一念持經皆是欲人心上洗滌心君有道五官順令萬神調伏萬魔退散一身之萬神調伏萬魔退散則外來之神自然調伏外來之魔自然退散此亦明義理之自然以見經功之浩大山神衞護風浪頓止内則氣固血榮外則水陸胥安也惡賊退散𡨚枉解脫内則惡念消而鬱氣伸外則惡人退而直道行也母子平安福德男女職務遷轉子孫榮遇内則十月功圓脫胎神化無位眞人天爵寵錫外則德門善人嗣續不絶也財寶充溢返降吉祥内則德可潤身道乃富有善氣迎人外則令聞廣譽災難不干也凡此皆由死致生生而順其生死而得其安者也惟經能濟之至於注名惡籍神生淨土同苦罪眾護度生天内則敗氣不存本命延長快樂無邊百體胥安外則煞鬼退避族類康榮同度善道也惟經能度之箋釋正陽帝君曰堪嗟世人不了生死形山不顧死而後已苦海無邊浮游還喜刀劔叢中快活過日枉道徇人也爲色身羅刹鬼國出離無因生死不明卑賤爲榮忘身事人願財豐盈雖足衣食慶退災臨惡星纏度惡籍書名同苦罪眾同墮幽陰三光不見直到於今甚至淪墮爲獸爲禽要想解脫再無信音大哉帝力玅哉神咒一念轉移回心向道持念眞經脫離有靠或驅猛獸或除毒龍或伸𡨚抑或避羣凶或退眾邪求子保宗資財充溢貴遇人君死者欲度生者求榮皆如所願道協人情皆由經力諸難皆平千祥百福性命咸亨生死受賴恩自瑤京悲哉眾生速速轉移得此至寶出離有資殷勤遵奉黽勉修持如志如願不必驚疑經功浩大爲我證見神咒流行上帝默鑒布吿學人光陰有限觀音世尊曰一念吾名百難平况讀尊經念帝名咒顯大悲悲觀遠書留赤字字光盈箕風畢雨人殊好怕死貪生世共情到此方知神咒力教君如意自咸亨麻祖元君曰世人情念太繁多萬種千般是網羅一念精誠消眾念心魔退散遠邪魔總由上帝眞經力何怕𨶒羅記姓訛有願皆償生共死不皈大道奈君何文昌帝君曰不知死也不知生生死爲皆富貴營採寶求珍求顯達逢魔遇鬼遇災星償他萬種千般願方信赤文玉字靈案有尊經卽樂土迴光誦讀莫留停孚佑帝君曰無窮無盡願欲繁舉世因之障道門生死惟知貪富貴營求還欲庇兒孫皇天有靠終如願寶訣多靈不待言何似當初學大道玉虛門下不勞煩斗母天尊頌曰上帝威權栽培傾覆如願相償讀經去垢又此經所在之處常有十天至眞大聖無極飛天神王侍衞供養持是經人當得自稱爲正一眞人是人在處自得十方至眞至聖金剛力士潛護其人如護已身若出若入遊行之處百邪避路魔鬼殄除精靈伏藏一切災殃不能侵近是持經人命欲終時更不見諸地獄惡相卽見天宫一切玉女持幢下迎而生天上如天福盡下降人間卽得千生萬生中常爲帝主令國土淸平人民樂業兼得爲王獲宿命通遵奉大道展轉修持至登道岸是持經人獲福如是保登道岸章第三十一天師張眞人曰茫茫大道並無津涯故佛曰性海曰香水海曰七寶池或曰海會一切功德法力皆以海名儒曰逝者如斯不舍晝夜盈科而進成章而達遊於聖人之門者難爲言亦必觀於海也吾門淸淨不受一塵所謂混之不濁禾嵗丿之愈淸毁之不滅滅之愈明者非性海乎非香水海乎非七寶池乎一切經文卽總池之海會矣然又何曰道岸蓋眾生淪於愛河墮於慾海實安身於此岸之中而不知有彼岸之樂上天不忍涕泗無從將欲拔諸污禾嵗丿寒冰之處而置諸高明淸淨之天故太上元始化現萬天以待學人化號萬方以教學人又以一理分爲三教隨方化導因風氣以立科條因性情以廣接引是故中國爲文明之地降生孔聖以廣詩書禮樂之傳以正倫理以立性命或爲聖賢或爲忠臣孝子浩氣充滿於宇宙之間正氣扶助乾坤之體安懷一世黼黻皇猷以開太平繼往開來永千聖之薪傳而宏仁於萬世如是以登道岸西方天竺禀天地之金氣爲多其地尙音降生釋迦而以梵音立教所傳諸經諸咒神靈無比故曰威音又曰雷音又曰一音蓋耳根洞達徹乎三界本體分明感應自然言爲心聲吐於廣長之舌六通洞達音韻爲多由是叅悟以登道岸吾門爲大道之宗而尊經又爲一切典籍之宗故赤文播爲文教玉音卽是梵音神咒統乎眞言所以帝光無所不被寶蓋無所不覆佛門以華嚴爲圓教儒門以羲易爲通靈吾門則以皇經爲圓滿本於大洞開乎道德黃庭千經萬典千法萬門而宏廣大度人之願如是以登道岸所以玉經尊貴無比供養之處千眞侍衞受持之人惡魔遠避萬聖維持命終之時玉女下迎受生之劫尊貴無比國土淸平獲宿命通輾轉修持至登道岸則是經眞苦海之慈航迷津之寶筏矣正一自稱豈虛言乎箋釋九天應元雷祖天尊曰天師奉勅降校尊經神來法席理契天庭周旋萬聖左右千靈共詮帝典言玅理精法傳當世義本始靑三才會集三教一家世人不信毁謗諠譁豈知世界皆帝光華國王帝主富貴無加學士大臣聲勢交加民生年𡻕帝澤休嘉莫非上帝主持幽遐所以世界安樂千春讀書士子須養性眞不究根本不固眞身泥於文字謗毁斯頻金章闡發大稱吾心吾爲箋釋一字千金遵循福至毁謗罪深莫聞莫見動有雷霆各遵教法各固本根各養性情莫泥語言生順死安光大其門保爾後來道契玄元道岸必登位列十天見是經者修誦誠䖍雷祖保護在爾身邊一念歸正如在帝前一念邪妄歘火卽傳性命難保何言昇仙天尊指示記在心間諸眞詮解不可妄刪言言口訣大道攸關應接不暇如在寶山空手而回道岸何攀吾言不謬信者勉焉玄天上帝蕩魔天尊曰欲往靈山拜世尊不知帝典鎭玄門包含三教無窮理總括千眞萬聖言眞言秘語咸持受度死安生再不淪北極玄天爲保護巍巍道岸大眞人正陽帝君曰上天一理分三教此語人間孰信之詮解眞經明闡發精微玅道斷羣疑地天泰運從茲轉教化文明自此基道岸先登安國土明明上帝是嘉師文昌帝君曰吾爲三教大宗師典籍經書盡總持賴有尊經爲明証幸從詮解去人疑巍巍道岸誰先入處處天心爾自知正一眞人非浪許天經聖典不差池孚佑帝君曰天經玅義誰能識解釋紛然孰信之豈料筆花飛爛熳皆從天性作根基人稱正一人人愛字刻瓊瑤字字宜吾願化身千萬億接登道岸總無疑斗母天尊頌曰法性無邊藏諸壬癸渡出迷津最尊最貴又若有持是經人若雨下時起大悲心如法向空念此經三卷一遍其雨所霑面所向方一切眾生五逆十惡一切重罪悉皆消滅一切重病便得痊癒是諸眾生命終之後不墮地獄神生淨土蓮花化生何况持是經者又若有持是經人若行於道路值大風起吹是持經之人觸身之塵是塵所霑一切眾生一切惡業悉皆滅盡更不墮三惡道當生天上故知持經功德不可思議是持經人若在江在河在海沐浴其身是水所霑其中眾生魚鼈黿鼉一切水族是諸罪眾悉得除滅盡此一報之身命過之後更不受胎卵濕化一切等身是持經人口出一切語言或善或惡一切天魔外道聞者皆是淸淨法音是持經人若遇諸神廟能爲其神誦詠是經是諸鬼神得聞是經卽脫鬼趣登眞仙道恭敬是人如奉是帝有象圓滿章第三十二天師張眞人曰此與下章皆是發明經功圓滿判此章爲有象圓滿判下章爲無象圓滿蓋因帝光圓滿則帝圓滿神咒圓滿則帝力圓滿故經在處則其功德自必圓滿而此圓滿之功德不能盡説下章所謂雖窮劫難言者也於是先卽有象者以形之夫持經者得昇道岸則其人之心卽上帝之心其人之身卽上帝之身其人之瞻顧動作與夫服用器具無往非上帝之運用矣是以到處皆神用處皆靈執持履渉之處皆霑勝利存思想望之時莫不圓滿先卽有象者論之雨霖降處皆帝恩澤而持經者迎機運法自然潤澤下土生活焦枯則謂雨所到處卽帝澤之所到帝澤所敷之處卽持經人惠利所敷之處可也然則雨可盡乎經之功德可盡乎至於風動之塵細小輕微何關乎撮土又何論乎大地而卽風動之輕塵莫非人間之福利則撮土於大地可知矣持經之功德可盡乎若夫水更普徧更非雨澤之涓滴輕塵之微細繁多無比彼夫天一之精能載坤輿萬彙滋生則皆帝之恩波也而持經者隨身挹注霑被無窮澤及水族則人可知矣夫雨也塵也江河海也猶有形之有定者也若言語則可聽而不可執且隨時隨地隨用而不可盡矣而恩澤又被及於無形之靈異經之功德可盡乎然則天下雖大盡乎有形者而皆利益可知地水火風皆上帝功德之具胎卵濕化皆由上帝功德化形何論乎人何論乎持經之眞人以此形容功德之圓滿則眞處處圓滿矣若從丹理佈置則須彌甘露起死回生也戊己運於眞氣生生不斷也天一華池眞精布滿運動皆春卽四生業盡也口訣秘傳逆順合度吐屬皆金卽語言或善或惡六道輪迴永脫也經義無窮正説喻説皆精閱者其深叅之箋釋正陽帝君曰玅哉聖經最神最靈功德圓滿盡乎有形雨雨風風皆施福惠刹刹塵塵仁深品彙江河淮海拔出風波一切水族胥霑太和胎卵濕化可憐四生魔趣鬼趣六道咸亨一切惡業除籍勾名盡此一報返本還原當生天上或極樂國况持經人不能脫卻一切鬼神皈依大覺如奉是帝尙且誠恪况在其人一家眷屬比閭姻黨國邑眾族不能福惠予以安樂令其皈依勿滋疑惑同修善道同讀靈書同近帝光同到帝都得是經者不可糊塗勤行修奉功德非虛有形有象普度非誣經功圓滿無量無邊我許是人巍巍上仙觀音世尊曰四生六道一光中直到而今度不窮帝勅靈書傳世界還原返本盡和融山河大地皆春雨言語得聞盡惠風總是持經功不盡得丹圓滿證圓通白祖仙師曰化雨和風處處施恩波流到楚王祠語言誦詠宣天勅人鬼神祇普帝慈盡此一身還苦報遂離惡業步天梯經功到處皆圓滿正一眞人福惠齊文昌帝君曰明有人兮暗有神總多惡業染埃塵春風春雨生機轉魔苦魔身脫殻新全要天經爲解釋乃能帝座勢嶙峋從今莫慢窮經士出語浴身係上眞孚佑帝君曰誰稱正一大眞人一部尊經玩味眞出語浴身皆係道四生六道認爲親有形有象全沾惠無量無邊廣播仁如此方能天意合功圓行滿不沾塵斗母天尊頌曰有形有象處處生機經功圓滿普錫銖衣若人在世不孝父母不敬三寶殺生偷盜邪淫妄語作種種極重罪業將命終時若有道心正信眾生於其亡者未氣斷時起大悲心於其頭邊念帝尊號或一七二七三七四七乃至百遍千遍是其亡者生前所造諸不善業悉得消滅更不墮諸惡趣神昇九天何况受持是此經者又若復有人自從往劫乃至今身輪轉人天漂沉世域積千愆萬過在於已身若遇是持經人影暫映其身如爲帝光之所攝受或與同語或聞其聲如奉帝言道語慰諭彼人罪障永得除滅又若持是經人造作長旛書帝名號於其旛上懸諸長竿或是觀宇或在家庭是旛被諸風吹所指方面一切眾生皆霑勝利一切惡業悉得除滅又若有持是經人書帝名號在一切有聲物上或鐘或磬鈴鐸鐃鈸一切道具法事之屬或以道場或以戯擊或被風觸是聲出時或遠或近一切眾生聞是聲己所有罪障悉得淸淨又若有持是經人了悟生死深入山林修眞學道或時登臨上山顧望目所及處山林溪谷含生品類有形無形胎卵濕化動植飛潛種種諸類所有罪業永得除滅身心淸淨命終生天何况受持是此經者當知是人卽是道藏功德身也無象圓滿章第三十三天師張眞人曰此章發明無形無象者經之功德無不圓滿甚矣無形無象其誰見乎其誰聞乎其誰可得而言之乎又何以圓滿功德無怪讀道經者詆吾門爲虛無之學將太上指示先天氣象杳杳㝠㝠之語亦爲訾議嗚呼誤矣夫大道一元其體爲先天其用爲後天先天之境不容思慮自然而然只可默會而不可以言傳卽儒經所謂隱也後天之用生發開舒化形造有錯雜紛紜呈露於宇宙之間卽儒經所謂費也然後天不能離先天之體先天不能不發後天之用故洪濛未判之景象至今猶在卽祖炁也卽赤炁也夫旣曰炁可得而見之乎卽神也卽機也其可得而言之乎然以不可言不可聞見之處而經功無不被及則玉皇之功德爲何如圓滿乎持經之人至於無形無象之處亦運慈心而普惠利則持經者之功德其圓滿又何如乎於是舉心運想無非普上帝之恩光指顧周旋無非揚玉皇之道玅啟口皆運靈機持行無非玅義所謂信手拈來頭頭是道隨心動作處處生春游戲散爛熳之天花行坐擁高虛之寶蓋維持有力聲音笑貌盡含生轉移如神謦欬語言皆作福隨人予返魂之神香隨地施延齡之玅藥金丹一點滿地皆金春光乍回盈園布錦斗柄移而璇璣自轉朝暾出而萬戸皆温駕無象之慈航拯眾生出離慾海灑無聲之甘露蘇萬彙活彼枯株所以造罪無邊之眾生死期將至之惡業皆遇之而得生皆逢之而得果山林溪谷品類含生動植飛潛色身復性居然攝受以帝光而爲帝言之所慰諭前章云正一眞人非卽此道藏功德身乎然而功德無盡效騐神奇厯劫難言正説不盡反從積惡眾生以形持經者之境界則其神騐當何如以是有象無象二意釋經功之圓滿則眞隨取隨擕隨用隨靈旣不遺於一息亦不懈於百年旣不遺於一物亦不有間於天地則眞無不圓滿之經功無不圓滿之神咒無不圓滿之帝光矣箋釋正陽帝君曰大道無形精微奥玅大德無窮淵默爲要况此氣機更覺幽微捉執無物境界何歸不可目見不得耳聞其實運動春意氤氲無色無象無形無名來焉不覺去焉不明不識不知自然發生潛移默運品物咸亨玅哉經功如是如是持經之人同歸一致登臨顧望四境吉祥山林溪谷品彙含光建壇梵唄寶蓋長旛鐃鈸法具鐘磬笙簧但書名號高上玉皇聞者罪滅見者吉昌或與同語觸彼衣裳身形暫映流連徬徨如帝同語如近帝光如聞上界不斷天香經功圓滿福被無疆可知帝號如是輝煌可知帝典必須頌揚誦是經者德不荒唐無象圓滿有象愈彰功德至此惟滿惟圓不可思議帝澤無邊觀音世尊曰無形無象亦無名奥玅天經是梵聲受持圓滿功須證微玅機緘物亦生性是菩提潛運用氣因神咒更安甯游戲登臨皆佛事眞空至理更神靈麻祖元君曰誰訾吾道是虛無無象居然太極圖不見不聞機自轉造形造色理偏殊語言動作皆天道游戲登臨奉帝書只要䖍心書帝號潛移不必費工夫文昌帝君曰性靈開處筆生花天道回時世界嘉只要一眞通萬界自然海角會天涯天香密布無形影大慧發生那障遮可信先天圖奥玅帝經靈驗不爭差孚佑帝君曰詮解尊經景不同一番和氣一番風無形無象先天合成象成形玅道融彩筆贈君堪奪錦天香啟慧自生紅無邊迹象何曾著玅悟决然處處通斗母天尊頌曰先天大梵赫赫無象品物流行恩施浩蕩爾時天尊謂玉虛上帝言今我略説未盡其玅若廣説之凡流邪見疑惑不信是經功德窮劫難言爾時玉虛上帝聞是説已心生歡喜不勝踴躍瞻仰慈顏稽首讚歎而作頌曰九天之上謂之大羅玉京金闕雲層峩峩中有天帝仁慈惠和至道無敵降伏眾魔天寶靈符玉律金科神仙億萬幢幡眾多聞者罪滅永出愛河是號玉皇穹蒼眞老玅圓淸淨智慧辯才至道至尊三界師混元祖無能勝主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦爾時玉虛上帝説是頌及十號已是諸天眾異口同音歎未曽有帝號圓滿章第三十四天師張眞人曰上帝之德無不圓滿則上帝之號自然無不圓滿何以至此處而始曰圓滿夫天尊明明説出今我略説未盡其妙若廣説之凡流邪見疑惑不信是經功德窮劫難言試思窮劫難言者非道乎我以爲玉帝之功德亦是窮劫難言若廣説之人卽見信亦自説不能盡不惟我一人説不能盡卽千經萬典任其橫説直説正説喻説或多言説或少言説亦説不能盡也故天尊玄座説法可謂無不詳盡而猶以爲我略説之夫天尊尙自以爲我略説之則必無有能盡説之者矣然則玉帝之功德可易量乎不可量而必欲廣説之則雖獻一萬二千三十六偈讚不爲多頌揚法號符乎一萬二千五百當朞之數符乎十兆九萬五千九百四十二之數猶以爲少而僅獻以十號可乎不知此卽略説之意也約略説之則稍舒敬獻之忱稍明臣子之意略序其萬分功德中之一分而巳我於是卽玉虛上帝所獻之十號而略明之所謂穹蒼眞老者至誠無息莫出其右其功德上繼乎老君而下開乎五老也玅圓淸淨者玄微通融無僞無雜其功德若天體之充周天光之明潔也智慧辯才者明無不照睿無不入宣萬變之理以開化萬方制萬幾之宜以臨御萬天也至道至尊者全備一元之理以歸於神化總握玄綱之運而極其崇高也三界師則千眞萬聖皆受法混元祖則天地日月不能先無能勝主言攝伏乎萬魔修羅四生慈父擬惠育乎崑崙四部高天上聖則巍蕩之德同乎元始大慈仁者則好生之德洽於萬世具天地生成之數於無疆則曰十號圓滿説不能盡而總該之曰萬德周身則合聖賢仙佛之道而全盡無量度人拔生死苦乾元不息大生廣生卽略説之而已廣大充周如是安能盡言斯眞大無不包小無或遺遠無不到近無或忌者矣我故曰帝號之圓滿可以明帝德之圓滿箋釋正陽帝君曰大哉帝主玅哉帝經功德圓滿積於無形有形有象倍覺神靈無量無邊窮劫難言可知大道無有言説能説之者卽非道德但在眾生成性存存經功到處遍滿乾坤人物各正滴滴歸元經功如此帝德玄焉所以感戴出於諸天普放神光救度周圓寶蓋會下被覆無偏神咒流行普示周全帝德無盡帝號無邊處處充滿處處周圓天經奥理叅悟眞焉拔生死苦度人無量約略説之已超無上可知道法惟在心悟心體淸明不失故步自無魔擾敦樸守素吾言不煩後人謹記白祖仙師曰從來帝力最通神成地開天事事眞十號聲稱説不盡千靈敬仰頌皆誠任君廣説無窮劫由爾朝叅億萬春説經教主猶略説存心默朝免傷神何祖元君曰饒君聰慧過顏閔不斷𡨚魔也徒然帝德在身千聖保天心莫亂萬般圓濟生度死無私意滿行圓功慶昊天從此靈臺須潔洗䖍恭侍演聽眞詮文昌帝君曰學眞志士莫輕言一念差失悞入門旣奉天經爲秘旨須除妄念滙心源千眞傳法非容易十號周天也不繁可是一眞無百僞穹蒼眞老許歸元孚佑帝君曰萬般世事靠於天天道十分人要全天縱神明猶要學眞身大道總無偏皇經秘義君叅得外道邪魔那許纏不是千眞同在坐空遭毒手又何言斗母天尊頌曰十號圓滿帝德無邊速修速證玉軸金編太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷中終太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷下天眞護持品第四爾時昊天上帝聞説經法從座而起長跪帝前白言玉帝願爲大眾及諸人天持是經人説利益事爾時玉皇尊帝興方便意開利益門宣玉匱科傳靈寶法告於昊天上帝言汝今諦聽當爲汝説受持功德扶危拔苦利益存亡神玅之事眾眞稽首俱發聲言弟子臣等今日幸聞湛然常住之法莫不上福三界諸天下消三途毒害惟願慈悲愍臣等故演斯玅義請常住法章第三十五天師張眞人曰此爲天眞護持品首章前兩卷闡發玉皇上帝放千載常煥之天光發萬刦不散之玅香宣億年有韻之法音橫則結三百六十五度四分一之寶蓋以蔭覆十二萬九千餘年之天人而竪則傳萬刦以前萬刦以後大光明大圓滿之大神咒以爲天地之玄根不朽仙聖之薪傳誠所謂混之不濁禾嵗丿之愈淸毁之不滅滅之極明者也不得湛然常住之法何以至此凡一時在天尊玄座聽法上帝光明座下稽首者若夜光玉女高虛淸明天主五老上帝玉虛上帝莫非寂淡逍遙以經億劫周徧十方不損一毫是皆得湛然常住之法者一時大眾雖聞天尊説持經功德之圓滿而猶欲上帝之俞允故昊天上帝當機啟請猶恐不知説經本意遺卻指歸眾眞於是爲大眾對越上帝而特申明之曰今日幸聞湛然常住之法欲大眾迴光返照須從自已湛然之心源以歸湛然之性海而永住於淸淨泓之境則凡傳玉匱科得靈寶法者可忘卻自已之光明乎箋釋正陽帝君曰天尊憫世垂此宏文諸天大眾何幸得聞放光發慧帝乃分身玅音宣布寶蓋庇人圓滿神咒功德胥眞是玉匱科是靈寶法湛然光明常住不滅尊經奥旨一言包括畫龍點睛一網千目旣舉宏綱眾條皆悉道本玄微功必歸一亦不險怪亦不神奇心源瑩湛保守無虧玄根自固性體維持永劫不壞三途不迷不負天尊諄切提撕昊天上帝殷勤啟請金口宣揚乃得要領天尊上帝開利益門受持功德明示元元眾眞稽首俱發聲言請演玅義普福無垠吿播天下共樂長春惟斯功德何以爲報惟有誠心遵奉聖教教導斯人皆歸道玅爾等眾生洗滌心思勤行修奉天眞護持麻祖元君曰昊天稽首玉尊前利益門開福萬天不有光明圓湛體安能億萬百千年家常言語皆精藴永住蓬萊是正傳説到西天成佛事畫龍畫餅豈眞傳白祖仙師曰今古何人得正傳從赤松遊億萬年玉匱金科靈寶法守先待後子孫賢門開利益誰人信帝普慈悲示爾玄説到西天吾不許自今再莫妄談禪文昌帝君曰理學通明古大儒何須佛地覔安居眞空雖是先天體精實方得象罔珠靈鷲雷音多喻説金科玉匱範眞吾玉皇寵錫天言秘希少慈悲報有餘孚佑帝君曰人間惟有道爲尊這段佳文爾屢言誤入虛空羅刹國何能眞實我家門金科靈寶傳眞法玉匱天王總一元萬法千門歸一是從今方寸滙眞源斗母天尊頌曰金科玉匱上帝心傳湛然常住普福無邊玉帝吿曰若有眾生孝養父母恭敬三寶竭忠於君不殺不盜不淫不妒不嗔不恨不驕不詐奉戒持齋冥心大道生尊重心持誦是經我卽勅下周流沙界徧傳十方無極世界我勅東方東華帝君靑騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅東南扶桑大帝與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅南方朱陵大帝赤騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅西南太華元老與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅西方皓靈皇老白騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅西北皇天上帝與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅北方紫微帝君黑騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅東北沖虛天君與其部眾神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅中央天皇大帝崑崙蒼老黃騎神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅上方來和天君名山大洞神仙兵馬無鞅數眾悉令下降覆護受持是此經者我勅下方一切金仙四眾八部及諸眷屬悉令下降覆護受持是此經者我勅十方飛天神王飛天大神三官四聖二曜九星北斗南斗東西中斗二十八宿周天眾星金剛力士神王等眾各與部眾悉令下降覆護受持是此經者我勅降魔力士四天門王五嶽四瀆及餘諸山四海九江十二河源山林川澤一切主者令與眷屬覆護受持是此經者諸險惡處令得安穩我勅所在一切土地靈官并溝渠等一切諸大力鬼王皆令覆護受持是此經者令眾魔外道悉皆懾伏潛形遁跡高飛海外遠避他方如是山林社稷廊廟血食之屬一切鬼神當自消滅五方行病瘟疫鬼帥諸惡鬼神並風王水怪孼龍妖神土精木魅盡自消滅五虛六耗夢寐乖常野道咒詛蠱毒之類皆自消滅心欲願者一切如意皆得滿足覆護圓滿章第三十六天師張眞人曰前章天尊所示種種經法廣大無比神驗無比至奇至玅要不過教大眾各各完全此一段湛然性體以永住眞常永不墮於生死苦海中以致淪於異類卽玉帝之玉匱科靈寶法也彼不知湛然常住之法者爲之奈何如有一旦覺悟知色身無常而欲尋湛然眞常之性體又或愛慕天尊所説經功圓滿之神驗於是信向是經擔當承受持守眞修雖其人眞心求道知必不爲效驗然而天眞之護持所必加也卽由愛慕效驗而後持此經則天眞之護持亦必如其願也夫上帝金口宣揚龍章勅命千靈默護萬聖保持利益無窮神玅無比若廣説之厯劫難盡今略就上帝金言而論之或問吾何以判此章爲護持圓滿蓋大道本來圓滿故帝之光明圓滿帝之功德圓滿經之光明圓滿經之功德亦圓滿則受持此經者其功德亦無不圓滿可知於是乎護持之功德亦圓滿矣所以覆護盡十方之聖眾保持盡眾聖之眷屬可謂一氣感通所在如意且能魔鬼消滅心欲願者一切如意皆得滿足則覆護尙有遺漏而不圓滿者乎至若帝曰生尊重心持誦是經必曰孝順父母恭敬三寶竭忠於君以敦人倫又曰不殺不盜不淫不妒不嗔不恨不驕不詐以淨其身奉戒持齋冥心大道以淨其心似乎持經之人皆得遵守又何必分言之不知人持帝經則已能置其身於帝光赤炁赤文之中是元始祖炁帝宰無上之功德已合而爲一已之性與命亦合而爲一矣斯時也眞炁歸體眞理歸元則十方之眞炁自蓬蓬勃勃而歸於我故五色交輝無非水火金木土之彩主與眷屬象五德眞精華采之殊騎按五色顯五氣萬神之布悉皆下降眞炁自天上而來退散諸魔則死炁從地祇而滅由是至寶歸鑪朝元有日斯眞傳玉匱科靈寶法者非實行忠孝淸淨諸條又何以至此乃知所謂經者卽道也卽靈丹也是經道理廣大任人深用淺用皆可故下章又就眾生根器而淺説之非我所謂覆護圓滿者乎箋釋伯陽魏眞人曰靈寶玄科金笈玉匱秘於上淸掌於玉帝金口宣揚覆護眾生眾生有幸處處咸亨十方聖眾勇騎良兵眷屬不少來會玉京悉奉帝命覆護安甯蓋以是人受持帝經帝經功大最神最靈四方響應四維來庭天上地下一切咸聽不敢怠慢左右無傾惡魔永斷鬼籍無名從此保守可達三淸昊天上帝叩請維誠帝宣玉勅布散紛紜保護維持悉覆慶雲心欲願者咸許如心一切滿足不吝加臨可知是人功德最深我是漢代伯陽仙翁爲釋帝經特下雲中言雖淺近心與帝同慈憫斯世勸諭由衷要愛性體太和冲融湛然淸淨無翳無蒙眞常乃固稽首天宫持經證道福利無窮切莫自誤戕賊其躬吾言雖繁穆如淸風大眾遵守舉頭蒼穹明明照鑒必報爾躬千眞護持太和冲融正陽帝君曰眞炁眞文天上來有人得此性眞回十方神聖皆歸我八景冠裳盡結胎已注生門離死戸高超人類趂天懷玉皇勅命紛紛下許爾爲鹽和鼎梅白祖仙師曰曽爲天上狀元來且向人間往復回爲奉帝書傳玅道保君赤炁結靈胎神仙兵馬無鞅眾外道邪魔敢入懷衣鉢親傳親覆護高高穩取上林梅文昌帝君曰上林梅子一枝紅得者終須入帝宫給爾七騶通御道看人一路笑春風干戈平靜烽烟息魔鬼潛藏覆護同總是帝經無盡德自然安穩太虛中孚佑帝君曰未曽箋釋笑嘻嘻秘語人間總不知校正尊經宣玉匱聯登雲路漸天逵十方兵馬神仙眾無數歸來覆護宜從此人間宏福澤邪魔懾伏露生機斗母天尊頌曰玄玄帝宰惠及十方赤炁降臨精邪滅亡是持經人或不依科教未能修齋未具淨戒以能信受尊重景慕是此經典并同修齋護淨戒者是人功德坦然無礙自在逍遙號人中聖德慧長新同諸眞人功德無礙章第三十七天師張眞人曰此章亦是覆護圓滿中事就此章言愈見覆護持經功德之圓滿夫入道者必依科教必修齋醮必具淨戒而今皆無之似無與乎道矣乃以信受尊重景慕是此經典并同修齋護淨戒者經之言毋乃任人之褻侮乎非也蓋人之入道而成聖者心也旣能景慕是經則其心已具信根尊重是經則其心已具卓識特見而有超然無上之想信受是經則已承受實行是其人本體湛然眞常可以永住以視夫徒依科教修齋以祈福持守規戒以安身者遠矣况得見是經實有大緣勤行修奉自登道岸所謂舍末而圖本棄流而尋源遺跡而求眞者故與修齋護戒者同其功且在修齋護戒之人果能一誠無僞感格皇天純是淸淨乃爲法器不然則無功有過尙懴罪之不暇又何功之有反不如專一信受敬慕是經者矣上帝恐人疑惑是經功德故再説此章爲持經而不修具文者明吿之曰是人功德坦然無礙可知受持是經之不拘何人也自在逍遙號人中聖可知覆護是經之同一格矣德慧長新同諸眞人可知持經功德之同一圓滿也其曰并同修齋護淨戒者可知同一覆護并不禁人之修齋護淨戒矣總之天之爲天因材而篤栽者培傾者覆果能信受是經則大道有根上帝自必培之原不拘乎具文也不然人中之聖不易稱同諸眞人亦不易致而可輕以許人乎總之以是經爲湛然常住之法以勤行修奉求爲人中之聖同諸眞人自不遺於天眞覆護之圓滿者已是之謂功德無礙又前章八方及上方之説人無疑惑惟下方二字人猶不解蓋大道一元充滿天地天包地下地居其中則天體上下皆是一色日月星辰運行或上或下皆在空虛之處上方有神下方亦有神故佛典有從地湧出寶塔之事是之謂十方以此言覆護則眞圓滿矣則眞無礙矣箋釋玄天上帝曰經垂明訓聖有眞傳眞傳不朽明訓無邊何爲明訓訓者皆明何爲眞傳傳者皆眞眞爲心法眞爲秘訣秘訣授人比訓更切有心信受心志當决大哉玅經尊重無比得讀之者緣大無比受持之者功德無比誠格皇天覆護無比信受景慕是此眞經心田淸淨性體熒熒湛然常住必到帝庭其功甚大坦然無礙其德已全逍遙自在號人中聖神化無倫三界十方同諸眞人乃知修道不在修齋遵依科教必求本懷能具淨戒必結靈胎靈胎是道團結乃來道爲何物卽是赤炁赤炁赤文先天一致讀是經者心在帝前修是經者道全先天先天無礙功德圓滿圓滿功德巍巍無上上帝好生發大慈心興方便意處處遙臨説利益事爲世功深凡爾眾生聽吾法言治世福神勸教宜遵誦是經者各求本根必來接引朝覲天門正陽帝君曰修道修心那在齋修齋那得結靈胎靈胎皆是先天物經旨全將赤炁該覆護無窮無所礙持行有德有仙來功圓行滿同成道個個堪擕到上臺麻祖元君曰修齋個個誦皇經那個知得義理精神咒赤文何所指神仙兵馬便欲臨心君有道方方應命體還丹處處熒玉皇玉旨須遵奉淸磬木魚自此停文昌帝君曰皇經不誦不爲仙科教徒遵也枉然但使眞心求赤炁何難帝勅下諸天勤行修奉人中聖眞行滿圓地上仙自在逍遙無礙日方知覆護不虛傳孚佑帝君曰到底皇經讀不讀忽然撤去木魚聲總因俗見忘根本遂使眞人變性情赤炁赤文皆是道玉淸玉帝本同行人中稱聖諸仙合自在逍遙達上淸斗母天尊頌曰天有大道人求玄根眞叅實證帝啟天門爾時昊天上帝聞是説已卽於帝前乃爲歌曰大哉至道無形無名𣺌𣺌億劫黃道開淸神淸朗耀九魂吐精玉虛澄輝太霞高明玉皇開化普度天人三元道養二象攝生朽樹故根已枯使榮蠢動蜎息長生化形懷胎含孕俱得生成亡者命過魂歸三淸魄受鍊度南宫飛昇今日大吉皆得光明五帝鑒映普吿萬靈天神地祇及與河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至眞尊神無窮無極普監度生惡根斷絕玄都記名眾眞班列咸聽帝言經是帝勅保誦持人至度道岸無使災侵我奉帝命一切咸聽頌揚帝勅章第三十八天師張眞人曰昊天上帝玉帝分身主治天下名號同新體用交徹互顯其神樞機並運普度天人慇懃啟請利益無垠帝乃鑒誠宣勅金庭普吿萬聖慰諭眾靈龍章寵錫鳳詔莫停布吿天下與道同貞蓋此大道咸在眾生類有萬品一理而分奈何不悟不慕玉京墮落萬劫何日三淸仁哉福主昊天上帝爲民迎祥天言宣示大哉王言如綍如綸天書帝謂恩溥乾坤帝勅在經覆護法門上天下地仙聖神明手捧瓊章下觀太平保誦持人億載咸亨眾生當知大道無名無迹無象得者長生蓋能持經以結金丹圓滿神咒赤炁歸垣天根永固會合三元眞陰眞陽至此同原天上地下黃道開淸神明煥發九炁吐精魄受鍊度魂更神靈死者忽生枯者忽榮乃知金丹大道留形形有光明揚於王庭十方五帝萬聖千靈山河大地朗朗熒熒普監度生萬炁歸身先天景象處處皆眞別有天地上界仙人昊天上帝受帝心傳開化來學普賜眞詮大道如是丹道更玄金丹卽道本性周圓眞功眞候本命如天性命雙修道玅無邊切莫自誤謗議招愆切莫墮落苦海萬年頌揚帝勅接引羣仙是言不謬印證帝前以開來學信受無遷可知大道人人本有旣已覺悟卽當保守保守在身卽是還丹丹卽赤炁固結盤桓丹卽眞性全卽復還丹卽眞命流炁保安丹卽大道一陰一陽絪緼化醕萬物光昌交媾凝結億載吉祥道在尊經經卽丹法廣大浩瀚正説喻説橫説竪説更覺溥博以事顯理理明事彰以言屬事奇事奇言以明大道包括乾坤以顯金丹句句口訣經籍奥妙至此路絶最上上乘無有言説吟咏此章層層明白勅命無虛率履無越天師保任必朝金闕箋釋正陽帝君曰大道無名品物滿乾坤之内金丹無象陰陽歸鑪鼎之中七返九還不過復本來之面目千經萬典莫非是入聖之玄功慨自吾道不行玅法指爲虛無之説天光欲轉尊經必須校正相同開龍藏之寶函求秘旨於洞玄金格闡金丹之秘旨降神咒於紫微上宫理有源流其淵源必歸諸帝載義分本末其根本咸宰之蒼穹昔焉授受無虛萬聖永薪傳於不絶今也差訛必正千眞揚道化以俱通念啟教於昊天復傳於昊天上帝頌錫恩於高上必酬乎高上皇躬帝勅傳來莫匪是金丹之口訣帝歌宣處要皆望大道之專攻惟爾學人當知火候工夫不易從茲入室居然懷胎含孕相融蓋自赤文成輝憑黃道之開淸爲主太霞朗映斯九魅之歸正皆紅二象三元攝歸靈府故根朽樹皆遇春風由是萬炁朝宗蠢動蜎息皆活三淸受度身形魅魄同豐由是大地山河神靈獻瑞玄都日月享受非空列衞千眞幸天心之歸有道保安萬劫知帝勅之錫大功歌曰我奉帝命一切咸聽俱信王言之不謬解曰天師保任必朝金闕同明至理之由衷誦經者當知人身之難得入道者須憑祖炁以爲宗切莫視爲閒言自干罪戾何難超出三界實受褒崇麻祖元君曰帝勅傳來聽帝歌言言字字播天和先從黃道回眞性必自南宫斷死魔二象三元通九炁故根朽樹沐恩波芳名記在玄都早大地神靈無奈何白祖仙師曰大地千眞奉帝靈傳來勅命要咸聽從茲不違眞人命自此常隨上帝經總爲金丹融赤炁遂令身畔有雷霆歌傳帝子皆眞訣讀者實修證紫庭文昌帝君曰讀得天皇一部經神通廣大役千靈三元二象皆歸我玄苑南宫早記名至此方知丹道妙自今九炁亦流精太霞朗映三淸境大地光明大地盈孚佑帝君曰詮經法席有神靈議論風生瑞氣盈讀得帝歌知帝勅開淸黃道卽黃庭三才會集三元協二氣光明二象形朽樹故根皆可活九魅那得不揚精斗母天尊頌曰無窮道化光明睿藻秘訣眞修千春不老爾時昊天上帝説是歌已吿大眾言此玉皇玅法語諸聖秘密言路絶道斷微玅難思巍巍大範爲神明之宗保鎭國土拔度生死爾時昊天上帝説是語時法筵淸眾咸仰道言溥得開悟開悟秘密章第三十九天師張眞人曰前章玉皇以天眞覆護無量地靈皆絶惡機明持經者之功德圓滿是湛然常住之玅法語諸聖之秘密言也蓋以事顯理卽權徵實卽效驗爲工夫學者當卽言以見道在諸聖則恐致輕褻之咎故惟秘密而傳幸得昊天上帝保鎭國土拔度生死之念切啟請上帝得聞如是之玅法語然而言辭廣大義理幽深聞者須驚叅者難悟於是譜爲歌音藉頌揚之微權以發幽玄之實際其實際已於上帝法語昊天頌揚中略爲指示學者閱之自明今但卽此章而論之當知玉帝與昊天一庭授受開悟無窮有韻淸詞寄託更遠上帝所傳者爲玅法語非徒然鋪張神驗昊天所歌者爲秘密言非徒然極力頌揚况復爲之叮喧旦血諄復惟恐法筵淸眾之不悟也而明解之曰此玉皇玅法語也此諸聖秘密言也路絶道斷則在千經萬典中爲最上乘無有能出其右者矣微妙難思則非閉戸叅求盲悟卽可入室不待眞傳口訣卽可登眞者矣是誠巍巍大範雖有靈文不能出其軌則神明之宗雖有妙悟亦當奉爲楷模以此理爲之保鎭則一人有道而四海同風以此理爲之拔度則遐齡頻增而苦海永離一時法筵淸眾不覺開明悟入方知諸聖所傳者此也玉帝所示者此也此卽金丹大道也此卽湛然常住之道也此卽神咒種種圓滿之道也此卽法會放光分身救度玅香薰染玅音宣示寶蓋覆庇之道也其實皆赤炁也是法筵淸眾之所咸有卽四天下之人之所咸有也咸仰道言則溥得開悟矣夫世人之情厭故而喜新惡常而好奇喜聞秘密之言不欲聞眞實之語若讀此經則以爲常道可也卽以爲眞實可也卽以爲神奇秘密之言亦可也含無盡之眞機示生民以法眼雖有瓊編吾不敢請矣亦惟讚之曰路絶道斷微玅難思巍巍大範爲神明之宗箋釋正陽帝君曰教啟玄元太上傳金丹之旨書藏金格紫微秘赤炁之篇良以天地玄根非赤炁不能建立鼎鑪玅藥外赤文那得成仙可知赤炁卽先天之祖炁金丹求祖炁於先天祖炁凝時大地山河盡赤先天返處一身形體皆乾初則取坎塡離全由於留精保氣繼則法天象地當賴乎添汞抽鉛看月出庚方卽是陽生之候喜日昇東海運諸黃道之間戊已眞精與丙丁同歸皇極木金不合驅龍虎並伏法筵由是正炁歸於五方萬神敬仰赤文命諸天上萬界皆圓十月功成詫丈夫之有孕九宫門啟驚雷鼓之忽宣由是死裏逃生嬰兒現相人焉入聖毛髮皆研變化如龍隨心應手虛空皆碎擁霧乘烟夀量綿延淸閒似鶴身軀廣大坐臥俱蓮天詔下臨上蓬萊東華考校玄功遠被登金闕上帝瓊編語皆秘密事更幽玄昔在帝前稽首之歌有據今臨法會開明之語當傳微妙難思允矣巍巍之大範道途卓絶誠哉上上之眞詮神明之宗有在眞常之道勉旃麻祖元君曰路絶道斷有眞傳聞者俱登上上仙大範巍巍包萬象靈機秘秘透千天拔死度生安國土淸言咸仰悟幽玄自今證果何人力心印相傳上帝前白祖仙師曰玉帝金言秘秘宣昊天於是永眞傳保安國土歸皇極開悟羣生坐法筵玉軸金編包括盡神明大範道途玄分明一部尊經裏口訣眞機句句圓文昌帝君曰巍巍大範是玄宗玄理幽深總不同天地一元壺裏會陰陽萬象掌心融眞經玉訣須秘授元始眞機也暗通説到眞修原不易眞言開悟要眞功孚佑帝君曰吾家處處播皇風大範巍巍此是宗微妙難思天道現眞靈開悟道機融最上乘法超最上無窮義更玅無窮皈誠稽首黃金殿如是秘言處處通斗母天尊頌曰秘密眞機難思難議開悟羣眞皈依上帝於是天尊而説偈曰玉帝功德大玄理極幽深生於浩劫前運化於古今我今説玅經愍念諸有情此誠極玅法功德中功德名號最上乘無比爲第一大光明王尊威德聖希有能破暴惡魔皆令心降伏能滅極重罪皆令得淸淨若人聞是經或聞是帝名稽首生恭敬一切罪消滅十惡四重罪五逆於父母信心一稱名隨聲盡消滅保護人天眾四相與五衰三塗極重苦人間見厄難凶年饑饉喪毒藥及厭魅刑獄與𡨚家軍陣鬬戰苦山林惡道中虎豹豺狼等江海毒龍類迅雷風雨雹水火及盜賊蠱毒所中心失志發狂亂蛇蝎毒惡蟲邪魔凶怪神伺求人便者由持是眞經普皆自散滅惡病久沉綿夢寐亦不安非理欲殘命殄滅不爲殃緣遇是經故安穩得自在所有希求願財寶及富貴以此經功德如意皆稱遂神威自在仙諸天十一曜三十二天主二十八宿星靈𡚱玉女等天神及地祗三界虛空神江海諸龍王水火及風神宫殿與宅舍山林樹木眾溝渠井泉神由持是經故一切皆擁護衣食常自然子孫居富貴出言人希聞所至皆恭敬若爲求男女持誦此眞經帝詔下天曹落籍天仙人謫降生其家爲其作男女顯貴人崇重七祖盡昇仙光大慶其門延及父母親吉祥常熾盛災障不能侵是故我今説大眾宜諦聽慈悲度一切皆令達上淸元始偈讚章第四十天師張眞人曰天地卽道體也而必本於先天之祖炁玉帝卽道身也而必本於元始之玄德故元始之道非玉帝不能主宰流行而玉帝之道非元始無從禀承印證所以玉帝則天地之玄綱元始則天地之玄根此品於玉帝親示玅法之後昊天上帝爲親傳玅法之嫡派法筵開悟之淸眾則爲玉帝親傳玅法之流衍故於前章述昊天上帝歌音以明與玉帝印合之意故其證果必與帝號相協歌中所示之玅法與玉帝所示之玅法不異至此章又述元始之偈讚明玉帝之道不異於元始而元始之道盡傳於玉帝兩相印證同歸一道此義不待玉帝自明而元始早已爲之闡發矣且爲之極力歌詠而讚揚之矣爰讀其偈而深究之偈中之意分作兩層首四句讚揚是正説然言簡意該已覺至矣盡矣其曰玉帝功德大玄理極幽深則廣大玄玅幽微精深已盡其莫圉之體生浩劫前運化古今則又明其不可限之量是四言已足矣何能再加一辭故於下盡述其功德而反以眾生形之處處圓滿人人圓滿不覺天語之繁也蓋圓滿之道惟玉帝能行之亦惟元始能言之故特以偈讚印合且夫玄座説法玉帝侍側明明探本尋源而爲之返本還元至是元始偈讚極力稱道明明大道交付同德同心試觀天尊口中自言我今説玅經愍念諸有情卽玉帝無量度人之道也自明之曰極玅法最上乘無比第一功德中之功德不過是説大光明之帝尊威德希有無量度人之實事愈知上帝之功德不外元始之功德而元始之功德亦不外於上帝之功德至是乃知元始與上帝同一道元始與上帝合爲一人矣至於偈中分能破暴惡魔以下爲降伏如意滅罪如意功德保護人天眾以下爲保護如意功德所有希求願以下爲希求如意功德若爲求男女以下爲嗣續如意功德此皆救度圓滿實事卽以丹家功候次序按之亦無不合今不盡述箋釋伯陽魏眞人曰大哉元始大道之祖綱維浩劫流衍今古萬法千門以時而傳上天下地無不周圓蓋此道祖本於先天先天之先萬劫之前生而神靈功德玄玄惟是玄德再傳何人大哉玉帝功德更神主持運會救苦行仁功德無量世無知人亦自浩劫以至於今分身救度費盡苦心持經受福亦或稱名受誦帝號稽首皈誠凡一切願必遂其情罪惡雖大奉事心眞普爲消滅許其自新罪滅迎祥有苦卽伸一切神靈救護無垠一切惡道猛虎毒龍水火賊盜迅雷疾風凡害身者悉安其躬一切珍寶降自天宫乃知吾門玄道不同破惡滅罪護善除凶萬方正氣攝引交融隨取隨擕如願不空胎孕含靈聖子賢孫謫仙下降光大其門鍾靈毓秀道爲根原大道旣得自契乾元如是功德皆由上帝無量度人普天匝地蓋此玄德本於元始元始眞傳惟帝而已尊經無上功德幽深元始偈讚以心印心一心一德玅義難尋後有學人誰是知音正陽帝君曰玄理幽深境不同萬天總在一天中任君存下般般願有帝卽能處處通浩劫前生經萬劫皇風一到盡春風天尊心印天皇得説偈雖多讚豈窮白祖仙師曰大哉生於浩劫前度人無量亦無邊幽深玄遠皇天道廣大慈悲元始傳誦號稱名皆利益讚功説偈總眞玄上淸已達眞機合又向人間説玅篇文昌帝君曰元始眞傳玉帝宫幽深玄遠道無窮一經稽首生恭敬萬種心思再不空浩劫以來施玅德大千沙界播皇風至今叅得尊經玅自有雲梯到碧穹孚佑帝君曰元始天尊坐玉淸眞傳秘訣總瑤京任他浩浩無窮劫説出般般有道行除惡消愆兼祈嗣誦經禮懴更稱名不差毫黍償心願處處原來賀太平斗母天尊頌曰玉皇偈讚大洞雲章功德無量浩劫嘉祥於是天尊普吿四眾凡人持念此經受持帝名皆道根深重宿有善緣此經尊玅普度天人但精心恭奉家國安甯保命度災掃諸不祥天子王侯得奉之者致國太平凶寇自夷邊域不爭兆民歌唱普天興隆運推數周正道當行有得之者天眞玅重秘之秘之正道普度章第四十一天師張眞人曰元始以己心印合上帝故説前章廣大功德玄理幽深運化古今俱有實事此章又以己心印合大眾其意若曰上帝之度人無量莫過於此經則吾之普度天人亦不能外於此經矣故雖貴如天子王侯賤如天下兆民皆不能外此經以爲開度之道爰爲四眾印證之曰精心恭奉則吾必保其家國安甯保命度災掃除不祥若在天子王侯則吾保其致國太平禍亂永免人民樂業天降休祥且是經在處卽天尊所在之處亦卽上帝所在之處彼夫帝光普放天香流布千眞拱衞萬炁歸元太和立應將見俄頃之間轉殺機爲生機轉死氣爲生氣自能變惡人爲善人轉凡爲愚仙聖矧上帝分身之所親臨卽大道元機之所降眞故明之曰運推數周正道當行則凡爲國廣祝釐之願爲身卜安甯之休者不能外是經矣蓋家國天下同在大道之中原不出於上帝光明之外根緣淺薄總由惡業障礙不覩帝經不聞帝號何望乎種種休祥然則得覩帝經得聞帝號其道根深重宿有善緣可知彼其陰陽太和氣機自順沴氣自消惡鬼不逢在一國則天地肅淸民物安泰國祚綿延正道當行於天下在一人則血氣融和百體泰甯萬神保護正道當行於一家此固天尊探本窮源之指示路絕道斷之眞言吾正道普度之解誠哉不誣箋釋正陽帝君曰上帝度人法號天經齊降天尊憫世赤文神咒昭垂歌詠稱揚皆是明天皇之至德保持覆護莫非廣大道之敷施念自天地旣分帝王首出全憑陰陽迭運兆庶咸熙然必遠播皇風自回心於凶寇果能永光帝德斯甯靖乎外夷總由皇極建中不悖一元之太極於是時幾共凛不差日理之萬幾上帝光明鑒一人之有道皇天感應回普世之生機莫謂舜日堯天難再見中天之景運試看和風甘雨分明樂稔𡻕之佳時蓋天眞盡玅重乎是典斯人世必信重乎誥詞宿有善緣知者當早爲修奉欲歸道化聞者須不懈矜持正道當行元始天尊所言有準天人普度王侯兆姓自己深推果信此煌煌天經則宇宙回太和之運奠安上下默朝乎赫赫帝座則身心致百福之來感應神奇白祖仙師曰元始天尊也太慈叮喧旦血普吿繼淸詞已稱帝德重重顯又降恩光處處施保國甯家天下治王臣帝主兆民宜總因勤奉尊經力入道昇仙自可期何祖元君曰這段機關總不知天經轉處事攸宜陰陽協極和風應道德歸身兆姓熙轉殺爲生眞火候避刑從德慧心思靈丹一顆朝天子天上光明我不虧文昌帝君曰四大部洲皆祖炁慈光降處共長春一人有道家家活眞主回天個個親喜見歌謠民擊壤還因崇奉帝威神太和一播陰陽協正道當興體驗眞孚佑帝君曰天尊有勅下人間凶寇外夷一槪刪從此中州稱樂土自然四境同靈山天機一轉歸鑪鼎正道當興顯洞陽喜見天人皆普度天京朝帝詠瓊章斗母天尊頌曰天放光明蔭庇帝京生機轉動正道當行洞玄靈寶報應神驗品第五爾時慈悲度厄眞人尋聲救苦眞人濟生度死眞人萬福護身眞人俱從座起越班而出俱白天尊言若諸世末凡夫雖宿有善緣得遇是經被諸邪障之汙本末疑惑不信是經功德如是之人見在過去於諸地獄得何罪報惟願聖慈説其報應惡趣之苦罪報因緣章第四十二天師張眞人曰此章序四眞人當機啟請以明如是經法莫非慈悲度厄莫非尋聲救苦莫非濟生度死莫非萬福護身夫機以理應事因人顯明指出一經大意讀是經者當知天尊玄座説法以至正道普度章玉帝放光分身以至覆護圓滿章種種奥義詳示法門莫非爲是人慈悲以度厄救苦而尋聲莫非爲是人濟生而度死萬福以護身二聖人爲人如是之切救人如是之盡此亦如天地之生人旣與以命必與以性旣廣其生必贍其生且旣命天子爲之主致治平亂保護而安全焉又必命聖人立之教詩書倫理戒董而誘掖焉在上古則穴居野處使知上棟下宇飲血茹毛使知耕種粒食至於今則婚姻死喪無不遂也衣冠禮樂無不華也干戈貨財無不足也無一非聖人引導之天地之生人可謂費盡苦心矣而二聖人之慈憫如是又如父母生子自胎孕以至生育自幼小以至成人由弱而之强由愚而之智由貧賤而之富貴其間保護愛惜更非一端而二聖人之用心亦如是試思發慈悲以度厄不難尋聲而立至其生也則濟之其死也則度之無非欲其萬德周身自爲保護此説法度人分身衍道之苦心也况經中所説無所不通在上根法器者讀之必於言下了悟全此大道在中等人讀之自能因事明理因言解義而漸幾乎上達卽下等人讀之亦能懴悔積孼消滅重罪求福如願種下善根以爲超度輪廻之本隨人隨心無不如願隨時隨地無不通天蓋以其人得乎大道之原也禪家以華嚴爲圓教謂其塵塵刹刹莫非法性形形色色皆歸性海吾則以此經爲吾門之圓教盡天下之人盡天下之理有能出其範圍者乎然非果報分明則空虛之理人或疑而不信信而不堅四眞人慈深願重名與德顯爲眾生啟問果報又觸動天尊慈憫不覺又大爲開示於是乃有下文諸章箋釋正陽帝君曰三教同源儒者不言果報玄門示法凡爲皆有因緣蓋善有善因惡有惡因修因時必當愼重而善得善報惡得惡報受報者自己牽連草木當春其根荄必生枝長葉風雷應候其聲勢自動地驚天旣然種下芳田自收成之有望未曽金埋密處雖鋤掘之徒然總之一飲一啄莫非前定或生或死徒自焦煎夫天降眞經原爲慈悲而度厄乃人難信法反爲褻慢以招愆於是上界眞人憫下方而啟請天宫福主開人世以眞傳地獄幽深慢經者於諸地獄得何罪報天宫高遠退道者在彼天宫豈無罪愆須信天網恢恢疎而不漏當知天威赫赫苦不能捐然罪報雖由於自取而消釋實賴乎上天所以聖澤無窮重演玉皇之本行天心有在只遵金格之靈編靈寶洞玄文存報應本末疑惑報必迍邅五品昭然仙子則當機而問法一經大旨世人須信受以求全麻祖元君曰禍福休祥降在天也從人世自牽連眞經不信難辭苦春繭作絲自己纏幸有眞人求玅典還從人世説因緣濟生度厄尋聲至求福莫輕玅有篇何祖元君曰禍福因由更問誰行藏檢點自家知眞經玅典還難信萬劫千生少出期報應品中明報應仁慈世上普仁慈天尊玉律眞人啟神驗無虛要信之文昌帝君曰休祥禍福皆天定惹罪招愆在自家上帝尊經還不信陰司苦海自無涯尋聲救度眞人福慢道顚連一念邪至此方知天上澤眞文捧讀少虛花孚佑帝君曰君説人間何事好算來惟有玉皇經一疑退去千般福有慢必登十殿庭地獄幽陰無赤日天堂高遠有雷霆眞人救苦求眞法從此勤修自有靈斗母天尊頌曰赤炁赤文解脫幽陰眞人度厄萬福來尋是時天尊謂四眞人云若諸世間剛强暴惡不善眾生終日竟夜對諸道像無恭敬心出誹謗語是罪當墮五無間獄若得值遇是持經人設諸方便誘引勸諭如是之人暫滅惡心信向是經彼人罪業淨盡無餘又若有邪見愚執惡人覩持是經生諸惡逆偏眼邪視乃至起一惡心發一惡言謗讟如是持經之人其罪過是命終之後墮大地獄永無出期何况世間眾生得遇是經不生敬仰禾嵗丿手污觸葷口讀誦牀榻不淨便將安置或讀是經講習俗語共同戯笑以爲常典如是之人命過之後墮無間獄永無出期殃緣九祖受考酆都累及後世害纏子孫是人於地獄中厯無量劫受大苦惱遇無邊聖累承救拔罪惡小減又遇聖人救拔得出生餓鬼中厯千萬劫不聞漿水之名鬼報得出生畜生中畜生報出若生人中更生邊夷外域而復女身貧窮困苦癃殘百病受無量苦人所棄擲求生不得求死不得輕斯經故獲罪如是毁謗致罪章第四十三天師張眞人曰經卽道也道在經也謗經者慢道毁經者失道是輕一己之道而不知已輕天尊上帝之道矣夫天尊道之祖也上帝道之主也二者均有慢焉其自外於道爲何如夫天尊上帝方千方百計萬法千門引誘是人入於是道之中而人乃終日竟夜積惡造罪自越於是道之外悲哉不知修因者結果修善因則成善果修惡因則成惡果有果則有報矣蓋天地之大不過一陰一陽迭運而不息而陰又必隨乎陽故大道以陽爲主而以陰載之至於陰陽偏勝則發爲沴氣苟非有道主於其間則乾坤或幾乎息矣其在陽之性則發舒而淸明陰之性則斂抑而濁暗在人之造罪雖有陰惡陽惡之不同而皆屬乎陰陰濁之氣一行則地獄之相自己結成陰暗之氣自己凝聚陰冷之地自己驅入此十二大地獄五無間獄之所以日䧟日深並非冥司之所設也是故謗毁經書輕慢道德雖有剛惡柔惡之分種種不同皆所以自滅陽光自撥根本至於淸明之氣淸夜無存則濁暗之陰成矣所以毁謗之罪自己作成則地獄之苦自己承擔雖然人苟不淪於禽獸則尙可轉移故人雖惡貫滿盈而天尊上帝又望其懴悔向善漸引入於是道之内所以稱誦帝號崇奉是經皆有莫大利益乃不能感悟而反爲之毁謗且不一其人不一而足焉奈何今姑就經文而繹之終日竟夜對諸道像蓋指有象之道像其實卽無象之法像也試思大道充塞天地間不以天上而必有不以人間而或無不以大廷廣眾而必有亦不以暗室衾影而或無舉目卽在明現當前彼終日竟夜與之相對而乃終日竟夜侮慢百端任其造惡非種無間地獄之因者乎至於信向是經而罪業滅盡者道心一現而萬惡盡滌也得見是經而謗讟致罪者惡業旣深則一隙之光明不能勝也况乎肆無忌憚不生敬仰則心不淸淨禾嵗丿手汙觸則體不淸淨葷口讀誦則舌根不淸淨牀榻不淨便將安置則居處不淸淨講習俗語共同戯笑以爲常典則口三業一時俱犯矣卽一經而十惡業成焉其罪可懴改乎殃緣九祖受考酆都累及後世害纏子孫俱是慢經實報若以理論之則上不能返還乎祖炁而下必受累於千生由是三惡道成則世間一切苦境皆以一身親厯之冥司無量果報皆以是人親受之轉移不能則曰求生不得迴避不能則曰求死不得苦哉何讐於自己之玅道而不信是眞經也哉箋釋玄天上帝曰天有慈悲救眾生不遭惡劫人無志氣對上帝且少欽思一部尊經視爲常典千般惡事造就陰司夫目擊則道存原不離乎語言文字况言輕則事悖何論乎眞實修爲朝於斯夕於斯全是毁經謗道口不淨心不淨莫非慢法淩師旣天眞之盡失斯地獄之攸宜地獄十二重又有三十六重苦深無間天經共五品分爲五十二節讀要精思受苦無窮受累無窮尙有何人替得報善如是報惡如是全在自己裁之莫言遼遠天宫原與人間隔越須信神靈玉律全爲經語維持天尊慈憫人間羅列品品大眾愛憐自己日夜孳孳不悖天經自必天垂默鑒果叅大道必須大錫恩施嗟爾眾生何人見信靈哉帝主雷令饒誰欣玅典之將成執事者可稱勤苦看天經之永布勤持者必爲提擕有始有終上天灼見愼言愼行大眾莫疑九天應元雷祖天尊曰可憐大眾不回心徒費天尊惠澤深造就千般無盡業自然一命墮寒陰輕經謗道全忘己褻地讟天苦盡侵求生不得難求死何用雷尊處處尋正陽帝君曰地獄天門上下開昇天入地任人裁勤行修奉功無盡謗毁輕淩禍必來羅網重重難解脫傷殘種種但悲哀何爲自外眞經法一墮三途永不回文昌帝君曰天經本爲救斯民何爲輕言謗毁頻一語違心千𡻕苦百般毀道萬年因層層地獄層層䧟劫劫三途劫劫身幸有天尊明指點勤修那得畏艱辛孚佑帝君曰大道分明在眼前舉頭卽已見靑天大含細入方方顯口慢心非事事全造就幽陰諸地獄多因褻慢是瓊編三途並少出頭日千生苦楚自交煎斗母天尊頌曰言行俱非造就鐵圍皈依三寶跨鶴而飛又若復有人初雖信受後復慢易善惡童子上奏三官黑簿添名靑編減算身殁之後拘閉幽牢往復三途無由解脫或於見世受種種病疥癩癰疽以爲果報憂悲苦惱日夜相煎而身或被橫逆所加或牢獄繫鎻非分自害誤食毒藥或被虎狼毒蛇之所食噉或爲𡨚家之所讎對或行山林值遇惡人被他屠割推落崖岸或被邪精魍魎之所殘害或值水火之所焚漂或被刀兵之所橫誅輕斯經故橫喪天年獲如是果獲如是報可不悲歟可不痛歟故報汝等依此奉行勿生邪念若諸念不生萬緣頓息塵沙惡業隨心消散一切災魔自然殄滅此之功德不可思議是誠無比最上玅法諸經之王有大利益非人勿示堅固信心章第四十四天師張眞人曰人自道中來斷未有不愛慕是道者故極惡之人亦有善心儒經云苟志於仁矣無惡也非言道心一現則塵沙惡業隨卽消散乎又曰仁遠乎哉我欲仁斯仁至矣非言道心在内迴光返照道體卽顯露乎又曰萬物皆備於我矣非言上蟠下際充滿宇宙萬有萬形之道皆全具於我心乎以此知千經萬典之義理千聖百王之心法莫非我一人分内事世界之大人物之眾皆與我一體故古人云六經皆我住腳梵典亦如是也卽我玄典亦如是也然心雖有道道本無爲必待人之力量以運之道有體用本體雖淸明而流行之用必堅固不失初由一念之淸明必堅固其力使之念念淸明初則信心之甚篤必堅固其力使之永久其信至於全體皆道眞信無息造到無思無慮無作無爲之天卽是先天之境於此乃得祖炁之因赤文之實不然一念之淸明不勝其萬念之黑暗暫時之信受不勝其無盡之戕賊及乎人罹惡報乃曰爲善無益持經無用罪上加罪何日解免悔不常悔何時出離經云初雖信受後復慢易善惡童子上奏三官以受種種苦報明乎信心不堅固之罪也諸念不生萬緣頓息則非慢易者比矣塵沙惡業隨心消散一切災魔自然殄滅明乎堅固信心者之大功德也此皆是實事實報未嘗或誣再就經文而思之退悔道心者死後沉淪地獄决然之事若於眼前道心旣退則其身中口中心中無往非造惡之所眼耳鼻舌身意何能有淸淨之根以惡召禍以禍償惡故身業則致害於身口業則致害於口心業則致害於心况六根不淨則萬惡咸聚萬苦交煎卽三惡道之根本也則畔經者見世受報何待後來故尊是經爲諸經之王有大利益則種種不可思議功德而求無比最上玅法者不能外是經矣非人勿示其卽謂此信心之不堅固者乎箋釋玄天上帝曰咄哉眾生敢大膽輕經慢典惟茲㝠府爲上天收獄加刑夫上帝恩深乃垂此煌煌之上法天尊慈憫全賴茲赫赫之天經不惟成聖成賢接引人超昇天界亦以消災解厄庶免爾逢遇雷霆萬劫幽陰一念之淸明頓解千層苦海道心之退悔彌深良由自撥本根則花葉枝柯何靠枉抛珠玉則艱難困苦相尋不修三業不淨六根處處皆蠶叢鳥道難見三光難容兩大層層皆血浪寒冰或爲水火漂焚總是逆陰陽之運或爲虎狼噉食全因害億兆爲能納人於罟擭䧟阱之中報在推落崖岸奸心設魑魅魍魎之計償以呑咽銅針讐對𡨚家疾善如讐之報癰疽疥癩當天呌苦無音説不盡種種因緣皆由退道任憑爾時時疼痛難轉吾心蓋地獄冥冥或難見信須當前之共警天威赫赫法在必懲看雷令之親臨正陽帝君曰眾生困在三惡道輕經慢法是其因層層地獄俱親厯種種𡨚家報爾身百苦交煎何日解萬年墮落少人尋諸經之王功德大解免皈誠莫悔心麻祖元君曰太陽一現萬方明一點眞心萬罪淸何故違心頻變計居然退道失眞情三官黑簿須添計東極靑編早落名自此人間千萬苦交攻總爲把經輕文昌帝君曰五刑之屬有三千玉律金科更可憐一墮幽陰須萬劫難逢日月有千年人無可取違眞道罪莫大於讟上天桎梏堅牢羅網密自家退悔自家纏孚佑帝君曰萬典千經爲救人尊經一部更爲神奈何退悔淸明意遂使幽牢纏害身解脫雖然難藉口轉移還要自修因從茲穩坐靈山塔消盡𡨚魔拜帝眞斗母天尊頌曰覓得衣珠什襲深藏塵緣淨處萬載輝光若諸天人五衰四相輪迴侵逼能捨除妄想受持是經坐招自然天福益固身度三界與道常存是此經典無與等無能勝是大威德大神咒能令一切枯槁便生枝葉花果茂盛能除眾生極重苦惱能令短命眾生而得長夀此經功德不可思議歎莫能盡若不宿植道種廣種福業乃至名字亦不得聞何况得見是經依三洞眞格八萬劫一傳此淸都至眞上聖所寶秘於玉京金闕宸宫甚爲微玅難可得遇此經宿有仙骨當爲九天眞仙之人得遇斯文承斯緣故後當齎金寶從師告盟受之方當承機應運乃可付焉不得輕泄敬之愼之傳授不易章第四十五天師張眞人曰經法之顯晦關乎道運之通塞夫道自流行於宇宙之間何以云有通有塞則氣運爲之也蓋道本先天無極無爲因氣機之動以爲動因氣機之靜以爲靜故氣運當其通則斯道因之而明氣運當其塞則斯道因之而晦此一定之理也故天地因道建立萬物乘運發育而仙聖神靈亦乘機應運以揚道化儒釋二教經書因方化導隨人授受不有隱秘處處流通惟吾玄門斡運陰陽主張造化以保天地之玄根而維持無盡之劫運故金書玉篆秘於玄都不得輕洩考大度人之眞文則六萬劫一傳此經則八萬劫一傳八萬劫者蓋謂玉帝自浩劫以來修行證果經八萬劫自子字起每三字爲一劫此可易量乎天地一開則此文一傳此文傳於下世斯人方得乘機應運藉此證眞故道藏有準度二十四萬人之語過此數之後已當未字末會則氣機將塞道運將晦矣彼時氣機不全道將隱晦仙聖神靈至此不能度人卽修之者亦不能上昇矣茲幸猶當盛世道運亨通但能回心向道愛此時光速叅性命早求解脫以充彼二十四萬人之數中自與大道同符在當初墮下一點靈光至此復還統體太極之内而全先天之祖炁永免墮落於幽陰矣然而石火電光之中誰是能保此淸明者慾海愛河之中誰是能迴頭到岸者夫大道本欲徧傳而人之根器有殊大眾皆可昇度而人之緣分各別道不可輕洩而又不可私匿故仙之求人更甚於人之求仙果有仙骨當爲九天眞仙之人自然得遇是眞文而修奉之則心在道中身全萬德其緣大矣自有眞師當機一撥口訣親付盟誓而修入室用功密密結搆故曰乘機應運乃可付焉此章從化度天人説起以明天人尙欲藉此經以求超脫輪迴况世人乎於是再爲稱歎是經不易聞見不易傳授以引誘乎學人箋釋正陽帝君曰大道流行斯天地有開通之候眞機運轉斯乾坤有合撰之符念自太極未分則陰陽五行渾淪無迹一自後天啟運則日月萬象燦爛非虛其實先天隱於後天之中莫謂洪濛太遠所以無極存乎太極之内須知義理無殊教啟玄宗有性命雙修之訣經傳本行存神靈赤炁之書是有玄根兩儀之迭運因之不息總歸帝德金丹之要旨於焉不誣大放光明知機者卽承光於玉鼎天傳神咒知時者卽寫咒於金鑪歸眞炁於十方天眞護道説玅經於五品道玅非虛元始讚揚八萬劫一傳之典當重羣眞傳授三千界獨出之人當扶齎金寶以從師自己家珍非是眞師愛寶符靈圖而應運低言口授全因氣運開圖密密鍊密密修不得輕泄層層功層層候全恃天樞不可思議之功不可思議之德歎莫能盡若非宿有仙分若非宿有仙骨亶其然乎故得人而傳依三洞之眞格蓋上聖所寶秘九天之玄都試看天人四相五衰不畏輪迴侵逼雖然塵俗五行三界居然解脫安居莫愁傳授爲難惟宿植乎道種自可慈悲普及看穩坐乎鸞輿白祖仙師曰玉帝生於浩劫前今修八萬有餘年尊經至此方行世得者斯能證九天金寶從師承口授吿盟度世契眞玄眞師規格依三洞不是仙胎不妄傳何祖元君曰天人何故轉輪迴未鍊金丹墮下來三卷尊經能受誦大羅天境可延捱勸君早具仙人骨與我同看劫仭臺八萬劫傳須愼重赤文速速結靈胎文昌帝君曰誰是九天仙子骨從師傳得玉皇經曽經八萬春秋永早度天人𡻕月新金寶齎來鑪鼎物吿盟發願性情眞從茲不畏輪迴逼丹果瓊花喜遇春孚佑帝君曰一臨壇席笑嘻嘻此意人間總不知大道有傳傳不朽求眞如子子偏奇吿盟何用齎金寶附耳偏然有帝師三界輪迴堪解脫瓊花先奪上林枝斗母天尊頌曰八萬餘劫赤文一出吿盟親傳宿有仙骨於是天尊重宣此義爲説偈曰設使江河水波浪能生蓮慈烏毛能白如經故難遇設使龜生毛堪採爲衣服夜月能消冰如經故難遇設使蚊蠓足堪搆爲舟橋能載一切重如經故難遇設使黃口雀能啣諸太山擲之他方界如經故難遇設使一葉舟力能載崑崙浮渡於大海如經故難遇設使諸水蛭口能生巨齒其大如象牙如經故難遇設使蓬蒿葉能覆無鞅界蔭庇無鞅眾如經故難遇設使烏梟類同樹一巢棲啣食共相飼如經故難遇設使兔生角堪用爲梯磴上窮有頂天如經故難遇設使鼷鼠等緣於兔角梯至天能食月如經故難遇設使驢顏脣色如蘋婆果復能作歌舞如經故難遇設使蠅蟲等能飲鍾石酒迷荒而沉醉如經故難遇玄機無礙章第四十六天師張眞人曰惟宇宙之無窮莫非一元道化歎機緘之旣轉斯成有象眞形神矣天經形形色色包含無盡奇哉帝力刹刹塵塵充塞莫圉試看天地之間何所不有須信神奇之事原匪無徵夫至味無味至文無文故先天歸於平淡乃不靈而靈不幻而幻這玄機更覺分明要皆一道之所爲乃百出而不竭蓋此玅道原巳塞滿天地知無一物不在大道之中惟茲玄理旣能生成民物自爾萬變皆有玄機之運活潑潑觸動處卽是眞靈看種種發現時皆成玅道所以大可爲小小可爲大有者能無無者能有造形隨心蠢者能靈靈者更靈弱者能强强者更强生成如意於是鳥獸草木各成其性而可互相爲用山林河海各效其靈而更交呈其變以此爲圓則眞無缺䧟之處以此爲滿則眞無間隙之時説不盡般般靈異讚不完種種神奇隨手拈來皆關玅緒舉目望處盡是靈機允矣頭頭是道誠哉面面靈通玄莫玄於此矣功更何有礙焉眞是泥丸土塊皆放光明馬勃牛溲盡成丹藥故根朽樹可以結果而開花頑石層崖可以點頭而飲羽怪事紛然更幻於齊諧之記矣然讀此偈者當知道之靈玅變幻無窮取擕不竭而在上帝則造化在手運用皆神卽以此種種奇事形容大道之靈機卽以此種種之靈機形容眞經之難遇體用互顯事理皆神誠能遍觀而有悟焉則知此經之玄機無礙卽知大道之玄機無礙矣偈中比喻玄玅今不能徧釋之請諸眞分解之以示學人是望箋釋正陽帝君曰鯨波湧十丈之紅蓮根株更穩古木棲聯巢之烏雀潔白生輝卜則灼龜長羽翰而六銖可服人欣望月掃霜雪而一陽來歸莫笑蚊蠓足可任人來往不輕黃雀山須任彼推移崑崙爲萬嶺之宗在泥洹直如一葉象王爲百獸之長其牙齒不如蝤蠐人𠷣飛蓬不賓放神通則須彌可覆最恨黠梟食母感孝鳥則反哺同飛奇矣瓊蟾不踏雲梯而朝玉闕怪哉鼷鼠竟隨兎角而拜嫦娥有子題驢能變色而共相歡笑看蠅入甕竟沉酣而不望提擕凡此皆人間之奇事而亦動古聖之品題以之形道則不測之機緘互顯形形色色以之讚經則無雙之靈玅居然怪怪奇奇乃知天地之間無所不有惟在聰明之子自爲叅稽麻祖元君曰江河波浪能生蓮穩坐如來更自然反哺憂親毛變白演疇致主服當玄淩陰深錮日長至蚊蚋頻驅夜泛船天機秘秘誰人識山禽黃口莫輕傳白祖仙師曰太山一夜載虛舟逆溯崑崙上上頭爲探河源防蛭齒還從象罔看靈榴無鞅世界蓬蒿葉莫大須彌燕子樓鳥鼠同穴山下過天機叅悟正夷猶文昌帝君曰玉蟾引爾去朝天鼷鼠相爭亦枉然月到滿時餐桂子梅當尋處著驢鞭蘋婆難比瓊林杏歌舞還圍御苑仙洗髓伐毛非一日天機到處自生妍孚佑帝君曰三醉岳陽人不識洞庭回首望紅蓮龜毛兎角皆虛語黃雀蚊蠓不許喧承載崑崙力比象包含大海量同天莫管烏梟食蓬葉給騶賜果拜君前斗母天尊頌曰道化敷揚處處生光惟靈惟玅無上瓊章爾時天尊宣説偈已普告四眾是故持是經人名功德身一切有情被其蔭故持是經人名神通身一切吉祥咸臻集故持是經人名淸淨身是諸惡業不能侵故持是經人名威德身天魔異道不能攝故持是經人名無等身上帝謠唱萬神敬故持是經人名堅固身惡劫大難不能損故持是經人名道藏身口出語言鬼神仰故持是經人名慈悲身六道眾生賴其善故持是經人名大道身出入所在無畏怖故持是經人名良醫身善行玅法安樂人故持是經人名光明身常爲帝光所攝受故持是經人名自在身天宫玅境神能遊故持經功德説不可盡勤修證位章第四十七天師張眞人曰上文言傳授不易又言機會難遇幸得聞是經法遇此機會請於石火電光之中急速受持振拔於五濁惡世之内留此眞身身從道來還從道去身從太極分形而來還從太極合形而去保守眞主尋求祖炁以證天階大眾果能信及則禮帝爲師受持經文夫經卽帝身受持是經卽是親奉是帝則帝之道德我亦得而全具之矣帝現光明無量之身而我亦自然顯露法身法本無盡故身亦無盡修明一德顯露一法則化現一身修明萬德顯露萬法則化現萬身佛家以三身圓備而證大覺蓋萬劫眞常不動之本體名淸淨法身卽玄家之祖炁也以當前實證實具實受實修之體爲圓滿報身卽此時修因種果之身也千百億化身卽謂後來萬德周圓萬化隨心萬方救度萬劫流行之體也彼其證大覺時各以自家圓滿功德證名法號故楞嚴會上二十五位大士各明圓通以表法位况萬德周身千百億化身者其名位可易量乎我元始天尊十方化號度人無盡懿號𡽪稱無窮無盡具載法典實有可證雖然持經者旣奉萬德周身之帝則一人已備萬德似當證位無量然頌揚者只以十號圓滿該之故天尊開示證位亦只以十二身槪之人苟能傳授經法遇此機會則當速修速證變凡體爲聖體自轉色身爲道身無位之眞人廣錫無量之懿號非虛擬也至於持經者有是修卽有是德有是法卽有是號體用互顯德位相符天尊指示分明無庸贅解箋釋正陽帝君曰大道一元統萬方而布化經功無盡全萬德以周身普功德於有情四方受蔭廣神通而無上百福咸臻惡業盡時則淸淨法身顯露天魔退處則尊嚴威德證眞自少等倫玉勅宣而萬神恭敬安然堅固法身到而大難無因口出語言鬼神敬仰則身爲道藏行皆福善眾生倚賴則號協慈仁大道在身斯出入之時無畏怖良醫頌德因安樂之法惠黎民蓋嘗攝受於帝光可謂光明無礙抑且神遊於玅境無慚自在瓊眞法號無窮須憑眞功爲據休稱相協實徵本性惟均浩大經功收緣結果輝煌帝訓變俗爲神吾綴淸辭以示後不欺無位之眞人九天應元雷祖天尊曰功德神通淸淨身無上威德無等倫玅體堅貞袪大難赤書宣布動羣神慈悲道體良醫法上帝光明自在人種種𡽪稱全是德眞經成就出凡塵玄天上帝曰尊經讀得最爲神一個人超十二身有情吉慶咸臻集惡道天魔敢等倫遇難有神爲眾賴逢驚施藥布皇仁天宫玅境神遊處萬德周身號聖人文昌帝君曰萬德周身是帝尊尊經秘義示千門勤修果位超無上圓滿神通絶語言從此萬方揚萬化只憑乾德運乾坤𡽪稱十二還難盡略示人間玅法門孚佑帝君曰千百億身無盡藏還從本體覔良因祖炁先天無一物赤文神咒役羣神莫向他方求治績只憑帝典認吾眞慈憫天尊今授記瓊樓十二坐凡身斗母天尊頌曰帝經修奉道在一身萬方化現萬劫良因又若道士至人能結壇誦經著新淨衣於夜半後閴寂獨處淸淨室中叩齒九通東向端坐誦詠是經於是時也太眞御几玉𡚱拂筵萬神班列諸天臨壇三界侍衞五帝司迎然後閉目靜思存想是經不覺身處五雲之内俄見其身光明赫奕上昇天宫眾眞下迎心有所請一切應奉仙丹玅寶隨意自得故當依科閉心奉行此經乃至三世金仙十方大聖皆從此經依按修奉故頓得超證無上玅道遵式證度章第四十八天師張眞人曰玄家玅法本於天機無非道化卽莫非眞性眞命眞實不虛神靈有驗原無影響之談亦非機鋒逗㨗皆是仙聖自己親身閱厯有功有效以其所得力望學人用力以同證無上玅道凡一切經典皆然而在此機會難逢傳授不易之心法更覺神奇更覺奥玅以一理而貫三才以一心而通萬象千靈默助萬神護衞保固玄根凝合赤炁其工夫效驗必有超出一切者吾自得力於是經乃知句句皆是本體句句皆是工夫句句皆是玅用卽句句皆是秘秘口訣而此章者又口訣中之口訣也卒之口訣秘秘要當心受故再卽法事以顯玅理卽實境以俟叅悟簡簡數言而一經中本體工夫效驗運用之法胥歸結於此可謂叮喧旦血吿戒良工心苦矣今略説之首云道士至人則是道體全具德行神明當證九天眞仙之位者能結壇界已是法天像地供養眞宰契合法王前後左右不染一塵著新淨衣已能内外眞白全露淸淨法體於夜半後子時則取一陽來復之候冺棄聞見屏絶世累叩齒九通以集陽神東向端坐以受生氣口中持念如是眞訣則己身先天至陽之炁現而太眞御几己身先天純陰之炁現而玉𡚱拂筵已身先天萬炁皆靈而萬神班列於是上宫之眞靈下觀三界之天人皈命五德純備五炁朝元而五帝司迎矣於斯時也垂簾下視無作無爲全以神會故惟靜思存想天宫玅境森然現前仙靈降眞所願應奉吾之得無上之仙丹成天地之至寶其在此時乎此等科法眞是秘密口訣得之者自當死心踏地實力奉行天尊又引三世金仙十方大聖以爲明證見凡超證無上玅道者只有此一法餘二卽非眞篤信眞功滿上界作仙人箋釋正陽帝君曰從來玅典玄科全從口授天機眞訣豈許人窺羽士道流庸下者徒安口食凡夫俗子乖張者還售奸欺憑爐火以結壇水銀硃砂積成鉛汞耗資財而結界諷經禮懴妄想提擕甚且打坐叅禪寂想猶思證果盲修瞎鍊何須再拜眞師不知本體不明空説明心見性工夫未實何能靜坐默思夫仙眞未示眞傳任你豪傑英雄終歸一死况上天未錫恩澤憑你按摩吐納轉益羣疑試思道本先天惟復還乎祖炁德歸帝典自叅悟而矜持從此進修功德無上由茲證度實有可期普勸道士至人種德平生感格天眞求口訣試看金仙大聖遵科修奉傳燈學者共言辭五色雲中吾輩朝朝勤接引尊經壇裏何人實實去修爲借詮經而示訓冀學者之深知麻祖元君曰傳來口訣做眞仙至此方知大道玄赤炁凝時還祖炁後天定處復先天玅寶神丹隨意得金仙大聖共心傳師恩無盡眞難報酌水獻花拜几筵白祖仙師曰元始天尊玅道玄尊經一部卽眞傳向東端坐朝生氣得訣密修感萬天三世金仙皆一道十方大聖契言詮五雲之内光明合䖍誠禮謝至尊前文昌帝君曰千經萬典皆歸道三世諸佛總是仙不有眞師來指引枉費工夫拜几筵個裏玄機惟一撥壺中春色有千年天尊口訣皇經是按法遵科自契玄孚佑帝君曰萬典千經皆口訣學人不悟自生疑暗中一撥還須我個裏通玄不靠師几後筵前皆有聖爐高鼎下要無差金光赫奕卿雲擁大聖金仙還是誰斗母天尊頌曰千聖同途三教同居赤文有式密密臨爐是此帝也諸佛之師眾聖之王是故凡夫值遇是經致五帝輔翼召使神仙御役神官運導陰陽千靈敬仰萬神懾伏百邪避路羣魔束形命過之後卽得南宫受鍊飛步上淸逍遙自在與道常存與道常存章第四十九天師張眞人曰大矣哉其道乎生天地生仙佛生聖賢生人物綱維宇宙無一物不在無一時或息得之者保萬劫不死失之者無一息可活修之鍊之卽是靈丹採之取之卽爲玅藥任千經萬典説之不盡到無思無慮或可摸著太上不知其名强名之曰道梵天不能立其名强字之曰佛以其神化不可測度强謂之曰聖神以其永劫長存而號之曰仙靈以玉皇上帝像其本體以元始天尊像其本眞而二聖人之精神命脉不嫌説與大眾以爲還元之本乃成爲此經然則經非言此乎諸佛不能外此而別有眞傳眾聖不能舍此而別有威權讚之曰諸佛之師眾聖之王固以是帝主宰綱維乎此以御天五帝輔翼爲此也千靈敬仰爲此也卽萬神懾伏百邪避路羣魔束形亦莫不爲此也此者何也道也道在經則經卽道也召使神仙御役神官皆所以運導陰陽莫非爲此道維持補救整運而發光勤行修奉之人則是道已全於其身彼其身非凡人矣非世間人矣將見南宫受鍊而佩服眞文飛步上淸而朝謁乎玉宸於是道之眞常本體旣相傳於萬劫以前之萬劫而仍在自必流通於萬劫以後之萬劫而愈新是何如之夀量是何如之元神而此讀經者之法身眞體亦將與之永永而同春箋釋正陽帝君曰大道一元其量無邊陰陽迭運今古相傳氣之重濁下凝者爲地氣之輕淸上浮者爲天日月五星麗天而成象崑崙四海附地而無遷開闢以來人物紛繁聖人首出結繩而後典籍分明教法昭宣雖三教之不同其主宰胥由乎上帝卽千經之互異其歸趨惟重乎玉篇何處無仙靈併爲功於玅道四方有教化皆默運乎眞玄所以明道開天有本體有大用皆必明爲指示况且統天行道無窮盡無歇息自當永此𡻕年十二萬九千餘年之春秋爲之添籌者何氏三百八十四分度之顏貌相與同老者皆仙夀量無窮有其父必有其子精神不朽若者聖若者爲賢吩咐學人佩赤文乃可益算傳留爾輩得赤炁自可延年稱爲諸佛之師眾聖之王不過以此經爲口訣保爾南宫受鍊上淸受籙要當奉帝勅爲眞詮元始之言信矣帝君之解眞焉與道長存值遇是經者有分得經飛步有心大道者勉旃何祖元君曰道包天地人三才萬聖千眞孕毓來不老靈根常作主會分赤炁早成胎無春無夏無寒冷無愁無苦無悲哀逍遙自在千千𡻕日日相擕笑幾回長春杜眞人曰一貫眞傳孔氏書於今上帝啟靈圖眞經眞法皆言道天理天年也在儒漢武枉尋千𡻕藥秦皇空想萬年謨赤文在手春秋永別有乾坤貯玉壺文昌帝君曰延來三萬六千日共喜春秋有百年誰信天宮新日月無窮聖力永坤乾瀛洲慣食蟠桃果元始恒膺玉籙篇上古厯元推甲子我侍天皇御几前孚佑帝君曰羣仙惟我有奇思翻案偏然有玅辭那管春秋過十萬只將旦暮以窺之全憑赤炁爲靈藥那有閒心種紫芝玅道纔爲眞父母精神力量庇佳兒斗母天尊頌曰先天夀量無春無秋跨鶴登雲玉壺優游又設復世間眾生曽聞是經心常渴仰能於家中擇淸淨處畫帝尊像日夜䖍䖍晨昏濟濟香花燈果尊重供養稱名瞻禮是人當得三十種上玅功德勸發信受章第五十天師張眞人曰天尊慈憫大露天機將玉皇尊帝種種功德種種神通本體玅用精神命脉合盤托出又恐眾生不信説盡種種神玅種種靈驗以引誘之豈天宫清閒偏管此閒事乎總爲眾生墮於苦海不想拔出反視爲安樂之地何異食河魨之美味俄頃戕生飲鴆酒之馨香必傷性命生前不信鬼神死後懊悔不來壯年不肯回心老病徒然呌苦試思自古及今厯盡多少春秋成就多少賢聖而此一身何爲仍然煩惱若説無緣除去禽獸但有人身者卽是有緣若推不閒但淨心地時卽是淸閒人人本有之玅道不能自悟上帝爲之啟悟人人可證之玅果不能信及上天爲之引誘則此經者全是自己一段靈光經中所説如光明如天香如玅音如寶蓋皆與自己本來性體流通而神咒赤文卽本來性體之靈異也惟其如是所以舉心動念與上天通運用周旋有上天鑒善惡分明報應不爽俱是自己感召而福之降也上天代爲之喜禍之降也上天代爲之悲世人一生之中自生至死自幼至老無時不臨鑒於上天而人乃欲脫逃而躱避不思上帝雖穆處天宫人無見聞不知舉頭卽在所謂湛湛靑色者非帝乎此部經卽湛湛靑色者之寶誥也則天尊叮喧旦血吿戒惟恐一人不知此等大緣説已盡矣人自得而信之矣而又再説勸發信受一章值遇此經而不肯瞻禮受持者非人也見受持此經而非笑之者非人也然猶望乎共發慈心普爲勸諭必使帝光無不徧及無不化度以慰天尊上帝之天心是望一瓣心香一縷烟乘風飛達至尊前至誠引得天香出瑞氣氤氲播九天一心花開處供天經五色紛敷大地馨寶蓋周遮添一朶春光萬載共安甯二智慧光明卽是燈舒華結蕊彩雲騰帝光下鑒遙相接好與同心一日昇三交棃火棗飛騰藥此果隨身色亦丹滿貯玉壺充貢物龍章殊錫下翔鸞四箋釋九天應元雷祖天尊曰大道降眞此地校非常玅典玉皇開化羣生遇無上瑤篇喜萬聖千眞共發慈悲而解釋看五品三卷必須刋刻以流傳得遇是經者坐招天福得聞是典者早脫塵緣普願眾生莫負此般提接豈無善士有心是典眞玄能於家中擇淸淨處誦經瞻禮必於世上得三十種受福綿延所以皈命一心必晨昏之濟濟開函頻誦須日夜之䖍䖍借物抒誠丹果共法燈交映隨心供養名香間玉蕊生妍舉目靑天湛湛光明卽帝座護持心地常常淸淨是經筵從此帝座相通百福駢臻而千祥雲集試看經筵滿願三天詔下而萬載春綿報應無差吉慶終歸有道時光難待轉移又待何年天旨非輕讀者信矣雷尊認保見者勉焉協天大帝關聖帝君曰帝恩深重降天經校正將完報帝庭八萬劫來纔一遇五十章内總千靈開函持誦剛三卷其地馨香護萬星三十包盡無窮福皈依瞻禮再莫停正陽帝君曰洗手浴身展法筵晨朝濟濟夜䖍䖍香花燈果隨心供誦詠瞻依一念圓報德酬功三十種延生錫算百千年靈通元始精誠格坐臥皆同拜帝前文昌帝君曰説到沉檀不是香心中至德要敷揚萬華寶蓋天花結一朶瓊英性體芳寶炬琉璃俱是假赤文煥爛乃眞常黃芽長處丹成實誰想人間碩果嘗孚佑帝君曰三十種兮功德滿百千萬種在其中稍酬日夜䖍䖍力略報晨昏濟濟功燈果香花隨力量瞻依誦讀在淵衷莫言凡體無緣分一念精誠帝座通斗母天尊頌曰瓊章勸發無盡天慈功德圓滿實受恩施一者諸仙讚重二者先亡生天三者宿殃解脫四者所往通達五者無盗賊事六者所求遂心七者除水火厄八者橫事潛消九者夜夢吉祥十者疾病不臨十一者智慧聰明十二者人見歡喜十三者衣食豐盛十四者子孫榮貴十五者六親見喜十六者門族和睦十七者除三惡報十八者轉女成男十九者形容端嚴二十者爲國大臣二十一者生爲帝子二十二者鬼神欽仰二十三者得宿命通二十四者諸神護念二十五者九族受蔭二十六者處世長年二十七者有情賴善二十八者魔王保迎二十九者決超三界三十者白日上昇爾時天尊復吿四眾此經功德能碎鐵圍諸山竭苦海水破大地獄拔重罪苦降暴惡魔䕶諸國土能滅一切惡鬼能除一切重病能解一切惡毒能離一切惡人能伏一切毒獸能摧一切邪道一切諸天皆令降伏其餘功德説不可盡功德圓滿章第五十一天師張眞人曰帝典最難持受非人不肯持受總因傳受不易機會又難則有見有聞而能持能受者誠不易得蓋能持受此經則其人之功德吾知必然圓滿非擬議之也試想是經原是發皇上帝之功德上帝之功德本是圓滿處處通達無一空𨻶彼持受此經者是眞能以帝心爲己心備上帝之功德以爲自己之功德自然同一圓滿故天尊分明羅列以佑啟世人比前所説種種善報尤爲眞實不虛此章三十條是言錫福功德長行爾時天尊復吿四眾以下是言救苦功德末句再曰其餘功德説不可盡明明將上帝之圓滿功德悉舉以與人而令其功德圓滿矣在得聞見此經者猶然弗願乎哉上帝深恩無處報只憑案上一爐香換來功德無窮盡滿滿圓圓大吉祥一天體圓圓包萬象地形滿滿塞中央其中有我來扶助全靠天尊上帝光二帝有光明照十方天尊宣説更輝煌持經且荷光明力照破𡨚魔萬世昌三何况鼻中更有香馨香呼吸要端詳鼻端有白終爲幻有此方爲快活方四天香不盡玅音揚徹地通天韻更長往古來今聽逸韻無聲無𦤀有宫商五團團寶蓋結芬芳全是仙家性體裝採得好花勤獻帝黃蜂粉蝶少奔忙六神咒秘傳數十行當年赤炁貯縑緗輕輕付與羣黎讀自此人間保萬昌七天眞保護莫荒唐此係天家大道場玉相金容分體在皇經一部要珍藏八誦讀之人不可傷工夫圓滿上天堂且喜今朝先賜福春光在後更無疆九生機一轉露眞陽好事臨門不必慌從頭至尾與君説莫與他人説短長十天機密密少徬徨事到其間自主張主張大道全由我冷熱寒温要徧嘗十一關門閉戸讀瓊章自有赤書下帝鄕功德與他三十種天神地祗少遺忘十二箋釋正陽帝君曰萬劫千生報不盡上天功德十方三界人須信大道輝光照破幽陰不怕層層慾海潔淸肢體頻聞陣陣天香道體無窮幸尊經盡爲闡發帝光莫量如赤炁無不敷揚發玅音聲自然神驚鬼怕宣圓滿咒立時惡退魔亡到得上獻天花寶蓋結成時少不得我心花攢錦果能䖍遵帝典羣眞覆護處也只要你彝典全彰讀三卷五品之靈文工夫圓滿盡一萬二千之赤字德性輝煌三十種説不盡帝恩廣大百千劫須要信本體悠常功也圓德也圓有始有終可謂漸入佳境報不盡説不盡能解能㧞何難直上天堂種下信根自然能信能受收來福果可知錫福錫祥諸仙讚重以至白日上昇原非異事鐵圍摧碎自然諸魔懾伏更覺周祥朗若列眉須當顧諟應如桴鼓從後商量麻祖元君曰諸仙稱歎好奇哉何故先年墮下來自此宿殃當解脫從茲處處坐春臺一盜賊何因不遂心無端水火亦加臨今宵忽得吉祥夢橫事從茲永不侵二智慧聰明人不如都來歡喜賀安居豐衣足食從茲起有子有孫入仕途三六親自此慶家門九族從今無語言和氣致祥無惡報轉女成男益子孫四容貌端嚴古大臣幫扶帝子事羣神陰陽推算皆前定自有吉神護祖親五處世長年更有情誰道魔王不保迎決然保爾超三界白日高昇朝帝京六何祖元君曰何因讚重有諸仙讀得尊經報祖先先世宿殃皆解脫隨心來往不牽纏一從今盜賊不臨門讀得尊經一世尊水火無情皆永斷潛消橫事受皇恩二年來夢裏不慌張讀得尊經大吉祥疾病不侵肢體泰聰明智慧善文章三見人都是笑顏開讀得尊經善氣回衣食無端豐且盛子孫榮耀列三台四六親再無閒言語讀得尊經感動眞門族於茲永和睦三般惡報不沾身五轉女成男主何因讀得尊經感吉神換得形容端且正且許將來作大臣六生來富貴是天潢讀得尊經鬼亦驚命裏諸神皆護念甯憂世代不膺榮七平安處世享長年讀得尊經契上天莫説有情皆賴善魔王保舉帝尊前八決然超證出三界讀得尊經白日昇功德周圓三十種也虧花果與香燈九文昌帝君曰種種功兮種種德百千萬億説難全三十分明合地數人間享受並非天一天宫報應更分明萬載千秋樂自然玉皇案畔天花舞親手燒香散瑞烟二帝主分身我亦分分身也是雲中君與帝方方施教化大千世界好宏文三玅音動處十方驚朶朶天花獻玉京三十六天花盡放團團結蓋護昇平四帝德神兮咒力神圓圓滿滿御羣眞天尊親手咸傳汝保衞當朝作大臣五保衞維持盡十方神仙兵馬更無鞅工夫做到圓通處水遶山環盡吉祥六功圓行滿跨翔鸞隊隊霓旌下廣寒接引持經皈道者帝前好獻大還丹七説到經功眞無盡千秋厯劫亦難完上天福報原非假若不讀經難上難八孚佑帝君曰三十種功還嫌少帝君道大德同天果然要辦眞功德乃得天家福滿圓一吩咐寰中苦眾生焚香稽首望瑤京尊經一部咸持誦天風來接步虛聲二有頓挫兮有抑揚聲聲羽角協宫商天宫感得天皇喜玉女飄來滿地香三從此凡身成玉骨赤文赤炁好商量大圓滿咒功無盡句句天音普萬方四普萬方兮化萬身尊經皆爲度斯人我身旣得䖍持奉有日朝天棄俗塵五棄得俗塵性體明金芽玉蕊擁羣英馨香上獻原無礙寶蓋於茲結得成六帡幪萬有徧羣生普被於茲慶太平功德分明圓且滿神仙護持有天兵七一德周圓萬德眞萬德全處萬功神若少勤修持誦力虛花一世枉爲人八斗母天尊頌曰報德酬功福庇無窮天經靈異親到帝宫爾時道場大眾金仙菩薩眞聖眷屬聞是説已歡喜踴躍稽首敬禮而作頌曰大哉至道無宗上眞上度諸天下濟幽魂上無祖師惟道爲身丹臺紫府金闕玉京秘此玅法溥福含靈滅我萬罪増我遐齡萬神朝禮魔王保迎功德昌盛黃籙書名𣺌𣺌億劫使我長存於是眾等説是頌畢稽首皈依奉辭而退收緣結經章第五十二天師張眞人曰天尊説經至此道體圓滿功德圓滿可謂闡發詳盡無以加矣而天尊以爲猶未説盡何以言之上卷説功德時明明説窮劫難言前章末亦説其餘功德説不可盡夫功德難言以道體之本難言也道體難盡不惟天尊難盡言卽上帝分身萬億説法萬億劫亦説之不盡也然道雖無盡前已説過氣有陰陽機有動靜自然有始終之運有開閤之候斯又一定之理也卽如子會生天丑會生地寅會生人到戍亥之會必有下落然而到子會又生天矣收緣有日生生不窮在天地之大數且然何况説法度人亦不過望其收緣而結果然則讀經者不望到收緣結果之時則一部尊經依然錯過此處要當猛省悟入尋思體貼天尊上帝何以説法何以放光何以示大神咒何以示種種功德非望其收緣而結果乎雖然到底收緣何在結果何在天師莫要誤人請觀下面太極原含陰與陽陰陽會合我中央靈光一點同天地萬彙於茲大吉昌一這點靈光卽是果此果成時遍地芳任他落在塵埃裏恐怕千年苦莫當二苦莫當兮也要當上有雷霆下𨶒王饒君經厯千千劫這段靈光苦未忘三這段靈光是何人四肢百骸此爲眞雖然墮落神靈在萬劫千生徒染塵四不染纎塵卽是仙這段靈光到底全收拾靈光要藥物五行顚倒立坤乾五上有乾兮下有坤鼎新重建契玄元總要靈光安置好自然雷鼓動天門六靈光卽是赤文化赤文字字寫分明劫後劫前原有我造業何爲要滿盈七從今潔淨讀天經放下屠刀立地靈上帝自來傳口訣立地教君到帝庭八到得帝庭是收緣結得金丹果自圓算來總要尊經力圓滿之時夀萬年九箋釋正陽帝君曰無上慈悲大道場金仙眾聖遶中央詮經詮到成功日喜喜歡歡拜帝光一大哉至道本無宗諸地諸天一氣中師祖原來歸元始原有眞身在帝躬二丹臺紫府秘眞法金闕玉京貯帝經溥福含靈滅萬罪誦持靈處益遐齡三萬神朝兮萬魔迎功德自此著天經羣仙校對天皇案黃籙篇中寫姓名四從茲十萬有餘年暮暮朝朝在帝前迴首塵寰惟浩歎何人如我得朝天五説到朝天非容易也須勤苦幾多春世上萬般歡樂事不敢微沾一點塵六塵緣棄盡顯光芒淸淨家風自己當冷冷淸淸多少日今朝始得朝元皇七皇宫綺麗更輝煌日月雲霞玉座傍還有皇𡚱拂玉几時時布散滿天香八麻祖元君曰天尊説法完三卷五品五十零二章包盡古今賢與聖都呈瑞氣散天香一一萬二千三十六字字俱從赤炁文文中傳得長生訣見者俱能拜紫宸二五千四十零八數圓滿之時也自豪報上天庭天顏喜誥命重重下九霄三九九八十單一數工夫火候要周全個中交結分文武毫髮差殊難作仙四白祖仙師曰上中下卷按三才五品全將五行排五十二數河洛理龜書馬圖鳳啣來一一萬二千三十六星辰日月共雷霆山河大地都安頓還引羣生上帝庭二相傳藏數要分明五千四十八纔盈但能一念精誠接爲數無多感玉京三十二萬九千餘年終始包完地與天果有眞功還赤炁保君不與劫牽連文昌帝君曰放光之後又分身處處開天又化民到得瓊花結成蓋那時方悟本來因一神仙兵馬護無鞅總爲斯人得帝光帝光圓滿成功德三十六種快活方二五方五老早歸元笑彼六天不是門天尊慈憫赤文出淸甯萬劫鎭乾坤三列品分章皆有數可知火候難差殊収緣結果丹成熟圓湛如天裹地輿四孚佑帝君曰天開子兮地闢丑人生寅兮今到午未字將完最可憐酉兮戍兮難鼓舞一儒家有道在綱常佛示眞空奥旨藏惟有玄門眞性命劫前劫後放毫光二四大部洲何處好神州赤縣好安身禮樂文章叅造化堯天舜日共長春三意貌堂堂是丈夫筆花墨彩號通儒如何不讀皇經奥𡻕序如流日月除四斗母天尊頌曰三卷五品玉皇尊經收緣結果稽首天庭太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷下終先天斗母大聖元君圓明天尊勅命曰混沌一元分剖時開天立地煇煌三教興隆處覺世牖民可惜別戸分門不能合一因之交譏互詆胥失本眞况在教啟玄宗玄玅寄於符籙須信天垂大化靈通全是鬼神雖明示綱常必神其機於感應故幽爲主宰皆玅其用於明禋信之者祠禴嘗烝不忒猶不廢乎朝乾夕惕疑之者雷霆雨露皆虛更何有於日月星辰究之疑惑一心雖寶籙金章弗信信從無志雖神言天語無因然而福善禍淫皇天有道予災錫慶萬古如新茲者校正天經諸子不惜維艱之力幸覩闡揚大道攴天何嫌示訓之諄嘗念道卽先天爲後天之根本道歸金闕宏玉闕之慈仁以形體言謂之天實有主宰之帝以性情言謂之乾須歸默運之神流衍玄綱歸一人之有道維持劫會賴上帝以長春堂哉皇哉玉帝爲賢聖神靈之統至矣盡矣皇經爲語言文字之精雖玄典實範圍乎儒釋幸天言同震動乎雷霆上可以保持國祚翊佑皇躬當億劫萬年不息中可以順正星辰安奠河嶽爲四洲八極效靈下則保護人民遂生復性廣則繼持劫運太順太甯其奥玅關係天地之玄根雲篆紛敷皆赤炁其精微散作生靈之恒性赤書開闡駐黃庭禮樂詩書皆此眞機運用華嚴般若莫非是理昭明仙靈賢聖同歸昭事上帝此爲要訣古今智愚錫極無聲帝載此有眞形一萬二千三十六之靈書字字雕金言言刻玉一藏五千四十八之秘受煌煌赤日朗朗明星萬德周身滴滴歸源其薪傳傳諸人世十方化號玄玄晏坐其本體體在幽冥合一元十二萬九千有餘年皆是天皇治理總周天三百六十五度四分莫非是帝神靈大哉四大部洲胥歸道化奇哉一小民命皆奉天經茲當熙朝泰運聖帝乘乾當綿太平之機於不朽應溥湛恩之於無邊保我民人熙熙皞皞永茲德澤綿綿延延所以神明感應帝主降筵文運將啟南天金馬碧雞重肇瑞帝光恒臨北闕靈書赤字示眞傳雲馭共臨乎法席星軺咸降乎南滇惟茲弟子司昭志趨孔孟誦法聖賢屋漏之中廣眾之際神明已經厯試艱苦備嘗力行備至諸天不懈矜憐默啟靈機已成功於校正新沾帝澤當揚播乎言銓統率同志成此金編所望天下英哲天下聖賢收斂才辨聰明叅茲玅典當許千秋嗣續千秋發達皆爲忠孝廉節上奉高天改換心術性情朝眞事帝不斷香燈花果祝國祈年一人受持一家免難原非虛語天子崇奉天下太平總是誠䖍無盡頌揚説之不盡有緣際遇總要天緣莫云受持容易當知錯過眼前誦持者不在木魚淸磬力行者卽是古聖神仙惟爾人民皆自梵天中流出養茲心性何難帝座前聯翩無量度人仙佛有願有情賴善信受無偏不爽休祥何須疑惑自然感應總不顚連咸使聞知布吿中外惟求信受赦除罪愆欽哉備矣朂也愼焉丙寅夏五月斗降之辰十五日諭九天應元雷聲普化天尊示曰夫大道降眞誠千古難逢之會故玄文傳世爲萬天未有之祥况本行集經讚揚上帝圓滿神咒布列威光化被無窮十七光包含盡矣威靈難狀三卷經統攝無疆合觀靈寶無盡之靈文靈通無比統論教法有三之教典教化非常所以諸天敬重大地發揚不能外是典以爲證眞之路且將藉是經以爲御世之方誥命流行萬聖千靈聽命天香噴發芸生庶類皆香分身爲千百億化之身景象放光卽日月星光之肇端且也寶蓋會用歸原帡幪不漏玅音隨風霏玉闡發須完莫奥於玅有玉淸朝叅有路莫顯於人倫日用契合無難句句皆元皇之心印言言是上帝之神丹證以儒典佛經眞機一貫合之大洞道德玅訣同叅是誠修眞之正路而入聖之雲驂然而八萬劫一傳允矣天機難遇三千年再降奇哉帝德非凡憶自子房校正以來差訛不少雖彼眞人接連廣演改正無緣茲者帝澤無垠不遺於四大部洲而中華爲最天光所照不限於一莖草木而人道爲先憫此眾生淪墮三塗五趣垂茲金臂引登樂境高天惜無其人躭擱有曰簡彼有道厯試多年見有弟子司昭者叅究儒宗久爲七曲元皇默鑒考求玄典已蒙先天斗母矜憐諭以䖍開法席潔治經筵芸館淸幽仙聖於焉普降靈機契合朋從也曉眞傳乙丑嘉平垂成寶典丙寅溽暑刻就金編諭其早早流通拔眾生出愛河同登彼岸自此方方持受荷天光卽凡體共證瓊仙莫説聖典玄微擔承不敢莫説天機奥玅翻閱多愆不知奥玅天機可以眞心契合玄微聖典皆從自己敷宣舍自己無位眞人而別求天眞謬之已謬外天宫最靈法典而別求玅法偏而愈偏須信舉動行持原係靈機玅用歌吟誦讀皆爲兎蹄魚筌惟求聞之見之者信而又信莫愁福之庇之者玄而不玄神仙兵馬護持何人上帝不虛勅命讚重超昇三十餘種天尊豈有誑言吾言畢矣敢有不遵刋諸簡末鑒在雷門丙寅夏五月二十四日亥時諭北極玄天上帝蕩魔天尊示曰夫皇經者金闕至尊玉皇上帝之典型也宣自元始天尊金口載之靈寶瓊宫爲玄門第部眞文生成天地法式聖賢流衍玄綱主持劫會修仙入聖之正路而盡性至命之寶筏也昔者傳於漢初留侯張子其家輩輩嗣法主持玄教世出眞人代襲天師目今數十輩矣其家誦習眞本原係太上洞玄靈寶紫微金格正文奈自往代妄爲刪改以惑生民致令受持弗靈眞修未覩甚至肆行詆毁其不致焚於煨燼之中者幾希嗚呼嬴政已往虐熖方熄是亦玄教之厄運而天下後世生民之不幸也茲幸盛朝泰運大道重光國祚當延天恩頻降旣干戈水旱之弗驚看熙皞和祥之致福所以眞機轉運眞法流行眞經迭降眞靈輩出而玉皇本行集經乃見眞本矣經文句句眞訣字字靈機已得諸眞詮解無一剩義矣但在得是經而誦讀受持之者當愛若拱璧奉若蓍蔡恃爲起死回生之路信爲歸根復命之由夙夜寅淸不斷誦閱隨時體認如近天皇果能以絳府心君時通帝座自可以復還祖炁永固命基試想人非禽獸安忍自爲戕賊身具赤文奈何弗知保固見此經而疑惑不信者無緣也見此經而隱秘不傳者斷絶眞道也吾知其罪當如上帝勅命不貸何况妄加改易肆行詆毁吾恐身非木石斷未有敢於試法者至於種種功效種種靈異種種神奇所謂窮劫難言者經中已明言之矣上帝乃又親爲提命詳示規條於前先天斗母雷祖天尊復申論叙於後吾以職分所在再爲眾生吿戒一番然是語也終難爲不信神明者吿也試問昭事對越者何物不愧爾室屋漏者何物且福善禍淫降殃降祥神玅不測轉移自然者又何物天有靈明卽此明神人有靈明卽此眞心斷絶自已之靈明自必外於天地之靈明此卽不信之眾生也若肯返求自已之靈明自能契合天地之靈明此卽有緣之眾生也至於神無不格原非杳𣺌神道設教化育攸關原不得已之事以仙聖淵穆無爲豈願自爲輕褻以致眾生之輕褻乎弟子司昭者非異人也非道士也非禪僧也乃誦法孔孟修明道德之儒人也其誠旣與明神相契合其身自爲靈神所簡拔故降演大洞仙經玉皇尊經皆出其手此卽吾所謂有緣人也茲因彼約同志善士刋刻寶典將成吾復降臨其家而再示之如此信與不信亦在乎人欽哉丙寅秋七月帝降之辰七日平旦諭
