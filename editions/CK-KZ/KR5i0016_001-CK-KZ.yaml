body:
  text: 乙丑十二月二十日戌時諭重刋道藏輯要太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷上玄藴咒大哉元始無量度人演淸淨教登引天眞玄座説法寂然無聲玉帝放光喜慶難言是爲心傳亦曰天根大圓滿咒瑤章洞文集以成書敷落神眞臣今東向誦願與天齊并存亡俱證果永度愛河津淸微天宫神通品第一道言元始天尊昔在淸微天中玉京金闕七寶玄苑玉皇宫殿昇光明座與無鞅數眾宣説靈寶淸淨眞一不二法門應運説法章第一天師張眞人曰元始天尊無上法王是道祖也卽祖炁也玉皇上帝總握萬天卽元始祖炁之所發皇大道之眞身法門之主宰無鞅靈聖之宗師也其實元始祖炁萬天宗主是一是二故在天尊説法之時玉皇宫殿與七寶玄苑淸微天宫互相輝映然非由靈寶淸淨玅道不能透此玄機入斯玅境蓋淸淨則眞一眞一則不二不二乃入法門躬朝上帝而道契玉淸至尊無上粤義開宗高著眼孔至理重重箋釋正陽帝君曰玉淸一現卽是玉皇氤氲祖炁發爲休祥照耀天地一十七光淸微天上巍峩帝鄕玉京山内時有天香玄玄寶座恒演天章這般玅理若個親嘗天樞上宰闡發輝煌羣眞奉命再爲發皇眞機秘密口訣精詳引彼後學直達天堂流傳不息後嗣必昌白祖仙師曰玉帝玉淸本一家淸微玅有兩光華眞機秘訣傳元始道範德輝被海涯金闕巍巍爲帝座玉京朗朗散天花法門無上超無上足下生雲絢彩霞海蟾帝君曰讀得尊經做得仙玉淸玉帝盡通玄法門不二歸眞一至德無鞅總萬天靈寶瓊書參祖炁淸微帝座復先天天師代代眞人出玅法於今要徧傳文昌帝君曰玉京金闕本巍峩上帝天王玅理多萬有羣生歸太極瓊編玉笈隱天和靈臺淨處通靈寶愛慾無沾出愛河莫道文光揚七曲帝光無盡道君哦孚佑帝君曰玄座説法玅無倫大羅天上選羣眞超然無上眞風徧其數無鞅帝座人一部尊經全付汝萬端玅義盡通神往代天師重演法聖朝留得億年春斗母天尊頌曰大道無言三教咸尊經傳元始朝帝有門是時玉皇尊帝與諸眞聖飛天大聖無極神王靈童玉女九千萬人淸齋建節侍在側焉乘機與會章第二天師張眞人曰玉皇尊帝元始之分身總握萬聖還與萬聖尋源返本依然從祖炁而來其實諸眞聖眾又爲玉皇尊帝之分身靈童玉女依然爲玉皇尊帝諸眞聖眾共有共具之眞靈眞秀眞陰眞陽故一齊皆從淸微天宫聽法九千萬人不嫌其多咸集元始會下尙嫌其少淸齋建節禮儀輝煌逐隊成羣忠貞不二蓋元始以心印玉帝玉帝卽以心印諸聖自然嬰姹同靈老陽生生是誠天地開闢以來第一法會讀經者當默會此玄機箋釋玄天上帝曰玉皇尊帝萬聖之宗皆從元始禀具金容汞爲玉女鉛是靈童八十一數玅義重重其光晃朗其氣和融紛紛紜紜惟帝是從返本還元淸微天中元始説法卽在爾躬淸齋純一建節崇隆諸眞聖眾久侍瓊宫上帝招攝恩惠無窮俱在帝心祖炁之功惟皇建極廣博無窮會萬歸一聽法來同九千萬人總一蒼穹天尊演法玅有眞空高高證果永播眞風正陽帝君曰元始説經玉帝聽靈童玉女盡神靈本來一道源流合莫怪羣眞拜舞慇建節揚旛揚至德淸齋仰道仰明君九千萬人皆會集一心一志頌鴻文麻祖元君曰誰爲玉女與靈童自己家珍莫看空但使九千萬人集乃知十七帝光同淸齋建節從天道聽法參玄爲我躬一部尊經何人受帝主分明在絳宫文昌帝君曰元始分身是玉皇高高無上十七光靈童得處從神女眞陰永駐結元陽書傳玅有層層奥氣播坤輿處處香悟得帝身歸祖炁手攀丹桂狀元郎孚佑帝君曰此身卽是帝分身帝身還從玉淸神上蟠下際皆吾道食德飮和盡聖人聽法慇懃還建節淸齋專一試捫心九千萬人皆元始童是眞陽女是陰斗母天尊頌曰結得陰陽讀得瓊章九九數合咫尺帝鄕於是玉帝知時欲至卽於會前舉六通力放大光明徧照諸天無極梵刹一切境界皆大震動十方無極一切世界俱同琉璃玻瓈無有隔礙知時放光章第三天師張眞人曰玉皇尊帝會元始之座聽元始之法卽現元始之神通而照耀元始之法界何莫非元始無礙之光明夫帝身卽道身卽元始之分身不可以常身論然非由常體不能顯露眞體彼在常體能轉六識爲六神通則圓融無礙自然洞徹三界十方上天下地不隔一塵佛國天宫自然感動况玉皇尊帝會元始祖炁無極大道之金身建豎乾坤首出庶物之德範其光明自然昭著如慧曰之照臨如靑天之圓湛究之無聲無臭無色無相乃是玉皇尊帝眞體穆穆深遠冺厥思慮甯有言詮然而包舉六合之力量收攝無極世界之光明自不能掩所以隱顯隨時動正由心其卷而歛之也則渾然一炁不露其端其放而露之也則灼然萬象瑩徹無礙帝德所至之處卽帝光所到之處有何境界可以障礙者乎於戲覩此光明已令人欣歎不已而猶未竟其靈通也有欲近上帝之琉璃玻瓈光者請從是經讀起箋釋正陽帝君曰皇矣上帝大道之樞神通無上照耀坤輿六牕無塵六洞皆虛六根淸淨六塵難拘如中天日如出海珠光明一現萬里無殊琉璃境界亦比玻瓈十方梵刹一氣連枝神力扶天何况羣黎德光返照三境相齊何况十方國界東西或南或北十極穹廬不能收攝同體而居圓明無礙帝德規模知時不違心手相符浩氣包含玉體光敷默朝上帝捧讀瓊書何祖元君曰帝有眞身現六通光明無礙十方同知時乃與眞機應光被無非祖炁融梵刹三千金世界王居百萬玉帡幪三才萬象歸皇極個個發生雨露中白祖仙師曰惟帝高居白玉京上通元始下蓬瀛西天境界歸南極北海鯤鵬到太淸總無一物相隔礙都由聖力太充盈地軸天關輕舉處往來變化任遊行文昌帝君曰稽首吾皇十七光光明放處燭無疆八𡒕八極歸皇極萬炁萬方總上方南北東西金色界木金水火玉龍堂六通聖力神明德證得琉璃到帝鄕孚佑帝君曰帝有眞身顯六通我憑至德玉光融不染一塵彌羅境眞歸三境太微宫琉璃本相玻瓈映身世眞修色象空上天下地遙相接誰云無分步玄穹斗母天尊頌曰聖力開天神光燭地玅境分明眞經夀世十方來眾並乘五色瓊輪琅輿碧輦九色玄龍十絶羽蓋麟舞鳳唱嘯歌嗈嗈靈𡚱散花金童揚烟讚謠洞章浮空而來十方來集章第四天師張眞人曰十方之眾皆自元始一炁分形本與玉皇尊帝同具玅體然而一實萬分則萬有不齊萬殊各異雖與帝同體而流派各別安能返本還元一自帝降恩光普攝無窮於是十方皆能返照聖眾皆能復性乃知玉皇尊帝卽體以攝用十方聖眾卽用以歸體一理流通一氣招攝一光煥朗自然脫去凡塵離彼繫滯且能默運斗車潛轉天輪御九陽之眞氣蔭十方以慶雲由是鳴鸞嗈嗈祥麟隊隊金童爲之揚紫氣玉女爲之布絳華淩空步景浮游三界上天門而朝玉皇尊帝歌洞章以頌帝力於何有是顯用歸體之時非帝光被及不能讀是經者有不欲親近帝光者乎猛省猛省箋釋玄天上帝曰三界十方不知其數聖眾紛紛來集何故爲因有形秀靈全賦玉帝同光玉淸理具物蔽氣拘漸失故步上帝好生天光滿布招攝無窮示光明路見光而來返還本處萬殊會一體正用彰咸朝帝座倍有輝光麟舞鳳唱盡發休祥金童玉女皆服瓊裳鈞音振響逸韻琳琅乘雲爲馭輦道非長飛蓋揚旌已到帝鄕共歌聖德拜禮元皇瞻雲就曰遇此慈航延億萬春尋我眞常天尊訓語捧讀莫忘觀音世尊曰西天佛子到南雲只爲天光布處均一德輝煌無盡劫十方來集帝庭春金童玉女神通大瑞鳳祥麟氣象新寄語學人須鄭重本根原與帝同神正陽帝君曰十方無盡更無邊跨鳳乘龍到帝前不有金童歌法曲安能玉女產眞玄鳳麟皆是靈機毓乘駕莫非正氣傳大洞眞風歸帝典十方來集十方仙文昌帝君曰玉皇總握萬天中光被無邊拜舞同總爲一元無別物自然一日會瓊宫祥麟自可招鳴鳳金女必須接聖童君聖臣賢歸有道九天無處不春風孚佑帝君曰十方久已共蒼虛今曰何因返帝廬總爲色塵傷墮落當從光照覓安居金童玉女皆和協威鳳祥麟入畫圖那怕雲程隔萬里瓊輿來往似通途斗母天尊頌曰遙遙帝京不隔雲程十方來集乃見眞情是時梵天一切金仙大乘菩薩四眾八部承斯光照皆乘碧霞九靈流景飛雲玉輿慶霄四會三辰吐芳飛香八凑旋遶道前雨眾玅花如雲而下徧覆會前金仙普至章第五天師張眞人曰梵天爲釋教歸宿之所金仙卽其所證之體尊重之爲大乘明非二乘之所能及普濟焉爲菩薩明非獨善之所能仰四眾卽其支流派別八部卽其護衞維持似與玄教無涉嗚呼分門別戸三教不能歸宗交謗互嘲一道徒興剌謬泥乎語言文字誰能返本還元不知性命兼修爲大道仙佛同體爲口訣何爲大羅之金仙何爲大乘之法寶本同而末異殊流而滙源故三教之道合之則是離之則非何况乾體金剛卽金丹之本體金身丈六卽金丹之發現所以步九光之霞舒三辰之華八極飛香四維布彩禪理淸淨何故層層皆是玄家玅用况帝身卽是佛身菩薩之心必契上帝之心光明洞達之時自然兩相照耀天花繽紛如雲雲駕浮游來會一氣感通一道同居有深信者自然與毘盧遮那印合箋釋伯陽魏眞人曰梵天釋教號曰如來如如不動好結靈胎金花布彩可上蓬萊金身丈六直上瓊台金蓮萬朶捧獻金階金容有喜選佛場魁休哉帝光照耀八垓三世諸佛咸曰善哉承光覲揚圍繞千迴凌霄殿上許坐無猜本來一理元始栽培毘盧現在孔孟道該擎天玉柱平地良材是眞佛子何用徘徊金門出入九棘三槐娑羅樹下帝德當懷達摩祖師曰玅有雲宫古佛場老僧也去覲恩光萬二千言眞玅典一十七種太輝煌三世諸佛相印證大千沙界共吉祥莫道枯禪難入聖西天不隔白雲鄕正陽帝君曰百種修爲百種殊徒笑空門四果徒豈知上帝心相印自爾朝天理不虛照耀未空佛子國袈裟飛錫聖人都不有金丹甯丈六人身乾體本非誣文昌帝君曰七曲衡文古大儒也從玄釋做工夫法場選佛掄元手帝座昇仙奪錦徒九十七化宏三教百千萬種護皇都尊經法席傳眞道定慧如來卽是吾孚佑帝君曰圓通文尼是道身禪理精微玅無倫雲盡水窮傳眞諦西天南國播皇仁一家何用分玄釋十地甯能外紫宸寶馭雲車朝帝座本來不是外邊人斗母天尊頌曰帝總三教何分玄釋大乘菩薩咸通玉籍是時其光徧照諸天下燭下方無極世界同玄都境凡彼人間上近九天通接交連至親至邇凡彼下方無極世界山陵坡坂溝澗溪谷緬平如掌六合至邇三境非遼天寶臺殿星羅人間瓊瑰羅列朗耀雲衢七寶欄楯以界道路玉樹仙花蒨燦珠實景秀丹田芝草覆綿時彼下方皆見諸天鈞天玅樂隨光旋轉自然振響又復皆見鸞嘯鳳唱飛鳴應節龍戲麟盤翔舞天端諸天寶花零亂散落徧滿道路光照下方章第六天師張眞人曰是卽帝光徧照之處極其量而言之其奥玅處上數章已明可知玉皇尊帝總握萬天主張造化下通萬地生成民物近其光者皆得長生得其光者皆入玅境是以上下有交通之象遠近無隔越之時坡坂山陵皆關道玅草木鳥獸盡啟玄機三境卽在人間城國如在天上六合遼遠不異掌上觀紋萬象森羅皆是天心發現一時人民何慶何幸遊此景化之中不異胥華之國鈞天樂奏皆是一德自然宣揚天寶奇花皆是一德自然秀實所以諸天稽首萬聖踧踖凡彼下方日在堯天舜日之中不識不知順帝之則須當信及自己一點靈光原與玉皇尊帝天懷不隔心香朝謁朝乾夕惕欲淨理純之時自然透此景象乃知帝光時時照耀人間處處樂國人人化宇無窮奇異盡在當前箋釋九天應元雷祖天尊曰惟皇上帝一十七光上天下地莫不輝煌一時民物皆在帝鄕耳聞目覩靈異非常險夷一致道路皆香鳥含奇花獸舞天端玄歌玅樂一時發皇人間天上一掌平觀三田珠煥七寶爲欄鏡光圓徹世界平安億人兆人帝賜寶丹各承帝澤就日非難九光龍戲五色麟盤和氣所布發育胥殫自己心君保固須完然後契合上帝恩光自可乘雲上謁天皇莫負這種栽培恩長雷尊所示讀者參詳正陽帝君曰上帝光明世界通人間盡在玄都中緬平一掌蠶叢䧟景秀丹田玉樹紅鳳唱麟盤和氣應花飛樂奏道機融無量度人恩無盡光圓寶鏡與誰同白祖仙師曰六合同春帝子家恩光煥朗被無涯欄開七寶弦須合芝呈三秀鼎生芽珊珊玉骨鈞天樂灼灼珠光滿路花莫謂塵凡隔天境分明分得帝光華文昌帝君曰盡在堯天雨露中堯天舜日兩相融耕田鑿井民生遂摩義漸仁物性通擊壤歌中皆祝華卿雲爛處盡呼嵩中天泰運當前是拜舞八方格被同孚佑帝君曰讀得尊經做得仙仙家景象倍生妍天光顯露民生泰帝德加臨夀算延但使三田芝結秀自然七寶路生烟玄都玅境高瞻處六合成家上下連斗母天尊頌曰六合三境本是一家文明照耀處處瓊霞是時凡聖駭異幽暗開光天人悅慶踴躍懽忻凡夫學士盡得飛昇仰觀劫仞寶臺俯眄紫雲彌羅是諸世界一切人民咸臻道炁白首面皺皆得化度紺髮朱顏少壯幼穉轉得形容光澤美好苦惱痊平普蒙解脫安樂快然天下歌謠欣國太平神通感效章第七天師張眞人曰帝光無盡帝德無盡也帝之神通無盡帝之恩澤無盡也試觀六合之内何處不是帝力運轉帝道含宏發現處卽是生機沾被處卽成靈藥雖蠉飛蝡動亦荷天光何况禀元始祖炁以成人者靈秀獨鍾淸明不闕本與帝心聯屬有不近廓落之光而有明效大驗者乎是以老者換顏幼者潤身爲士者直上天階求玄者早登雲路由是俯仰皆煥朗之光歌謠樂太平之世然上帝度人無量本欲盡十二類眾生而共爲接引乃自礙其光明因自外於上帝之光明本原皆差眞性難復則滿地荆棘舉步榛莽本予以解脫之法自己少安樂之曰則夫忽焉駭異忽焉悅慶忽焉快然者當於自已身中領取斯不辜負上帝放光嘉會箋釋正陽帝君曰巍巍帝境卽在人間紫雲常覆惡劫永删日月交煥仙聖淸閒卽是三境卽是靈山淸明元氣被及千般食其光者皆得換顏近其光者災劫不干從此解脫萬載平安上蟠下際皆大還丹寵錫大賚承受非難不可自悞背日求寒要當悅慶智慧求完自與帝光交映萬端讀是經者永度急灘麻祖元君曰上帝神通有萬端神通到處卽平安皤皤鶴髮還成少怯怯童年已得丹天下如身歸有道太平無地不平寬淸光復處天光合化度飛昇本不難白祖仙師曰惟皇恢漠大神通明效般般世界同老幼平安歸化曰天人悅慶坐春風玉爐璀璨天光協金鼎輝煌道化融滿目生機須記取一分雨露十分紅文昌帝君曰天開地闢盡生人形體雖分不異神神與皇天非濶絶光分上帝自懽忻性情旣定容顏換雨露無偏世界新總是陽光頻照耀凡夫學士一家親孚佑帝君曰本是家親當外人可憐墮落幾千春自非上帝光明現安得人間雨露新老幼不分皆化度天人同體盡歸仁欣國太平緣有道天下分明在爾身斗母天尊頌曰帝德昭明法界充盈人無智愚被者長生當爾之時神風遐著萬炁揚津天震地裂枯骨更生沉尸飛魄皆起復形酆都鐵圍長夜九幽卽時破壞地獄眾生化生諸天三惡道苦一時解脫時諸罪輩以斯光力得生十方諸大天宫枯朽化生章第八天師張眞人曰帝光無盡不惟能引聖離凡並能轉凡爲聖不惟能發生有情之物並能發生無情之物不惟能接引淸淨無塵之體飛昇天上並能化度罪業滿盈之輩而直上天宫蓋由酆都鐡圍眾生造成桎梏長夜九幽眾生自趨黑暗乃得帝光照臨則神風遐著而不遺萬炁揚津而得度一時頃間刀山劍樹盡變爲羽蓋霓旌馬面牛頭倐轉爲靈童玉女罪孼雖積若邱山巳消黑簿善功雖小如涓滴皆記瓊書所以沉尸飛魄皆復本體朽骸枯骨知返眞元天關震動而陽神出現地戸崩裂而陰濁普消於是全體皆金玅用同天朝元日到延億萬年化生十方諸大天宫不過返自己家園然非由帝光一點金丹駐鼎何能枯木生春陰魄變神有志登雲而求金丹大道之士可自外於上帝之靈光明德而空言爐鼎者乎箋釋九天應元雷祖天尊曰帝光下臨萬物皆春沉尸飛魄起復爲人枯朽老病面貌若新酆都山䧟鐡圍城崩九幽長夜俄頃光明地獄罪輩得上瑤京蓋有眞體與帝無分眞風遐著點石成金萬炁歸元陽體無陰天宫超證地獄無因更生永活萬劫千春學道之士勿錯用心佳哉帝光沾被功深金鑪有此寶鼎有根朝謁無虛是帝最尊尊經一部一念存存帝恩深重許爾朝元正陽帝君曰堪嗟世上物芸芸死到臨頭不返根上帝好生光普被金丹有分命歸元萬炁雖紛今得度眞風遠播體皆存九幽長夜莫愁苦返照分明道是門何祖元君曰命由自己亦由天天光照處己身妍眞風遐著歸眞一萬炁揚津證萬仙志氣淸明無地獄身軀朗潤結芝田三惡道中無名姓只因叅透玉皇篇文昌帝君曰眞風一到氣歸源結得靈丹自返元長夜九幽除死籍天宫三境茂生根沉尸也有飛昇日枯骨重逢化度門本行眞經卽妙藥羣生㸃活盡存存孚佑帝君曰佛爲三界大醫王上帝靈丹更有光一十七般隨錫予百千萬姓要親嘗死期已至猶能活枯樹逢春也有香從此斷除三惡道乘雲跨鶴到天堂斗母天尊頌曰煌煌帝典句句丹經濟生度死隨用隨靈爾時玉皇卽分其身徧於十方諸大天宫令諸天宫自然化現白玉爲京黃金爲闕七寶玄苑大光明殿具光明座幢節幡蓋異寶奇花徧布是處分身化現章第九天師張眞人曰帝德光明普攝一世事亦奇矣而其悲願猶未止也而其神靈猶未竟也於是游戲三昧大顯神通以一德而恢宏爲萬德滿諸乾坤之内卽以一身而分爲眾身圓全天地之數分合由心變化無窮夫以十方諸大天宫分理萬方國邑城郭其數可量乎而玄範總於十方斯又奇矣乃復於十方天中各各化現白玉天京黃金寶殿各各俱有七寶玄苑光明寶座一身貴重則百億化身自然莫不貴重一方如是治理則千萬方亦當如是治理究之玄境無爲輝煌彌布皆自上帝天心中成就帝德如是圓通帝光如是照徹而帝力亦復如是神運要皆一元大道之玅用如是帝身卽道身豈不信然讀是經者其深叅之箋釋玄天上帝曰上帝神通無所不有變化隨心般般美好黃金爲闕白玉爲京金容玉體隨地而分光明座上處處分明幢節幡蓋種種充盈萬殊一本一可萬端十方治理萬地皆安萬幾日理惟仁惟寛隨用皆靈隨予皆眞栽培傾覆馭物惟均六龍御天處處生春眾生稽首夙夜惟寅隨方化現邇室彌親自己絳宫帝降威神十號圓滿普應十方志氣淸明默朝玉皇在帝左右親近帝光現身之處不斷心香吾總玄天蕩魔天尊亦是如此玄玅之門時時鑒察惟此爲眞我卽上帝金闕化身觀音世尊曰三十二應是吾身眞心早與帝同神金闕玉京分處處朝天禮聖自頻頻恩光南海西天普德範瞻雲就日親無盡芸生無盡惠十方萬地一時均正陽帝君曰人人各有一天君靈異俱從上帝分上帝分身無盡藏天宫萬化不紛紜馭物隨心能變化御天有道更神靈寶幡絳節誠心供一點丹心達帝庭文昌帝君曰大道神靈在帝心帝心靈應更淵深全憑一理生天地總有眞機作鑒臨信手方方生白玉因時處處長黃金莫云金闕太遼濶化現諸天爾室尋孚佑帝君曰信是天皇有異能十方化現十方承玉京處處朝儀鳳金闕高高引大鵬九萬里程風助力百千種道我歸眞我亦化身千萬億方方稽首帝威神斗母天尊頌曰淸微天中大顯神通帝身無量處處瓊宫爾時玉皇卽以所分之身徧於是處白玉京中黃金闕内七寶玄苑大光明殿光明座上普爲十方演説淸淨解脫之道分演玅道章第十天師張眞人曰大道一元塞滿天地渾渾淪淪流爲民物乃芸芸眾生日遊行於大道之中而自離於大道之外蓋自拘於形氣蔽於物欲濁而不淸禾嵗丿而不淨所以不能解脫自在遊行且三惡道中淪墮無休可憐苦海無邊何日登出頭之岸煩惱萬端何在非投網之慘解脫之難言也久矣幸哉帝恩無盡帝德難名帝身無盡帝之度人亦無盡所以一身説法猶恐不能徧及必須化現多身一境説法猶恐不能徧度必須化現無量之境然而帝身與帝境雖曰無窮無盡而所示之玅法只是此一元之大道是道之體本來淸淨必不染一塵者方能復還能復還一元大道者卽眞解脫旣能解脫則陰陽不能拘形體不能囿且將與玉皇尊帝異體同神然非玉皇尊帝金口宣揚誰能迴光返照識認自己眞體而超昇解脫欲聞法者從後叅觀箋釋彌勒世尊曰靈鷲山中我佛説法芸芸眾生得大解脫千萬億身皆稱正覺我在梵天主治兜率佛治大羅巍巍金闕是曰玉皇無上帝尊萬天教主總握乾元度人無量佛願周圓不遺一人個個成仙道身無量佛法無邊十方度盡皆示眞傳性是菩提命更幽玄解脫之道惟此爲先千經萬典十聖三賢舍此一法難脫迍邅乃在前曰玅理昭宣今日吉慶又啟法筵一理三教大道無偏我佛説法拈花微笑綱舉目張無非奥玅我得金旨顯在當來略説半偈助緣成胎我是眞佛不必徘徊在此説法多寶塔開毘盧遮那歎曰善哉觀音世尊曰這般大緣非容易彌勒尊佛到此來只爲釋迦卽玉帝遂令眞佛下雲階龍華勝會他爲主解脫法門今又開得此佳緣還不悟説法先爲歎幾回正陽帝君曰解脫門開度有緣無緣怎得讀瓊編誠心感得靈山佛玅法重興玉帝筵金口宣揚猶不信蒼生煩惱苦徒煎玉皇慈憫方方顯若個得成上上仙文昌帝君曰我説三家本一家學人都笑語言差不知解脫歸天道總在神明無障遮淸淨無爲私欲淨經書實踐性情和闡揚玄道關三教莫使吾皇歎奈何孚佑帝君曰眞經眞法在吾家句句精微理不差不二法門全是道天尊大闡信無遮良緣會合傳丹訣一氣淸明返太和赫赫王言須跪聽君還不信奈君何斗母天尊頌曰帝坐瑤京悲憫羣生分身説法解脫功成時化玉帝各以無量天眞大聖玅行眞人靈𡚱玉女侍列左右是諸玉女顏容姝玅端嚴奇特天珍異寶莊嚴身相言音淸徹眾所樂聞如是諸女其身復出微玅解脫自然之香是香芬馥周徧諸天極玅樂土及餘大地一切福處六道一切眾生聞是香者普蒙開度所謂天道人道魔道地獄道餓鬼道畜生道若諸天道一切天人或有能聞是此香者五衰四相永得除滅轉增天福若諸人道王臣兆庶或有能聞是此香者卽得人天長夀之樂身或滅度卽得脫殻尸解之道若諸魔道一切諸魔或有能聞是此香者安處天宫鬬戰之苦各得休息若諸地獄道一切眾生或有能聞是此香者離地獄苦得淨土樂若諸餓鬼道一切餓鬼等或有能聞是此香者卽得飽滿無饑渴惱若諸畜生道一切畜生或有能聞是此香者脫畜生苦得智慧樂聞香解脫章第十一天師張眞人曰玉帝化身徧滿虛空旣以神通化現玅境復以神通化現種種嚴飾且各有一切侍宸賢聖未嘗缺少法音一時周徧萬天天香一時芬馥萬境異哉至德發皇如是奇特至道精微於此可會矣蓋一元大道之精神命脉現爲玉帝大道之精華孕毓現爲眾聖故化玉帝神通卽能令諸聖化身玉帝所現之處卽諸聖所現之處且諸聖所在之處何莫非玉帝鑒臨之處體用交輝源流互顯道本如是玉帝之神通如是諸聖之化身亦如是也然聖德發揚之光卽聖德太和之氣光能普徧照耀氣自流動充滿和祥之極馨香之至矣德光旣能變朽回春則德馨自能轉苦爲樂試思世間沉檀諸品不過土木和氣所發且能感召天神融洽肢體何况上帝至德所發玉女同體太和有不能徧滿乾坤而超脫六道眾生者乎天人安處天和靈蠢同遊化宇上下一德幽冥交濟德光與道炁共被於無窮非吾天尊上帝何能充滿其量如是箋釋玄天上帝曰巍巍聖主至德發皇郁郁奇氣至道宣揚太和充溢處處吉祥謦欬珠玉吐屬馨香眾生有緣決不荒唐飲帝之和被帝之光食帝之德挹帝之芳玉女同心道味開張至哉坤元乾德彌彰眞風鼓盪丹桂同揚何欣蘭蕙何愛沉檀聞者得生嗅者皆安鼎爐有此可結金丹諸天同道左右盤桓神通互顯救度無難六道眾生災永不干從此超證度出惡灘酬帝之德拜舞天端正陽帝君曰動有奇光靜有香乾坤總是帝休祥道機翔洽同蘭蕙德味縈迴徧廟廊六道眾生咸感仰諸天萬聖久深嘗神風再著眞經顯撥動天和萬世芳麻祖元君曰帝坐天宫總道機神通種種更玄微香焚案上金童掌香散人間玉女飛寶鼎温温看火候旃檀處處示眞機輪迴六道無窮苦得共諸天侍帝幃文昌帝君曰玉女能揚帝德芬諸天侍列擁祥雲生機處處馨香達元氣霏霏世界薰六道安甯皆證度天宫瑞靄總氤氲桂香寶殿歸吾手也是吾皇身上分孚佑帝君曰諸天爲帝久揚芬故此朝朝現彩雲玉女坤貞乾道協奇香天應地輿薰道意淵微春發育德馨流布氣氤氲桂子蘭孫今接踵淸芬須向帝光分斗母天尊頌曰至德馨香學者親嘗精神煥發瓊籍流芳爾時諸生天罪眾旣得生是勝天宫已緣承慈光攝受之故便得覺悟各各明了罪福因緣與諸眷屬作天伎樂來詣帝前是諸眾等各各含悲俱發聲言前後經千劫萬劫不見三光常處黑闇三惡道中多受苦惱伏蒙玉帝方便放光愍救我等皆生天上是諸惡業悉皆滅盡無諸繫滯皆得往生仰朝玉帝各到道場是諸生天一切罪眾説是語已稽首復位承香覺悟章第十二天師張眞人曰悲哉眾生大道之分形禀上帝之神以爲神承元始之炁以爲炁乃不能振拔復還遂令千萬劫中常處黑闇三惡道中常爲繫滯苦不可言何望解脫至是乃明了罪福因緣不亦晚乎然以後來之眾生論則猶尙爲早也至於眾生生天則天中人矣神矣仙矣聖而賢矣佛菩薩矣而猶未免含悲聲言似乎不必乃眞情發露自然心酸若至今日則又當以含悲自己者爲後來之眾生含悲遂不禁大聲疾呼聲言於眾曰爾等何爲千劫萬劫不見三光墮落惡道何時出離吾當示爾眾生以解脫法門須各受持玉皇本行集經一部以爲生天復位之本肯深信否猛省猛省箋釋九天應元雷祖天尊曰雷祖發聲大眾齊聽千生墮落萬劫伶仃三光不見長夜晦㝠呼天不應呌神不靈永無出期坐卧寒冰若要漿水對曰不能上帝慈憫幽闇生光廣施恩惠密布馨香盡出地獄直上天堂一念回轉萬惡深藏一念眞誠萬善咸彰全體陰濁變成純陽記名仙籍侍列玉皇此等眾生復位天宫志氣神異淸明在躬聖賢仙佛早早成功後來眾生性命與同切莫再墮三惡道中留心經法朝禮蒼穹自有天尊鑒爾丹衷接引提拔玅境無窮文殊世尊曰可歎幽陰苦眾生人間世上不知名幸從帝力生機轉遂使靈臺善念盈依舊蓮花泥不染至今寶殿座無塵眞心一現含悲意迴首當年悞萬春正陽帝君曰因何墮落萬千春一念差遲苦不伸帝光照鑒眞光現道氣薰蒸善氣純有脚春回昇帝座無笙曲唱運洪鈞從茲不必含悲意俯視羣生眉又顰文昌帝君曰總爲蒼生繫此心此心悲憫深復深三塗墮落無春夏上界昇遷少信音一自帝光通十極遂從和氣脫寒陰因緣自古無差錯善士升兮惡士沉孚佑帝君曰地獄餓鬼與畜生這般苦楚何時平陽光動處天香發惡念消時善果成方寸靈臺通帝座當前迴首卽瑤京證到瓊宫無上位御前猶自表眞情斗母天尊頌曰明明帝前赫赫經筵回心皈命離苦生天爾時玉帝出大玅音普吿十方諸天聖眾汝等諦聽此諸罪輩曠劫以來縱無明性造十惡業六塵徧染三業縈纏肆意任心曽無覺悟陰罪陽過日積月深背道違眞順邪棄正舉心運念動結愆尤遂使命過之後身落三塗不得解脫若非今日遇是法筵何由出離玅音開度章第十三天師張眞人曰玉皇尊帝以元始祖炁神通發爲光明融爲馨香抑且動爲聲音是大玅音卽是一元大道之鼓動太和翔洽之節奏矣故被是光者性體自然昭融聞是香者生機自然勃發則聽是法音者心地自然智慧可知蓋此眾生厯劫墮落六根三業日積日深陰罪陽過愈趨愈下總忘卻自己本來面目甚且漸消漸磨將太極一點靈光散盡嗚呼背覺合塵舍正歸邪一團黑氣自斷本根上帝好生實所不忍所以普度無窮神力大顯放光不已引以德香天香普播不已猶必明宣天旨啟金口指示因緣宣秘傳明開生路不得已而自道其實曰若非今日遇是法筵何由出離爲己得生天之眾生歎乎實欲彼未得復位之眾生共聞也讀是經者曽覺悟否箋釋正陽帝君曰天尊上帝最神最靈放光普度法界熒熒布香大覺聞者開明人人解脫俱證玉京君臣一德相慶帝庭天顏有喜出玅音聲諸眞稽首肅敬咸聽言言金玉句句分明要淸三業要淨六根十惡永斷眞性存存立命有基入道有門瓊霄證果紫炁朝元昔何愚蠢今亦聖尊惟時眾聖有歎無論迴首思惟不覺心驚帝恩深重報答惟誠昔曽自悞再無悞人天尊睿訓爲眾敷陳聞者須信莫悞自身萬劫留傳此言是眞觀音世尊曰十惡三業並六根千秋萬劫盡沉淪迷津不渡何人渡心地常昏性不昏玅音朗徹三千界眾等超昇十二門維皇指示分明在那用靈山問世尊白祖仙師曰墮落幽陰不計年今朝也得到靑天若非帝力歸元始那得凡身做上仙十惡斷時三業淨六根空處五行全天尊金口明明示萬劫千秋永正傳文昌帝君曰帝坐瑤京理萬方人歸地府失眞陽寒冰惡浪層層陷劍樹刀山處處傷一念回春憑帝力三田毓秀得天香度人無量恩無盡謦欬於今震十方孚佑帝君曰諸眞聖眾用心聽上帝宣揚句句靈若要瑤京通名姓可曽靈府轉幽陰法筵得會憑天力寶鼎生春結紫金吩咐眾生須學我瓊編秘語用功深斗母天尊頌曰大道無言於穆帝尊羣生開度口訣爲門爾時諸天化身玉帝卽以神通不動其所移接天人皆令得至淸微天宫玉淸聖境元始會下是諸眾等不覺不知是時天尊眾會見是十方玉帝化身普皆來集天尊會前如無邊明鏡照諸影像互相容入時諸大眾稽首瞻仰玉帝化身聖中最尊增長淸信益加志樂心無退轉起大堅固時諸天人邇得生天忽覩天尊勝會道場淸淨第一無爲功德之所莊嚴踊躍歡喜一時作禮歎未曽有顯露法性章第十四天師張眞人曰玉帝卽道體也旣已化現玅身自然承載法性大放光明性之現也大布馨香性之和也大發玅音性之節也則夫普度無量移接天人皆是性眞力量諸眞聖眾於是皆復其性矣蓋諸眞聖眾以玉帝之性爲性超昇玅境則是還性本原不知玉帝又以眾聖之性爲性眾聖能復其性則上帝性中之用已歸體矣上帝能攝受眾聖以歸其體則用中之體盡歸元矣此理奥玅竊恐眾聖不知故於天尊會前卽以化身顯露眞身眾身顯露全身體用交輝性光互映居然寶鏡瑩徹彼此通融虛明之體靈湛之用未曽隔越惟時眾聖乃悟自已根原與夫玉帝光明普現馨香四達聲音朗徹皆一性之所發現卽皆人人一性之所咸具者也見此景象倍生覺悟方悔往日十惡三業障礙靈明無限今幸滴滴歸源得歸正覺起大堅固永無退轉説法度人少報上帝普度深恩箋釋白祖仙師曰性之一字上古未聞降衷恒性乃有眞文尊經古奥渾而不言儒家闡發成性存存佛家叅悟見性爲門吾家玄玅性命爲根性在命中命因性定性命雙修虛靈神應天師慈憫示人眞傳特標法性以明先天玉帝化身靈異百出明鏡周圓互相容入以體攝用卽用顯體體用交輝精微玄理大千世界皆在鏡中纎塵不隔彼此交融復還性體快樂無窮上帝開化以身示教法性周圓尊經妙道惟爾學人眾聖爲師承帝之光祖炁爲基飽帝之德定爾心思聞帝之音絶玅言辭得未曽有再莫差遲我來箋釋觀者信之正陽帝君曰法性圓融處處通光明無盡亦無窮無邊寶鏡含沙界一片瓊蟾朗萬空本體旣眞無滯礙千般作用總歸宗羣眞何幸逢嘉會周旋琉璃佛光中長春杜眞人曰性是儒門眞實理分明三教共根宗光明無礙天光玅色象莫粘萬象空一月普照千江水萬水還涵一月中玄理玄玄何處顯帝光處處見圓融文昌帝君曰性是菩提處處融無邊明鏡照虛空但能體用相輝映乃信乾坤闢混蒙萬象虛明含滿月一眞顯露協蒼穹玄玄玅理人難識玉帝分身顯一宗孚佑帝君曰體用歸源要性空十方化現十方同交光互顯重重月無礙生明處處通總是先天眞景象要看神室透蒼穹乾坤一鏡相涵入玅旨眞傳帝座中斗母天尊頌曰先天後地煥朗通圓總歸性海萬鏡高懸爾時十方諸化玉皇俱復一體從法席起北向長跪天尊言曰往昔去世有國名號光嚴玅樂其國王者名曰淨德時王有后名寶月光其王無嗣嘗因一日作是思惟我今將老而無太子身或崩歿社稷九廟委付何人作是念已卽便勅下詔諸道眾於諸宫殿依諸科教懸諸旛蓋淸淨嚴潔廣陳供養六時行道徧禱眞靈已經半載不退初心忽夜寶月光皇后夢太上道君與諸至眞金姿玉質淸淨之儔駕五色龍輿擁耀景旌蔭明霞蓋是時太上道君安坐龍輿抱一金容身諸毛孔放百億光照諸宫殿作百寶色幢節前導浮空而來是時皇后心生歡喜恭敬接禮長跪道前白道君言今王無嗣願乞此子爲社稷主伏願慈悲哀愍聽許爾時道君答皇后言願特賜汝是時皇后禮謝道君而乃收之皇后收已便從夢歸覺而有孕懷胎一年於丙午𡻕正月九日午時誕於王宫當生之時身寶光燄充滿王國色相玅好觀者無厭幼而敏慧長而慈善於其國中所有庫藏一切財寶盡將散施窮乏困苦鰥寡孤獨無所依怙饑饉癃殘一切眾生仁愛和遜歌謠有道化及遐方天下仰從歸仁太子父王加慶當爾之後王忽吿崩太子治政俯念浮生吿勅大臣嗣位有道遂捨其國於普明香嚴山中修道功成超度過是劫已厯八百劫身嘗捨其國爲羣生故割愛學道於此後經八百劫行藥治病拯救眾生令其安樂此劫盡已又厯八百劫廣行方便啟諸道藏演説靈章恢宣正化敷揚神功助國救人自幽及顯過此以後再厯八百劫亡身殞命行忍辱故捨已血肉如是修行三千二百劫始證金仙號曰淸淨自然覺王如來教諸菩薩頓悟大乘正宗漸入虛無玅道如是修行又經億劫始證玉帝説是語已法筵淸眾異口同聲歎未曽有發明本行章第十五天師張眞人曰玉帝以道化身自然而然不假修證何有本行蓋道無定體以大生廣生之羣生爲其體帝有全身卽以萬物萬形之萬體爲眞身所以厯劫行化劫劫分明從實度人實實踐履以一身入萬身之中而爲之質幹卽以一炁融羣形之内而爲之主宰所以治理平成經綸不歉醫療教化泛應兼長作止因時隱顯有道接待則貴賤平等貧富一心且忽焉化現王公忽焉化現修士忽焉舍庫藏而不惜卽捨血肉而不吝乃一心不退於多劫苦行厯徵諸百世通萬古如一息顯眞常於億劫今者總握萬天無爲致治高居金闕夀量無疆迴憶降生之年直如前日事也雖曰三千二百劫不過略説其苦行之規格而已可易量其度人無量之實際乎至於抱送金容則表其從道而來國王皇后則表其毓秀天地光嚴自然玅樂至寶允矣月光夢覺表感召於無形胎孕表生成之有候丙午則陽德全亨光燄則金花滿地於是九廟之世德享獻無疆兆庶之歸仁依怙有託斯皆道化實際非我元始天尊何能明示根原於是眾生復位之諸眞聖眾愈信上帝之神通玅化先天地萬劫以前後天地萬劫以後眞無聖人焉能幾之矣箋釋正陽帝君曰大哉帝身大道流行旣靈旣秀亦神亦靈乃文乃武可權可經龍威鳳彩象力雷精扛舉天地生成兆民允恭克讓惟寛惟仁多劫演道厯世化身帝德廣運帝力難名千萬億劫實踐躬行所過者化所存者神乾坤鍾毓金體全眞光燄燭天功德在人朝野上下莫不尊親普明山中異蹟猶存丹爐俱在風景常温不貪萬乘勵志修行今總萬天早證大乘厯厯可記劫劫堪徵元始天尊指示原因朝帝者證眾聖諸眞觀音世尊曰三千劫證法王身這話須當嚇煞人豈料御天從億劫曽於沙界救生民功修八百還嫌少祥發王宫不計春本行經傳須八萬惟有天王識帝眞何祖元君曰玉帝法身卽道身曽經億劫與千春釋迦文佛親修證元始天王顯玅因五色雲中龍鳳輦普明山裏鼎鑪金經傳本行層層實讀者眞叅要用心文昌帝君曰玅樂國内毓眞王普明山裏建法場進退唯時全是道往來無礙早垂裳道君而下誰知聖毫孔之間也放光億劫以前眞本行羣生厯厯早聞香孚佑帝君曰道身無證亦無修本行眞居上上頭捨已何曽惜血肉爲人也費好春秋當年苦志寒山雪滿願高居白玉樓劫後劫前如一劫至今猶錫度人舟斗母天尊頌曰無窮無盡惟皇本行今日眞叅當年實証爾時眾中有一玉女名曰夜光從座而起嚴整衣冠從容雅步長跪道前白天尊言臣宿昔何幸仰侍御前親奉供養已經億劫三淸境界金闕玉京寂淡逍遙快樂自在嬉遊聖域餐聽法音未嘗見此希有之事不審向來光内所現十方諸天變現聖境皆有玉帝應化法身天眞大聖玅行眞人靈𡚱玉女以爲侍衞是諸玉女相貌端嚴形體姝玅出眾玅香無與等者復蒙玉帝神通移接今皆普集在淸微天未審今此玉女以何因緣得證如是無上色身恩惟聖慈示以未悟爾時天尊謂夜光玉女言汝固初入聖流雖有智慧未能明了此諸玉女乃自往昔無量劫中修諸玅行具解脫門同淸淨信同淸淨解同淸淨念同淸淨行同淸淨身同淸淨心同淸淨意同淸淨果同淸淨報同大慈心同大悲心覆護眾生如母撫念愛於赤子奉戒專一冥心大道淸齋弘誓千萬劫中尊奉玉帝此諸玉女非實是女皆天至眞爲度羣生現玉女身是故身色神通智慧隱顯變化與帝同焉爾時夜光聞是説已心得開悟稽首歡喜默然復位表示貞一章第十六天師張眞人曰玉帝法身本從道化道爲太極本具陰陽二體而陰陽固無始也本含動靜兩境而動靜固無端也然陽主長養陰主生育動爲流行靜爲貞一貞一含流行之機流行歸貞一之體入道者不主於流行而主於貞一蓋貞則永固一乃精專有此力量乃能厯劫常存萬載如新試觀天行運轉不息則生氣乃行地體敦艮常甯則生質乃定夫天地本於大道天地之體如是則大道之體亦如是也大道之體如是則玉帝之法身亦如是也故帝以發育萬物者致其用必先以凝靜一致者立其體昔在普明山中修行已曽從先天之坎離配先天之夫婦復還先天之乾坤再立先天之天地結成至寶光明灼天馨香被物玅音震動自是而後十方行化而眞身晏坐玉京眞一玅道靈應如是天尊乃因帝座之玉女化現之天眞厯劫苦行與皇躬千載一心萬劫一德身色神通智慧隱顯變化一致無殊者點明玅旨可謂精微無比矣夜光當日亦是從此證人必待天尊指示乃能開悟則自夜光而下者可知讀者當著眼觀箋釋正陽帝君曰大道永貞一體流行生育長養地甯天淸赫赫皇躬生而神明靈變百端發育羣生行健卽天安敦卽地淸淨無爲誰與同志一息萬載誰識眞意奇哉玉女道本於坤凝然至靜貞一永存厯劫修行具解脫門順承天命發帝德馨天香法界樂國天庭始終一德與帝同靈職何以故昭事專精赫赫金容亦有神通色相玅好種種從同惟時夜光反起疑惑同具女根彼更安樂明啟天尊乃見眞確感歎良久自悟根因億載侍宸爲帝臣鄰希天有志致主以身明德馨香夙夜惟寅尊經要旨明告斯人觀音世尊曰我是玅莊國王女也曽證過帝王身竺落皇伽天中主端嚴色相世間親説經元始傳眞法入聖夜光識本因億劫以前原有我至今事帝亦心眞麻祖元君曰莫笑麻姑是女身九重天上本天眞誠心奉主經千劫立志希天有萬春同氣猶如眞父子一堂還是古君臣尊經修證堪承受帝有神通也與人文昌帝君曰有志希天要用心當前莫負好光陰馨香達處田生玉血氣通時體有金具解脫門天道顯同淸淨信聖功深天眞化現因慈惠男女能修死不侵孚佑帝君曰陰陽皆是道之精男女能修自著靈奉事多生同苦志神通無量在天庭夜光疑惑天尊釋玉女功夫上帝臨説到眞修人不信乾坤鼎内有黃金斗母天尊頌曰先天一炁純陽根陰抽鉛潻汞帝光照臨爾時高虛淸明天主與諸天眷屬馭八景鸞輿蔭九光寶蓋奏玄歌玅樂詠無量洞章散天寶花噴天眞香飛步遊空來詣道前承天尊玉帝威神之力是諸寶花卽於空中化一寶蓋蔭覆大眾無不周徧是時高虛淸明天主見此希有稽首長跪白天尊玉帝言賤臣懈怠後會法筵今日吉慶興此法橋幽顯聖凡普霑聖澤放大光明現希有相上照諸天四梵六慾一切樂土諸眞聖眾覩此光明悉皆雲集下照下方無極世界同玄都境近接九天靈風奏樂宫商相和激朗雲庭皆成洞章一切眾生咸臻道化酆都鐵圍長夜九幽一切地獄受苦眾生盡承光力皆生諸天得受快樂今日所散天寶奇花旋結成蓋徧覆大眾盡乃斯光威神之力臣等千劫良因九天運會皇道蕩蕩正法興隆今日大吉咸仰玄功是時高虛淸明天主以偈讚玉帝曰金闕玄穹主高上玉皇尊玅相冠諸天慈光燭三界眞聖玅道師天人依仗師大乘垂法語眞一指迷途功德若虛空讚揚無窮盡是穹蒼主浩劫之尊玅見玅知無等無倫湛寂眞靜杳亡杳存上聖上靈大神通光明藏大丈夫開化人天教道無窮大慈大悲流煥法輪爲度羣生是號玉皇穹蒼眞老玅圓淸淨智慧辯才至道至尊開度眾生故演是光爾時高虛淸明天主説偈讚嘆已寶蓋蔭覆章第十七天師張眞人曰高虛淸明天主九天生神上帝之一禀承天尊玉帝道命主治生人承其治者靈光不斷肢體永存夀命綿延根性煥朗荷玉帝之光聞天尊之法而來諸天皆其眷屬左右最多嚴飾咸集帝前各伸供養八景九光俱是法天象地威儀玅樂洞章俱是履中蹈和節奏寶花現彩皆性體之精英馥郁天香總性眞之密布以此伸供養於天尊上帝之前得未曽有矣乃天尊上帝卽以其人之道還治其人之身以性證性卽以神通永命所以萬華團結蔭覆大眾無不周徧居然萬法歸一生成兆庶無所遺漏夫元始爲道之根上帝爲道之主高虛淸明又爲生生之主性命合一自然發生萬彙不料放光之後又有此一段光彩天主那得不盡情吐露極力發皇而呈獻頌揚之辭要之舉一天主則凡上帝之所化度十方之所來集與夫億劫無盡之所解脫者亦莫不如是讚揚之語廣博淵深其精叅之箋釋玄天上帝曰高虛淸明主治九天生神不息性命克全眷屬極多個個金仙元始法會玉帝經筵光明感召飛步而前蓋蔭九光上法天圓乘輿八景下擬地方乾坤建立來往吉祥眞風顯露樂韻琳瑯眞炁洞達皆成洞章手散天花口噴天香輝煌雲路來朝天王天王恩重綴錦聯芳如天蓋覆萬彙含藏性體歸源永保無疆大哉帝力道顯其光觸手生春無不發揚凡具性者不必慌忙朝元有日保守無傷寶蓋會中與子偕臧誰人信及直下承當朝夕受持如是瓊章正陽帝君曰九天帝主能生神個個人民乃有身圓蓋方輿安爐鼎玅樂天花返性眞德澤如天能廣覆神通動手卽生春萬華寶蓋天王用付與玉皇福萬民麻祖元君曰崑崙山上建雲宫寶傘莊嚴覆無窮那比瓊花連朶朶天然生炁擁重重性光乃與天光合萬理還歸一理中讚偈莫非陳供養生神聊以報蒼穹文昌帝君曰淸明天主會金筵一路生光顯碧天錦繡層層抒玉蕊繽紛處處湧金蓮眞吾旣返眞宗室性體全歸性海源至此方知天上澤九州萬國總春温孚佑帝君曰萬劫千秋惠不窮十方八極一帡幪靑靑寶蓋咸瞻仰朶朶名花少異同萬姓如星還拱北一眞同水必朝宗昊天原有開天力頌揚難盡惠重重斗母天尊頌曰萬劫生神萬聖歸宗萬華蓋下禮頌從容天尊普吿四眾云是帝身卽道身也非常體也是無量功德之身是淸淨自然之身是神明堅固不壞眞空無上法身威靈恢廓名聲周徧無幽不開神奇堂堂難可稱焉是帝非有爲功德之所熏修而帝昔雖下生人間多劫行化示大神通而身淸淨未嘗不在金闕分身變化應現隨方利濟羣生超昇道岸普垂教法開悟後人依按奉行登眞成道以斯功德之所莊嚴是故光明常充諸天神智玅達莫可度量是身光明皆具玅號所謂大神通光大慈悲光大喜捨光大忍辱光大平等光大柔和光大自在光大利益光大如意光大智慧光大吉祥光大解脫光大歸依光大功德光大圓滿光大無礙光無能勝光光明徵實章第十八天師張眞人曰元始天尊厯厯宣説玉帝本行神通變化靈驗之事至矣盡矣於此章乃特標明之曰是道身也非常體也再明之曰是無量功德之身是淸淨自然之身是神明堅固不壞眞空無上法身爲玉帝之體讚乎卽爲一元大道之體讚也讀經者至此當知顯權歸實從流探源攝萬會一將前數章所説之種種功能種種力量種種功德三界十方之所攝受千生萬劫之所化度者其根原皆明明顯露矣蓋惟其爲道身乃能有功德無量淸淨自然及神明堅固不壞眞空無上之體段乃能有普徧之種種光明而或以常身疑之謂其假於熏修假於有爲功德之所莊嚴可乎天尊恐人不明此旨故因高虛淸明天主讚揚之後不覺觸動天懷再爲稱揚實爲品題著其體則厯叙種種法身著其用則厯叙種種光明又合體用而著之曰下生人間多劫行化而身淸淨未嘗不在金闕非所謂充滿法界普現羣生之前應感咸周不離菩提之座者乎有不知一元大道者當卽玉帝法身以觀之有不知玉帝法身者當卽元始宣説以觀之箋釋九天應元雷祖天尊曰一元爲道在帝之身顯道爲法歸帝之神道惟光明有帝敷陳道最靈應惟帝爲能大哉至道今古誰承大哉玉帝卽道光明一十七種厯厯分明照鑒萬天萬地晶瑩照燭萬劫鑒影日光帝惟有此法體輝煌巍巍無上不壞眞空神明堅固功德無窮淸淨自然誠哉道身無幽不顯所度在人神通變化馭物惟靈化現萬方詎離帝庭大哉元始法語叮喧旦血宣揚帝德大眾齊聽禮帝金容讀帝眞經命根性主玉帝玉淸從今叅悟大道分明正陽帝君曰十七光明在帝身照萬方兮度萬人名聲周徧神通廣功德周圓本體眞玅道眞空原不壞有爲作意那能神天尊慈憫明明示依按熏修作帝臣靈佑帝君曰帝身靈異本非常功德神通不可量法性圓融周法界眞空不壞乃眞常乾坤重泰春秋永日月交輝十七光往者紛紛來者眾優游化宇帝垂裳文昌帝君曰十七光明是帝庥淵淵穆穆坐瓊樓眞機顯露三淸境玅相輝煌四部洲道有全身皇極建尊無二上聖功優自然堅固眞空體不假作爲不假修孚佑帝君曰從今識得道機深始悔當年錯用心無上光明頭上顯先天景象後天尋幸從元始聞眞法惟向瑤京覔好音玅號重重非譬喻熏修自可結黃金斗母天尊頌曰大道何在一段光明一十七種法體難名是故汝等欲見是帝乃不可得者緣以汝等尙於身口不捨結習煩惱行業由是障故不能得覩是帝慈顏吾今爲汝時會眾等宣示斷障之法汝等大眾宜各奉行時諸大眾不勝喜躍各於至尊几前稽首作禮俱欲願聞天尊言曰斷障之法當生大悲無起疑惑無起貪嗔無起淫慾無起嫉妒無起殺害無起凡情無起凡思無起貪妒無起聲色無起是非無起憎愛無起分別無起高慢無起執著凝神澄慮萬神調伏心若太虛内外貞白無所不容無所不納無令外邪亂其至道牽失眞宗敗其靈根盜其至寶致爾萬劫永墮凡流透入俗網萬魔來攻百千萬劫不聞玅法鬼神執誅從生入死是故汝等應當志心善護眞宗無令喪失如前所説如是諸障汝等各各當除斷之身得淸淨超度諸難是名道寶持法棟樑更當修奉是此經典如近是帝生尊重心著想尊容稱揚名號然後汝等得覩慈顏咸蒙護度普聞玅法親奉供養永無流轉是時四眾聞已歡喜歎未曽有斷障見帝章第十九天師張眞人曰元始祖炁化現玉帝並化現一切大眾故大眾莫不各有道體法身但能道體法身莫不顯露則元始玉帝精神已通當前明現自然移接瑤京聽法淸微得大解脫起大堅固天尊聖果程功超證奈何明明道體一墮人間種種諸障牽連而起卒使道身墮爲披毛戴角之身法體淪爲痛苦傷殘之體萬劫幽陰三光不見萬重羅網何日出離悲哉然而天尊慈憫普示玅法上帝好生開度無盡因於放光顯瑞寶蓋蔭覆之後卽厯厯稱揚上帝功德猶恐入道者心不堅固離道者心不速悔於是再爲四眾開示斷障之法夫障有多般道無二致心含一道塵去則鏡自明沙去則水自淸障斷則道自現道現則法身顯而本體明矣本體旣明則眞宰無爲自理祖炁復還不失由是乾金剛大之體重建頂天立地朝上帝而證位玉淸是亦道體也是亦諸眞聖眾也是乃眞見帝光親聽法音實聞玅香而朝夕悅慶於天花寶蓋之下果有誠心尊奉是帝則當佩服天尊法言勿以斷障爲難箋釋玄天上帝曰悲哉眾生惡貫滿盈牽失眞宗黑籍書名敗其至寶永隔蓬瀛斷其本根滅性流情往來惡道徒苦哀鳴籠中刀上誰管怨聲何以至此可憐眾生總爲一障濁而不淸牽連滋長愈障愈深甯有貞白惟墮幽陰愈趨愈下異類傷心今幸覺悟得聞玅法元始金言率履無越如是諸障當實斷之心君爲主一善爲師昭事上帝再莫差遲默想金容誦持寶號境若太虛神明來告萬炁調伏一眞獨抱上帝鑒誠明傳法要親見是帝超證道玅急早回頭終須有靠悲哉眾生誰皈聖教何祖元君曰障礙百千悞我身致令萬劫受沉淪天王慈憫諸天少上帝光明普世仁至寶維持誰敢盜眞宗調護不留塵金容觀想徽稱熟斷萬魔兮伏萬神正陽帝君曰離道都由障礙多慾心妄想動邪魔重重陷阱重重網步步氷霜步步波口訣留傳須早斷帝恩深重轉天和眞宗至寶眞心護煞鬼毒龍奈我何文昌帝君曰鬼國魔山幾萬重隔住靈光永絕蹤帝境崇高何日到先天悠遠那年通陰雲掃盡看紅日蔓草難圖仗劍鋒縱有樊籠須跳出乘鸞跨鶴是英雄孚佑帝君曰帝心原與我心通障礙千層不少空劖斷靈根因愛慾原無悔意叩蒼穹虛言寂待庚方月妄想高乘閬苑風勇決當天發誓願纎塵不染出樊籠斗母天尊頌曰靈根毓秀皇路聯登全憑慧劍斬斷葛籐太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷上終太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷中太上大光明圓滿大神咒品第二爾時天地始祖五老上帝稽首長跪白天尊言伏聞高上玉皇慈念蒼生普放神光照燭法界六凡四聖普叨道蔭竊以凡夫短景劫運將終正道宜行以濟兆民使修眞之子有期輕舉末代烝民俱獲夀考表揚五老章第二十天師張眞人曰一元大道卽元始也穆處無爲而付其權於玉皇上帝則帝又爲道之主矣所以總握玄綱推數劫會生成民物其政治俱歸之大羅金闕然尊無二上何以復有五老上帝物無兩大何以又有天地始祖嗚呼玄教之精微在是矣夫大道一元劫終不變劫始不遷卽萬劫以前之萬劫萬劫以後之萬劫俱是不搖不動但卽現在之劫而言混沌之後忽焉生天忽焉生地忽焉生人生物有何具乎蓋道本一理中有動靜道本一氣體分陰陽動靜互爲根陰陽兩相濟有動靜乃有消息終始元會運世年月日時刻分之循環有陰陽乃有寒暑燥濕淸濁高下剛柔徤順顏色骨肉之分四時五行之數人能外此五行乎五行根乎陰陽陰陽根本乎道彼元始祖炁道也陰陽五行之祖也陰陽五行又爲天地之祖也不有陰陽不有五行有天地乎是故言道者不知天地之始祖在陰陽在五行又何以結撰五行交會陰陽而建立天地以立性立命故於此經發揚主宰大道之帝種種神靈不測化理有經旣於上卷極力敷揚因於紫微金格中提出上帝當曰宣付五老玅旨以明經理天地之大道而特標之曰天地始祖五老上帝乃知五老卽五行之精神實爲穹蒼眞老運御乾坤之大臣所以慈憫眾生與帝同德代眾求請問法救濟而願玉皇上帝時時普放神光箋釋九天應元雷祖天尊曰五老上帝五行之精主治五方最神最靈根本元始禀治帝庭乾坤以正氣運不停召龍止水保劫延齡順序三辰斡運萬星各安職守興國太平法會放光常繫厥情爲眾悲憫代眾經營進叩元始奉法施行蒸民永濟運會常亨眞機將轉道運將興兆民有主上帝有臣神咒流行天下同仁經標意旨叅悟在人傳經教主大法將伸乘時校正以濟斯民吾爲箋釋學者良因正陽帝君曰五德乾元亨利貞五行金木水火土雙修性命有眞傳烹鍊鼎鑪要眞主玉皇本行經最微天地始祖悉皆歸五炁朝元今有日啟問天尊啟慧機麻祖元君曰五老原從一老來乾坤得此永無災淸甯合撰民生泰上下歸眞意氣偕南北東西歸皇極木金水火會天階惟有天尊知奥玅眞經啟問莫疑猜文昌帝君曰信是天王會説經五方五老叩天庭地天交泰星辰序金土無差水火甯玅法須叅圓滿咒眞機全在玉皇經蒸民夀考當千劫化度光明感眾靈孚佑帝君曰因何感得眾眞來舊日天光尙繫懷解脫方方皆錫福政權處處不生災眞功圓滿眞言力道玅機關道祖裁總爲蒸民維劫運天門進叩爲君開斗母天尊頌曰五氣流精天地淸甯赤文當顯再請帝庭自昔元始洞玄靈寶赤書玉篇眞文生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗無氣無象無色無名無形無緒無音無聲混沌太無靈文菴靄乍存乍亡二儀待之以分太陽待之以明靈圖革運玄象推遷乘機應會於是存焉赤文玅藴章第二十一天師張眞人曰赤書玉篇眞文卽顯露一元大道之精藴也著其光彩則曰赤書至陽之氣本赤條縷可會則爲書著其秀靈則曰玉篇至粹之精如玉實有片段則爲篇著其體用則曰眞文至靈之理有信莫不結搆以成文是道也卽太上洞玄靈寶之所掌者也生於元始之先空洞之中可知其玄玅獨出精光獨顯莫先於元始而猶居其先則又元始之所以爲元始劫終而不見其終劫始而無與爲始者矣浩浩難名𣺌𣺌誰説自非五老上帝親身厯證孰能知之然難名而必欲名之難説而必欲説之則但想諸天地未根日月未光之際只有一幽幽冥冥氣象而是赤書玉篇眞文已存乎其中卒之微玅難識把捉無據似有似無誰聞誰見是先天之景象也無極之義理也太無之機緘也混沌赤文今古罕聞無迹可見微𣺌何存冥冥無光空洞無根旣無方所惟有推遷奥矣玅矣靈焉神焉叅悟到此乃契玄玄大哉赤文吾道精傳箋釋正陽帝君曰赤書玉篇天下玄文微玅難識精藴誰聞大道體段雲篆氤氲乾坤正氣默運流行幽幽誰見蕩蕩難名無終無始亦充亦盈全無迹象惟有眞誠先天之先後天之後主宰維持自然結搆順理成章金石能透撰於玉淸宰於玉帝宣於五老包乎天地時時發現世人罔識罔識其機入道無力無力入道聖文遂隱經旨明標振裘絜領玄門奥義最上上乘叅悟實見帝境可昇無量洞空天帝曰平地成天一卷書最尊最貴是文儒性情已正陰陽合倫理無虧志氣殊手訂赤篇今尙在帝傳雲篆古無虛水精之子衰周出五老同叅定世符長春杜眞人曰玄教明明闡赤書儒家惟此是工夫五經四子皆天道玉軸瓊編是帝符天文煥爛人文顯帝德輝煌帝世熙本行皇經標要旨先師明証五老知文昌帝君曰儒典佛經總是書天王秘授更同符昌明文教遵經寶貝葉文傳護帝都五老宣揚傳道玅萬方歸極仰皇謨先天景象從茲見混沌赤文存太無孚佑帝君曰當年曽讀數行書歸宿玄門也不殊實證先天赤炁顯秘傳口訣玉文符象天象地存眞象無色無名隱太無這段機關人不識也虧五老闡靈圖斗母天尊頌曰先天奥玅總在赤文根原顯露誰見誰聞玉帝授臣靈寶秘篆大不可思議神咒故天地得之而分判三景得之而發光靈文鬱秀洞映上淸發乎始靑之天而色無定方支勢曲折不可尋詳元始鍊之於洞陽之館冶之於流火之庭鮮其正文瑩發光芒洞陽炁赤故號赤書靈圖旣煥萬帝朝眞飛空步虛旋行上宫燒香散花口詠靈章是時天降十二玄瑞地發二十四應上慶九天之靈奥讚三天之寶明神風旣鼓皇道咸暢元始登命太眞按筆玉𡚱拂筵鑄金爲簡刻書玉篇五老掌錄秘於九天靈都之館玉女典香太華執巾玉童侍衞玉陛朝軒九天上書非鬼神所聞雲篆功用章第二十二天師張眞人曰雲篆卽赤文也赤文言其實雲篆著其用實本乎道用發於人昔在元始天王立於天地未生之前觀於日月未光之會尋得其詳知洞陽之炁赤達玄象之推遷上淸洞映色無定方天地因之而分判日月因之而光明於是摹其靈紋播爲靈圖取其光芒法其規模鍊之於洞陽之館冶之於流火之庭成爲秘篆凝聚靈秀惟時陽光煥發陰德安貞乾體高明瑞氣布於二六之辰坤體博厚祥光映乎三八之節品物因之而毓秀鬼神不得而知聞秘之靈都之館藏之無上之宫五老上帝曽受之於穹蒼眞老至是又欲行於下世故特表其功用述其因由以傳來學乃知雲篆之文如是貴重如是神奇識之者神明煥發得之者造化在手其實微玅難言玉淸貴重上帝鑒臨當會之於言思擬議之表不可忽視赤書玉篇本無正文摹爲雲篆煥朗氤氲演爲神咒流傳古今尊爲誥命一畫千金箋釋九天應元雷祖天尊曰赤書煥發赤炁光明赤心一點通達三淸其玅難識其理難名先天之象秘在瑤京惟茲雲篆品節分明支勢曲折功用神靈五老而外誰傳其精元始摹繪顯於始靑掌於上帝品物咸亨三辰照耀天地淸甯性眞玅用大道眞形洞陽之館流火之庭鍊筆成圖役使萬靈字皆一丈藏之杳冥色無定方象有定體叅悟在斯實關倫理玉皇寶誥惟是爲眞玄玄神功玅用惟人正陽帝君曰千古誰識雲篆文光輝朗耀氣氤氲乾坤日月眞形體神鬼魔𡨚敢聽聞分判陰陽同五典維持義理過三墳安爐立鼎丹房内安鎭方隅要用君虛靖天師曰龍虎山中別有春丹房丹竈日相親鍊成至寶同雲篆冶就黃金獻玉宸元始洞陽施彩筆先天赤炁在眞人維持王化全歸我五老薪傳佩服神文昌帝君曰虎符龍劵總吾身大洞法籙更覺神總是先天雲篆結再看五老授圖眞乾坤自此無災劫元始而今錫是人玅用神功當識認氤氲流布萬年新孚佑帝君曰玅用神功歸雲篆氤氲繚繞鎭乾坤不因元始瓊宫鍊誰識吾家玄道尊玉律金科同奥玅馬圖龜書冺言論維持王化憑眞一五老眞傳要秘存斗母天尊頌曰洞陽赤炁篆就法雲攝歸靈府絳華揚芬故天寶之以致浮地秘之以致安五帝掌之以得鎭三光乘之以高明上聖奉之以致神高尊賞之以致眞五嶽從之以得靈天子得之以致治國祚享之以太平實靈文之玅德乃天地之玄根威靈恢廓普加無窮蕩蕩大化爲神明之宗其量莫測巍巍乎太空明眞有格今當以行是時元始革運玄象開圖靈文鬱秀神表五方分判天地開化萬靈此太宗之業可得暫披於靈韞乎今皇道敷暢澤被十方仰觀劫運眞風宜行臣私心實欲使雲蔭八遐風灑蘭林寒條仰希華陽之繁朽骸蒙受靈奥之津仰對元慈下伸丹懇惟願哀憫俯念蒼生不審靈寶玉篇眞文可得見授下教於未聞者乎玄根玅德章第二十三天師張眞人曰凡物莫不有其根故自天地之大以至一民一物之細必有恃以爲堅固依憑之本而後各安其位各效其神獨是萬物正性命於天地之中則其恃天地以爲根也可知然天地又何所恃乎知天地之所恃則上如三辰之煥朗凡麗乎天而以氣相屬者下如山嶽之聳峙海湖之淵渟凡麗乎地而以形相托者與夫鍾毓發生於天地之中而效靈呈異者莫不分明蓋天地所恃者道也卽其玄根也其實皆一氣也儒家卽彜倫修道雖言窮理盡性至於命而養氣之學遵之者少禪家卽空性言道惟從靜修頓悟入門又決不言氣惟我玄家所重在氣蓋有氣則精可固而神可存再立性命而與天地同體與大道同符故學者當養氣以求復性不可遺氣而空言性夫天地之大不過大道一元之靈氣運建眞氣生發梵炁主宰浩炁流衍在昔説經教主或表爲赤文或摹爲雲篆或演爲神咒莫非指是洞陽之赤炁示人欲其恃爲根本能固之則爲立命能全之則爲復性本來尊貴本來神靈本來鎭安本來眞實順之則治逆之則亂凝之則久傷之則暫得之者尊失之者賤具之者靈剝之者蠢天無此何以輕淸上浮徤行不息地無此何以重濁下凝而永貞不墜言天地則聖人可知矣天子可知矣國祚可知矣吾於此章特標是義以明赤書雲篆玄根之實際閱者珍之天地玄根靈寶玅德赤炁靈文寶哉勿失陰陽眞精五靈毓秀立鼎安鑪乾坤依舊尊經明闡入道有門極玄玄學極玄玄根箋釋玄天上帝曰玄教廣大儒釋同歸流及後世或依或違忘其根本採其枝葉本根旣忘枝葉亦失愈趨愈下墮落愈遠性命不知色身不穩理氣不分工夫盡紊三教學人何以言修試觀天地厥有玄根玄玄常運玄玄常存玄玄無上玄玄無淪何以玄玄本於先天先天之炁後天附焉氣本浩然流行萬古氣爲眞機萬靈之主果有眞氣修爲有基盡性至命保固維持天地之根惟此爲眞聖賢所恃爲靈爲神充塞宇宙安鎭萬春保劫御極興國太平煌煌天經赤文雲篆制御五方功勳無上五行眞精是曰五老求請靈圖爲民頌禱根原是陳再立坤乾暫披靈韞安固延年維斯經旨八萬劫傳返求鍊己自契玄玄關聖帝君曰天地生根聖有根頂天立地鎭存存全憑浩氣行千古先有丹心到孔門一部春秋淸亂本九重聖主總乾元赤書雲篆先天炁鼓盪充周命不淪正陽帝君曰三教聖人歸一理全憑正氣保無疆法雲慧力通三世文教英風正五常道啟玄元揚赤炁經傳奥玅放天光玄根玄處先天體天地淸甯在洞陽文昌帝君曰乾坤日月皆吾炁赤炁揚輝處處靈爲有玄根同太極自然煥發合天經流行萬古兼千古合撰淸甯永太甯靈寶洞陽敷玅德眞機運動不留停孚佑帝君曰浩然之氣大而剛充塞乾坤顯一陽自此昇平千萬世恒安熙皥樂無疆赤炁靈圖皆煥發瓊書雲篆善鋪張天地有根因有此玄玄玅玅見眞常斗母天尊頌曰天道玄玄地道安安根原不朽一氣周完於是元始天尊撫几高抗凝眞遐想觀時已至普謂時會一切眞聖論定陰陽推數劫會移校河源檢錄天度選擇種人指拈太無嘯朗九玄永無開聽於陳辭有若閉礙求眞之路是時五老上帝啟問不已良久元始天尊乃垂盼眥之容慨爾歎曰微乎深哉子今所叩豈不遠乎此元始靈寶之玄根空洞自然之眞文生天立地開化神明施鎭五嶽安國康民靈寶玄玅爲萬物之尊天發玄瑞靈應自然今三天盭運六天道行雜法開化當有三萬六千種道以釋來者之心此法運訖三龍之後庚子之年雜氣普消諸天慶會吾眞道乃行今且可相付當錄於上館未得行於下世玄科有禁不得便傳子可詣靈都紫微上宫視天音於金格取俯仰於神王然後當使得備天文以總御元始之天也眞文顯運章第二十四天師張眞人曰至眞之文卽赤書之字雲篆之篇爲天地之玄根亦卽元始靈寶之玄根與運推遷而主持劫運因運顯晦而保持運會是故運逢其會則與運俱興會非其運則與運偕藏甚且爲之轉移匡正維持安甯乃見眞文之玅用夫眞文卽眞道也卽正氣也眞道興則一切外道皆絕正氣運則一切雜氣皆平夫邪正不兩立眞僞不並行顯晦不同時治亂不同機究之反否爲泰易危爲安移亂爲治回死作生者卽眞道也正氣也卽總御元始之天之眞文也天尊慨然興歎鄭重其辭非吝於開度而靳乎流傳也惟恐違時則流行無機非時則功效無凖是故論定陰陽推數劫會移校河源檢錄天度選擇種人皆所以重乎眞文而進退必俟乎其時也至於昌期一轉大道流行時會一新正文絢爛學道者尙其因時而動見機而作應運而興乎則眞指拈太無嘯朗九玄生天立地開化神明爲萬物之尊握玄科之禁掃淸雜法待五子歸庚之時而親受元始之眞文矣穆穆玄宗蕩蕩皇風一眞無僞終始皆同應運而顯開闢混濛靈圖靈書福惠無窮箋釋正陽帝君曰吾門大道惟有一眞眞宗誰啟太上玉宸眞風誰主金闕聖君眞機何在無見無聞眞文何在雲篆氤氲是曰靈圖亦曰靈書傳得眞訣與道而居做得眞人大乘大儒眞氣運動眞理無虛康濟兆民眞意如如無所不眞立天地根總御元始爲聖中尊五老啟問撥轉天門眞心叅悟眞性存存太眞御几永不沉淪麻祖元君