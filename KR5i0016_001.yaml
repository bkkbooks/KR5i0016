body:
  text: 乙丑十二月二十日戌時諭重刋道藏輯要太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷上玄藴咒大哉元始無量度人演淸淨教登引天真玄座說法寂然無聲玉帝放光喜慶難言是為心傳亦曰天根大圓滿咒瑤章洞文集以成書敷落神真臣今東向誦願與天齊并存亡俱證果永度愛河津淸微天宫神通品第一道言元始天尊昔在淸微天中玉京金闕七寶玄苑玉皇宫殿升光明座與無鞅數衆宣說靈寶淸淨真一不二法門應運說法章第一天師張真人曰元始天尊無上法王是道祖也即祖氣也玉皇上帝總握萬天即元始祖氣之所發皇大道之真身法門之主宰無鞅靈聖之宗師也其實元始祖氣萬天宗主是一是二故在天尊說法之時玉皇宫殿與七寶玄苑淸微天宫互相輝映然非由靈寶淸淨妙道不能透此玄機入斯妙境蓋淸淨則真一真一則不二不二乃入法門躬朝上帝而道契玉淸至尊無上粵義開宗高著眼孔至理重重箋釋正陽帝君曰玉淸一現即是玉皇氤氲祖氣發為休祥照耀天地一十七光淸微天上巍峩帝鄉玉京山內時有天香玄玄寶座恆演天章這般妙理若個親嘗天樞上宰闡發輝煌羣真奉命再為發皇真機祕密口訣精詳引彼後學直達天堂流傳不息後嗣必昌白祖仙師曰玉帝玉淸本一家淸微妙有兩光華真機祕訣傳元始道範德輝被海涯金闕巍巍為帝座玉京朗朗散天花法門無上超無上足下生雲絢彩霞海蟾帝君曰讀得尊經做得仙玉淸玉帝盡通玄法門不二歸真一至德無鞅總萬天靈寶瓊書參祖氣淸微帝座復先天天師代代真人出妙法於今要遍傳文昌帝君曰玉京金闕本巍峩上帝天王妙理多萬有羣生歸太極瓊編玉笈隱天和靈臺淨處通靈寶愛欲無沾出愛河莫道文光揚七曲帝光無盡道君哦孚佑帝君曰玄座說法妙無倫大羅天上選羣真超然無上真風遍其數無鞅帝座人一部尊經全付汝萬端妙義盡通神往代天師重演法聖朝留得億年春斗母天尊頌曰大道無言三教咸尊經傳元始朝帝有門是時玉皇尊帝與諸真聖飛天大聖無極神王靈童玉女九千萬人淸齊建節侍在側焉乘機與會章第二天師張真人曰玉皇尊帝元始之分身總握萬聖還與萬聖尋源返本依然從祖氣而來其實諸真聖衆又為玉皇尊帝之分身靈童玉女依然為玉皇尊帝諸真聖衆共有共具之真靈真秀真陰真陽故一齊皆從淸微天宫聽法九千萬人不嫌其多咸集元始會下尚嫌其少淸齊建節禮儀輝煌逐隊成羣忠貞不二蓋元始以心印玉帝玉帝即以心印諸聖自然嬰姹同靈老陽生生是誠天地開闢以來第一法會讀經者當默會此玄機箋釋玄天上帝曰玉皇尊帝萬聖之宗皆從元始禀具金容汞為玉女鉛是靈童八十一數妙義重重其光晃朗其氣和融紛紛紜紜惟帝是從返本還元淸微天中元始說法即在爾躬淸齊純一建節崇隆諸真聖衆久侍瓊宫上帝招攝恩惠無窮俱在帝心祖氣之功惟皇建極廣博無窮會萬歸一聽法來同九千萬人總一蒼穹天尊演法妙有真空高高證果永播真風正陽帝君曰元始說經玉帝聽靈童玉女盡神靈本來一道源流合莫怪羣真拜舞殷建節揚幡揚至德淸齊仰道仰明君九千萬人皆會集一心一志頌鴻文麻祖元君曰誰為玉女與靈童自己家珍莫看空但使九千萬人集乃知十七帝光同淸齊建節從天道聽法參玄為我躬一部尊經何人受帝主分明在絳宫文昌帝君曰元始分身是玉皇高高無上十七光靈童得處從神女真陰永駐結元陽書傳妙有層層奧氣播坤輿處處香悟得帝身歸祖氣手攀丹桂狀元郎孚佑帝君曰此身即是帝分身帝身還從玉淸神上蟠下際皆吾道食德飮和盡聖人聽法殷勤還建節淸齊專一試捫心九千萬人皆元始童是真陽女是陰斗母天尊頌曰結得陰陽讀得瓊章九九數合咫尺帝鄉於是玉帝知時欲至即於會前舉六通力放大光明遍照諸天無極梵剎一切境界皆大震動十方無極一切世界俱同琉璃玻瓈無有隔礙知時放光章第三天師張真人曰玉皇尊帝會元始之座聽元始之法即現元始之神通而照耀元始之法界何莫非元始無礙之光明夫帝身即道身即元始之分身不可以常身論然非由常體不能顯露真體彼在常體能轉六識為六神通則圓融無礙自然洞徹三界十方上天下地不隔一塵佛國天宫自然感動况玉皇尊帝會元始祖氣無極大道之金身建豎乾坤首出庶物之德範其光明自然昭著如慧曰之照臨如靑天之圓湛究之無聲無臭無色無相乃是玉皇尊帝真體穆穆深遠泯厥思慮寧有言詮然而包舉六合之力量收攝無極世界之光明自不能掩所以隱顯隨時動正由心其卷而斂之也則渾然一氣不露其端其放而露之也則灼然萬象瑩徹無礙帝德所至之處即帝光所到之處有何境界可以障礙者乎於戲覩此光明已令人欣歎不已而猶未竟其靈通也有欲近上帝之琉璃玻瓈光者請從是經讀起箋釋正陽帝君曰皇矣上帝大道之樞神通無上照耀坤輿六窗無塵六洞皆虛六根淸淨六塵難拘如中天日如出海珠光明一現萬里無殊琉璃境界亦比玻瓈十方梵剎一氣連枝神力扶天何况羣黎德光返照三境相齊何况十方國界東西或南或北十極穹廬不能收攝同體而居圓明無礙帝德規模知時不違心手相符浩氣包含玉體光敷默朝上帝捧讀瓊書何祖元君曰帝有真身現六通光明無礙十方同知時乃與真機應光被無非祖氣融梵剎三千金世界王居百萬玉帡幪三才萬象歸皇極個個發生雨露中白祖仙師曰惟帝高居白玉京上通元始下蓬瀛西天境界歸南極北海鯤鵬到太淸總無一物相隔礙都由聖力太充盈地軸天關輕舉處往來變化任遊行文昌帝君曰稽首吾皇十七光光明放處燭無疆八𡒕八極歸皇極萬氣萬方總上方南北東西金色界木金水火玉龍堂六通聖力神明德證得琉璃到帝鄉孚佑帝君曰帝有真身顯六通我憑至德玉光融不染一塵彌羅境真歸三境太微宫琉璃本相玻瓈映身世真修色象空上天下地遙相接誰云無分步玄穹斗母天尊頌曰聖力開天神光燭地妙境分明真經夀世十方來衆並乘五色瓊輪琅輿碧輦九色玄龍十絶羽蓋麟舞鳳唱嘯歌嗈嗈靈𡚱散花金童揚烟讚謠洞章浮空而來十方來集章第四天師張真人曰十方之衆皆自元始一氣分形本與玉皇尊帝同具妙體然而一實萬分則萬有不齊萬殊各異雖與帝同體而流派各別安能返本還元一自帝降恩光普攝無窮於是十方皆能返照聖衆皆能復性乃知玉皇尊帝即體以攝用十方聖衆即用以歸體一理流通一氣招攝一光煥朗自然脫去凡塵離彼繫滯且能默運斗車潛轉天輪御九陽之真氣蔭十方以慶雲由是鳴鸞嗈嗈祥麟隊隊金童為之揚紫氣玉女為之布絳華淩空步景浮游三界上天門而朝玉皇尊帝歌洞章以頌帝力於何有是顯用歸體之時非帝光被及不能讀是經者有不欲親近帝光者乎猛省猛省箋釋玄天上帝曰三界十方不知其數聖衆紛紛來集何故為因有形秀靈全賦玉帝同光玉淸理具物蔽氣拘漸失故步上帝好生天光滿布招攝無窮示光明路見光而來返還本處萬殊會一體正用彰咸朝帝座倍有輝光麟舞鳳唱盡發休祥金童玉女皆服瓊裳鈞音振響逸韻琳琅乘雲為馭輦道非長飛蓋揚旌已到帝鄉共歌聖德拜禮元皇瞻雲就曰遇此慈航延億萬春尋我真常天尊訓語捧讀莫忘觀音世尊曰西天佛子到南雲只為天光布處均一德輝煌無盡劫十方來集帝庭春金童玉女神通大瑞鳳祥麟氣象新寄語學人須鄭重本根原與帝同神正陽帝君曰十方無盡更無邊跨鳳乘龍到帝前不有金童歌法曲安能玉女産真玄鳳麟皆是靈機育乘駕莫非正氣傳大洞真風歸帝典十方來集十方仙文昌帝君曰玉皇總握萬天中光被無邊拜舞同總為一元無別物自然一日會瓊宫祥麟自可招鳴鳳金女必須接聖童君聖臣賢歸有道九天無處不春風孚佑帝君曰十方久已共蒼虛今曰何因返帝廬總為色塵傷墮落當從光照覓安居金童玉女皆和協威鳳祥麟入畫圖那怕雲程隔萬里瓊輿來往似通途斗母天尊頌曰遙遙帝京不隔雲程十方來集乃見真情是時梵天一切金仙大乘菩薩四衆八部承斯光照皆乘碧霞九靈流景飛雲玉輿慶霄四會三辰吐芳飛香八凑旋繞道前雨衆妙花如雲而下遍覆會前金仙普至章第五天師張真人曰梵天為釋教歸宿之所金仙即其所證之體尊重之為大乘明非二乘之所能及普濟焉為菩薩明非獨善之所能仰四衆即其支流派別八部即其護衛維持似與玄教無涉嗚呼分門別戶三教不能歸宗交謗互嘲一道徒興剌謬泥乎語言文字誰能返本還元不知性命兼修為大道仙佛同體為口訣何為大羅之金仙何為大乘之法寶本同而末異殊流而滙源故三教之道合之則是離之則非何况乾體金剛即金丹之本體金身丈六即金丹之發現所以步九光之霞舒三辰之華八極飛香四維布彩禪理淸淨何故層層皆是玄家妙用况帝身即是佛身菩薩之心必契上帝之心光明洞達之時自然兩相照耀天花繽紛如雲雲駕浮游來會一氣感通一道同居有深信者自然與毗盧遮那印合箋釋伯陽魏真人曰梵天釋教號曰如來如如不動好結靈胎金花布彩可上蓬萊金身丈六直上瓊台金蓮萬朵捧獻金階金容有喜選佛場魁休哉帝光照耀八垓三世諸佛咸曰善哉承光覲揚圍繞千回凌霄殿上許坐無猜本來一理元始栽培毗盧現在孔孟道該擎天玉柱平地良材是真佛子何用徘徊金門出入九棘三槐娑羅樹下帝德當懷達摩祖師曰妙有雲宫古佛場老僧也去覲恩光萬二千言真妙典一十七種太輝煌三世諸佛相印證大千沙界共吉祥莫道枯禪難入聖西天不隔白雲鄉正陽帝君曰百種修為百種殊徒笑空門四果徒豈知上帝心相印自爾朝天理不虛照耀未空佛子國袈裟飛錫聖人都不有金丹寧丈六人身乾體本非誣文昌帝君曰七曲衡文古大儒也從玄釋做工夫法場選佛掄元手帝座升仙奪錦徒九十七化宏三教百千萬種護皇都尊經法席傳真道定慧如來即是吾孚佑帝君曰圓通文尼是道身禪理精微妙無倫雲盡水窮傳真諦西天南國播皇仁一家何用分玄釋十地寧能外紫宸寶馭雲車朝帝座本來不是外邊人斗母天尊頌曰帝總三教何分玄釋大乘菩薩咸通玉籍是時其光遍照諸天下燭下方無極世界同玄都境凡彼人間上近九天通接交連至親至邇凡彼下方無極世界山陵坡坂溝澗溪谷緬平如掌六合至邇三境非遼天寶臺殿星羅人間瓊瑰羅列朗耀雲衢七寶欄楯以界道路玉樹仙花蒨燦珠實景秀丹田芝草覆綿時彼下方皆見諸天鈞天妙樂隨光旋轉自然振響又復皆見鸞嘯鳳唱飛鳴應節龍戲麟盤翔舞天端諸天寶花零亂散落遍滿道路光照下方章第六天師張真人曰是即帝光遍照之處極其量而言之其奧妙處上數章已明可知玉皇尊帝總握萬天主張造化下通萬地生成民物近其光者皆得長生得其光者皆入妙境是以上下有交通之象遠近無隔越之時坡坂山陵皆關道妙草木鳥獸盡啓玄機三境即在人間城國如在天上六合遼遠不異掌上觀紋萬象森羅皆是天心發現一時人民何慶何幸遊此景化之中不異胥華之國鈞天樂奏皆是一德自然宣揚天寶奇花皆是一德自然秀實所以諸天稽首萬聖踧踖凡彼下方日在堯天舜日之中不識不知順帝之則須當信及自己一點靈光原與玉皇尊帝天懷不隔心香朝謁朝乾夕惕欲淨理純之時自然透此景象乃知帝光時時照耀人間處處樂國人人化宇無窮奇異盡在當前箋釋九天應元雷祖天尊曰惟皇上帝一十七光上天下地莫不輝煌一時民物皆在帝鄉耳聞目覩靈異非常險夷一致道路皆香鳥含奇花獸舞天端玄歌妙樂一時發皇人間天上一掌平觀三田珠煥七寶為欄鏡光圓徹世界平安億人兆人帝賜寶丹各承帝澤就日非難九光龍戲五色麟盤和氣所布發育胥殫自己心君保固須完然後契合上帝恩光自可乘雲上謁天皇莫負這種栽培恩長雷尊所示讀者參詳正陽帝君曰上帝光明世界通人間盡在玄都中緬平一掌蠶叢陷景秀丹田玉樹紅鳳唱麟盤和氣應花飛樂奏道機融無量度人恩無盡光圓寶鏡與誰同白祖仙師曰六合同春帝子家恩光煥朗被無涯欄開七寶弦須合芝呈三秀鼎生芽珊珊玉骨鈞天樂灼灼珠光滿路花莫謂塵凡隔天境分明分得帝光華文昌帝君曰盡在堯天雨露中堯天舜日兩相融耕田鑿井民生遂摩義漸仁物性通擊壤歌中皆祝華卿雲爛處盡呼嵩中天泰運當前是拜舞八方格被同孚佑帝君曰讀得尊經做得仙仙家景象倍生妍天光顯露民生泰帝德加臨夀算延但使三田芝結秀自然七寶路生烟玄都妙境高瞻處六合成家上下連斗母天尊頌曰六合三境本是一家文明照耀處處瓊霞是時凡聖駭異幽暗開光天人悅慶踴躍歡欣凡夫學士盡得飛升仰觀劫仞寶臺俯眄紫雲彌羅是諸世界一切人民咸臻道氣白首面皺皆得化度紺髮朱顏少壯幼稚轉得形容光澤美好苦惱痊平普蒙解脫安樂快然天下歌謠欣國太平神通感效章第七天師張真人曰帝光無盡帝德無盡也帝之神通無盡帝之恩澤無盡也試觀六合之內何處不是帝力運轉帝道含宏發現處即是生機沾被處即成靈藥雖蠉飛蠕動亦荷天光何况禀元始祖氣以成人者靈秀獨鍾淸明不闕本與帝心聯屬有不近廓落之光而有明效大驗者乎是以老者換顏幼者潤身為士者直上天階求玄者早登雲路由是俯仰皆煥朗之光歌謠樂太平之世然上帝度人無量本欲盡十二類衆生而共為接引乃自礙其光明因自外於上帝之光明本原皆差真性難復則滿地荆棘舉步榛莽本豫以解脫之法自己少安樂之曰則夫忽焉駭異忽焉悅慶忽焉快然者當於自已身中領取斯不辜負上帝放光嘉會箋釋正陽帝君曰巍巍帝境即在人間紫雲常覆惡劫永删日月交煥仙聖淸閒即是三境即是靈山淸明元氣被及千般食其光者皆得換顏近其光者災劫不干從此解脫萬載平安上蟠下際皆大還丹寵錫大賚承受非難不可自誤背日求寒要當悅慶智慧求完自與帝光交映萬端讀是經者永度急灘麻祖元君曰上帝神通有萬端神通到處即平安皤皤鶴髮還成少怯怯童年已得丹天下如身歸有道太平無地不平寬淸光復處天光合化度飛升本不難白祖仙師曰惟皇恢漠大神通明效般般世界同老幼平安歸化曰天人悅慶坐春風玉爐璀璨天光協金鼎輝煌道化融滿目生機須記取一分雨露十分紅文昌帝君曰天開地闢盡生人形體雖分不異神神與皇天非濶絶光分上帝自歡欣性情既定容顏換雨露無偏世界新總是陽光頻照耀凡夫學士一家親孚佑帝君曰本是家親當外人可憐墮落幾千春自非上帝光明現安得人間雨露新老幼不分皆化度天人同體盡歸仁欣國太平緣有道天下分明在爾身斗母天尊頌曰帝德昭明法界充盈人無智愚被者長生當爾之時神風遐著萬氣揚津天震地裂枯骨更生沉尸飛魄皆起復形酆都鐵圍長夜九幽即時破壞地獄衆生化生諸天三惡道苦一時解脫時諸罪輩以斯光力得生十方諸大天宫枯朽化生章第八天師張真人曰帝光無盡不惟能引聖離凡並能轉凡為聖不惟能發生有情之物並能發生無情之物不惟能接引淸淨無塵之體飛升天上並能化度罪業滿盈之輩而直上天宫蓋由酆都鐡圍衆生造成桎梏長夜九幽衆生自趨黑暗乃得帝光照臨則神風遐著而不遺萬氣揚津而得度一時頃間刀山劍樹盡變為羽蓋霓旌馬面牛頭倐轉為靈童玉女罪孽雖積若邱山巳消黑簿善功雖小如涓滴皆記瓊書所以沉尸飛魄皆復本體朽骸枯骨知返真元天關震動而陽神出現地戶崩裂而陰濁普消於是全體皆金妙用同天朝元日到延億萬年化生十方諸大天宫不過返自己家園然非由帝光一點金丹駐鼎何能枯木生春陰魄變神有志登雲而求金丹大道之士可自外於上帝之靈光明德而空言爐鼎者乎箋釋九天應元雷祖天尊曰帝光下臨萬物皆春沉尸飛魄起復為人枯朽老病面貌若新酆都山陷鐡圍城崩九幽長夜俄頃光明地獄罪輩得上瑤京蓋有真體與帝無分真風遐著點石成金萬氣歸元陽體無陰天宫超證地獄無因更生永活萬劫千春學道之士勿錯用心佳哉帝光沾被功深金爐有此寶鼎有根朝謁無虛是帝最尊尊經一部一念存存帝恩深重許爾朝元正陽帝君曰堪嗟世上物藝藝死到臨頭不返根上帝好生光普被金丹有分命歸元萬氣雖紛今得度真風遠播體皆存九幽長夜莫愁苦返照分明道是門何祖元君曰命由自己亦由天天光照處己身妍真風遐著歸真一萬氣揚津證萬仙志氣淸明無地獄身軀朗潤結芝田三惡道中無名姓只因參透玉皇篇文昌帝君曰真風一到氣歸源結得靈丹自返元長夜九幽除死籍天宫三境茂生根沉尸也有飛升日枯骨重逢化度門本行真經即妙藥羣生㸃活盡存存孚佑帝君曰佛為三界大醫王上帝靈丹更有光一十七般隨錫豫百千萬姓要親嘗死期已至猶能活枯樹逢春也有香從此斷除三惡道乘雲跨鶴到天堂斗母天尊頌曰煌煌帝典句句丹經濟生度死隨用隨靈爾時玉皇即分其身遍於十方諸大天宫令諸天宫自然化現白玉為京黃金為闕七寶玄苑大光明殿具光明座幢節幡蓋異寶奇花遍布是處分身化現章第九天師張真人曰帝德光明普攝一世事亦奇矣而其悲願猶未止也而其神靈猶未竟也於是游戲三昧大顯神通以一德而恢宏為萬德滿諸乾坤之內即以一身而分為衆身圓全天地之數分合由心變化無窮夫以十方諸大天宫分理萬方國邑城郭其數可量乎而玄範總於十方斯又奇矣乃復於十方天中各各化現白玉天京黃金寶殿各各俱有七寶玄苑光明寶座一身貴重則百億化身自然莫不貴重一方如是治理則千萬方亦當如是治理究之玄境無為輝煌彌布皆自上帝天心中成就帝德如是圓通帝光如是照徹而帝力亦復如是神運要皆一元大道之妙用如是帝身即道身豈不信然讀是經者其深參之箋釋玄天上帝曰上帝神通無所不有變化隨心般般美好黃金為闕白玉為京金容玉體隨地而分光明座上處處分明幢節幡蓋種種充盈萬殊一本一可萬端十方治理萬地皆安萬幾日理惟仁惟寬隨用皆靈隨豫皆真栽培傾覆馭物惟均六龍御天處處生春衆生稽首夙夜惟寅隨方化現邇室彌親自己絳宫帝降威神十號圓滿普應十方志氣淸明默朝玉皇在帝左右親近帝光現身之處不斷心香吾總玄天蕩魔天尊亦是如此玄妙之門時時鑒察惟此為真我即上帝金闕化身觀音世尊曰三十二應是吾身真心早與帝同神金闕玉京分處處朝天禮聖自頻頻恩光南海西天普德範瞻雲就日親無盡藝生無盡惠十方萬地一時均正陽帝君曰人人各有一天君靈異俱從上帝分上帝分身無盡藏天宫萬化不紛紜馭物隨心能變化御天有道更神靈寶幡絳節誠心供一點丹心達帝庭文昌帝君曰大道神靈在帝心帝心靈應更淵深全憑一理生天地總有真機作鑒臨信手方方生白玉因時處處長黃金莫云金闕太遼濶化現諸天爾室尋孚佑帝君曰信是天皇有異能十方化現十方承玉京處處朝儀鳳金闕高高引大鵬九萬里程風助力百千種道我歸真我亦化身千萬億方方稽首帝威神斗母天尊頌曰淸微天中大顯神通帝身無量處處瓊宫爾時玉皇即以所分之身遍於是處白玉京中黃金闕內七寶玄苑大光明殿光明座上普為十方演說淸淨解脫之道分演妙道章第十天師張真人曰大道一元塞滿天地渾渾淪淪流為民物乃藝藝衆生日遊行於大道之中而自離於大道之外蓋自拘於形氣蔽於物欲濁而不淸禾嵗丿而不淨所以不能解脫自在遊行且三惡道中淪墮無休可憐苦海無邊何日登出頭之岸煩惱萬端何在非投網之慘解脫之難言也久矣幸哉帝恩無盡帝德難名帝身無盡帝之度人亦無盡所以一身說法猶恐不能遍及必須化現多身一境說法猶恐不能遍度必須化現無量之境然而帝身與帝境雖曰無窮無盡而所示之妙法只是此一元之大道是道之體本來淸淨必不染一塵者方能復還能復還一元大道者即真解脫既能解脫則陰陽不能拘形體不能囿且將與玉皇尊帝異體同神然非玉皇尊帝金口宣揚誰能回光返照識認自己真體而超升解脫欲聞法者從後參觀箋釋彌勒世尊曰靈鷲山中我佛說法藝藝衆生得大解脫千萬億身皆稱正覺我在梵天主治兜率佛治大羅巍巍金闕是曰玉皇無上帝尊萬天教主總握乾元度人無量佛願周圓不遺一人個個成仙道身無量佛法無邊十方度盡皆示真傳性是菩提命更幽玄解脫之道惟此為先千經萬典十聖三賢舍此一法難脫迍邅乃在前曰妙理昭宣今日吉慶又啓法筵一理三教大道無偏我佛說法拈花微笑綱舉目張無非奧妙我得金旨顯在當來略說半偈助緣成胎我是真佛不必徘徊在此說法多寶塔開毗盧遮那歎曰善哉觀音世尊曰這般大緣非容易彌勒尊佛到此來只為釋迦即玉帝遂令真佛下雲階龍華勝會他為主解脫法門今又開得此佳緣還不悟說法先為歎幾回正陽帝君曰解脫門開度有緣無緣怎得讀瓊編誠心感得靈山佛妙法重興玉帝筵金口宣揚猶不信蒼生煩惱苦徒煎玉皇慈憫方方顯若個得成上上仙文昌帝君曰我說三家本一家學人都笑語言差不知解脫歸天道總在神明無障遮淸淨無為私欲淨經書實踐性情和闡揚玄道關三教莫使吾皇歎奈何孚佑帝君曰真經真法在吾家句句精微理不差不二法門全是道天尊大闡信無遮良緣會合傳丹訣一氣淸明返太和赫赫王言須跪聽君還不信奈君何斗母天尊頌曰帝坐瑤京悲憫羣生分身說法解脫功成時化玉帝各以無量天真大聖妙行真人靈𡚱玉女侍列左右是諸玉女顏容姝妙端嚴奇特天珍異寶莊嚴身相言音淸徹衆所樂聞如是諸女其身復出微妙解脫自然之香是香芬馥周遍諸天極妙樂土及餘大地一切福處六道一切衆生聞是香者普蒙開度所謂天道人道魔道地獄道餓鬼道畜生道若諸天道一切天人或有能聞是此香者五衰四相永得除滅轉增天福若諸人道王臣兆庶或有能聞是此香者即得人天長夀之樂身或滅度即得脫殼尸解之道若諸魔道一切諸魔或有能聞是此香者安處天宫鬬戰之苦各得休息若諸地獄道一切衆生或有能聞是此香者離地獄苦得淨土樂若諸餓鬼道一切餓鬼等或有能聞是此香者即得飽滿無饑渴惱若諸畜生道一切畜生或有能聞是此香者脫畜生苦得智慧樂聞香解脫章第十一天師張真人曰玉帝化身遍滿虛空既以神通化現妙境復以神通化現種種嚴飾且各有一切侍宸賢聖未嘗缺少法音一時周遍萬天天香一時芬馥萬境異哉至德發皇如是奇特至道精微於此可會矣蓋一元大道之精神命脉現為玉帝大道之精華孕育現為衆聖故化玉帝神通即能令諸聖化身玉帝所現之處即諸聖所現之處且諸聖所在之處何莫非玉帝鑒臨之處體用交輝源流互顯道本如是玉帝之神通如是諸聖之化身亦如是也然聖德發揚之光即聖德太和之氣光能普遍照耀氣自流動充滿和祥之極馨香之至矣德光既能變朽回春則德馨自能轉苦為樂試思世間沉檀諸品不過土木和氣所發且能感召天神融洽肢體何况上帝至德所發玉女同體太和有不能遍滿乾坤而超脫六道衆生者乎天人安處天和靈蠢同遊化宇上下一德幽冥交濟德光與道氣共被於無窮非吾天尊上帝何能充滿其量如是箋釋玄天上帝曰巍巍聖主至德發皇郁郁奇氣至道宣揚太和充溢處處吉祥謦咳珠玉吐屬馨香衆生有緣決不荒唐飲帝之和被帝之光食帝之德挹帝之芳玉女同心道味開張至哉坤元乾德彌彰真風鼓蕩丹桂同揚何欣蘭蕙何愛沉檀聞者得生嗅者皆安鼎爐有此可結金丹諸天同道左右盤桓神通互顯救度無難六道衆生災永不干從此超證度出惡灘酬帝之德拜舞天端正陽帝君曰動有奇光靜有香乾坤總是帝休祥道機翔洽同蘭蕙德味縈回遍廟廊六道衆生咸感仰諸天萬聖久深嘗神風再著真經顯撥動天和萬世芳麻祖元君曰帝坐天宫總道機神通種種更玄微香焚案上金童掌香散人間玉女飛寶鼎溫溫看火候旃檀處處示真機輪回六道無窮苦得共諸天侍帝幃文昌帝君曰玉女能揚帝德芬諸天侍列擁祥雲生機處處馨香達元氣霏霏世界薰六道安寧皆證度天宫瑞靄總氤氲桂香寶殿歸吾手也是吾皇身上分孚佑帝君曰諸天為帝久揚芬故此朝朝現彩雲玉女坤貞乾道協奇香天應地輿薰道意淵微春發育德馨流布氣氤氲桂子蘭孫今接踵淸芬須向帝光分斗母天尊頌曰至德馨香學者親嘗精神煥發瓊籍流芳爾時諸生天罪衆既得生是勝天宫已緣承慈光攝受之故便得覺悟各各明了罪福因緣與諸眷屬作天伎樂來詣帝前是諸衆等各各含悲俱發聲言前後經千劫萬劫不見三光常處黑暗三惡道中多受苦惱伏蒙玉帝方便放光愍救我等皆生天上是諸惡業悉皆滅盡無諸繫滯皆得往生仰朝玉帝各到道場是諸生天一切罪衆說是語已稽首復位承香覺悟章第十二天師張真人曰悲哉衆生大道之分形禀上帝之神以為神承元始之氣以為氣乃不能振拔復還遂令千萬劫中常處黑暗三惡道中常為繫滯苦不可言何望解脫至是乃明了罪福因緣不亦晚乎然以後來之衆生論則猶尚為早也至於衆生生天則天中人矣神矣仙矣聖而賢矣佛菩薩矣而猶未免含悲聲言似乎不必乃真情發露自然心酸若至今日則又當以含悲自己者為後來之衆生含悲遂不禁大聲疾呼聲言於衆曰爾等何為千劫萬劫不見三光墮落惡道何時出離吾當示爾衆生以解脫法門須各受持玉皇本行集經一部以為生天復位之本肯深信否猛省猛省箋釋九天應元雷祖天尊曰雷祖發聲大衆齊聽千生墮落萬劫伶仃三光不見長夜晦冥呼天不應呌神不靈永無出期坐卧寒冰若要漿水對曰不能上帝慈憫幽暗生光廣施恩惠密布馨香盡出地獄直上天堂一念回轉萬惡深藏一念真誠萬善咸彰全體陰濁變成純陽記名仙籍侍列玉皇此等衆生復位天宫志氣神異淸明在躬聖賢仙佛早早成功後來衆生性命與同切莫再墮三惡道中留心經法朝禮蒼穹自有天尊鑒爾丹衷接引提拔妙境無窮文殊世尊曰可歎幽陰苦衆生人間世上不知名幸從帝力生機轉遂使靈臺善念盈依舊蓮花泥不染至今寶殿座無塵真心一現含悲意回首當年誤萬春正陽帝君曰因何墮落萬千春一念差遲苦不伸帝光照鑒真光現道氣薰蒸善氣純有腳春回升帝座無笙曲唱運洪鈞從茲不必含悲意俯視羣生眉又顰文昌帝君曰總為蒼生繫此心此心悲憫深復深三塗墮落無春夏上界升遷少信音一自帝光通十極遂從和氣脫寒陰因緣自古無差錯善士升兮惡士沉孚佑帝君曰地獄餓鬼與畜生這般苦楚何時平陽光動處天香發惡念消時善果成方寸靈臺通帝座當前回首即瑤京證到瓊宫無上位御前猶自表真情斗母天尊頌曰明明帝前赫赫經筵回心皈命離苦生天爾時玉帝出大妙音普告十方諸天聖衆汝等諦聽此諸罪輩曠劫以來縱無明性造十惡業六塵遍染三業縈纏肆意任心曽無覺悟陰罪陽過日積月深背道違真順邪棄正舉心運念動結愆尤遂使命過之後身落三塗不得解脫若非今日遇是法筵何由出離妙音開度章第十三天師張真人曰玉皇尊帝以元始祖氣神通發為光明融為馨香抑且動為聲音是大妙音即是一元大道之鼓動太和翔洽之節奏矣故被是光者性體自然昭融聞是香者生機自然勃發則聽是法音者心地自然智慧可知蓋此衆生厯劫墮落六根三業日積日深陰罪陽過愈趨愈下總忘卻自己本來面目甚且漸消漸磨將太極一點靈光散盡嗚呼背覺合塵舍正歸邪一團黑氣自斷本根上帝好生實所不忍所以普度無窮神力大顯放光不已引以德香天香普播不已猶必明宣天旨啓金口指示因緣宣祕傳明開生路不得已而自道其實曰若非今日遇是法筵何由出離為己得生天之衆生歎乎實欲彼未得復位之衆生共聞也讀是經者曽覺悟否箋釋正陽帝君曰天尊上帝最神最靈放光普度法界熒熒布香大覺聞者開明人人解脫俱證玉京君臣一德相慶帝庭天顏有喜出妙音聲諸真稽首肅敬咸聽言言金玉句句分明要淸三業要淨六根十惡永斷真性存存立命有基入道有門瓊霄證果紫氣朝元昔何愚蠢今亦聖尊惟時衆聖有歎無論回首思惟不覺心驚帝恩深重報答惟誠昔曽自誤再無誤人天尊睿訓為衆敷陳聞者須信莫誤自身萬劫留傳此言是真觀音世尊曰十惡三業並六根千秋萬劫盡沉淪迷津不渡何人渡心地常昏性不昏妙音朗徹三千界衆等超升十二門維皇指示分明在那用靈山問世尊白祖仙師曰墮落幽陰不計年今朝也得到靑天若非帝力歸元始那得凡身做上仙十惡斷時三業淨六根空處五行全天尊金口明明示萬劫千秋永正傳文昌帝君曰帝坐瑤京理萬方人歸地府失真陽寒冰惡浪層層陷劍樹刀山處處傷一念回春憑帝力三田育秀得天香度人無量恩無盡謦咳於今震十方孚佑帝君曰諸真聖衆用心聽上帝宣揚句句靈若要瑤京通名姓可曽靈府轉幽陰法筵得會憑天力寶鼎生春結紫金吩咐衆生須學我瓊編祕語用功深斗母天尊頌曰大道無言於穆帝尊羣生開度口訣為門爾時諸天化身玉帝即以神通不動其所移接天人皆令得至淸微天宫玉淸聖境元始會下是諸衆等不覺不知是時天尊衆會見是十方玉帝化身普皆來集天尊會前如無邊明鏡照諸影像互相容入時諸大衆稽首瞻仰玉帝化身聖中最尊增長淸信益加志樂心無退轉起大堅固時諸天人邇得生天忽覩天尊勝會道場淸淨第一無為功德之所莊嚴踊躍歡喜一時作禮歎未曽有顯露法性章第十四天師張真人曰玉帝即道體也既已化現妙身自然承載法性大放光明性之現也大布馨香性之和也大發妙音性之節也則夫普度無量移接天人皆是性真力量諸真聖衆於是皆復其性矣蓋諸真聖衆以玉帝之性為性超升妙境則是還性本原不知玉帝又以衆聖之性為性衆聖能復其性則上帝性中之用已歸體矣上帝能攝受衆聖以歸其體則用中之體盡歸元矣此理奧妙竊恐衆聖不知故於天尊會前即以化身顯露真身衆身顯露全身體用交輝性光互映居然寶鏡瑩徹彼此通融虛明之體靈湛之用未曽隔越惟時衆聖乃悟自已根原與夫玉帝光明普現馨香四達聲音朗徹皆一性之所發現即皆人人一性之所咸具者也見此景象倍生覺悟方悔往日十惡三業障礙靈明無限今幸滴滴歸源得歸正覺起大堅固永無退轉說法度人少報上帝普度深恩箋釋白祖仙師曰性之一字上古未聞降衷恆性乃有真文尊經古奧渾而不言儒家闡發成性存存佛家參悟見性為門吾家玄妙性命為根性在命中命因性定性命雙修虛靈神應天師慈憫示人真傳特標法性以明先天玉帝化身靈異百出明鏡周圓互相容入以體攝用即用顯體體用交輝精微玄理大千世界皆在鏡中纎塵不隔彼此交融復還性體快樂無窮上帝開化以身示教法性周圓尊經妙道惟爾學人衆聖為師承帝之光祖氣為基飽帝之德定爾心思聞帝之音絶妙言辭得未曽有再莫差遲我來箋釋觀者信之正陽帝君曰法性圓融處處通光明無盡亦無窮無邊寶鏡含沙界一片瓊蟾朗萬空本體既真無滯礙千般作用總歸宗羣真何幸逢嘉會周旋琉璃佛光中長春杜真人曰性是儒門真實理分明三教共根宗光明無礙天光妙色象莫粘萬象空一月普照千江水萬水還涵一月中玄理玄玄何處顯帝光處處見圓融文昌帝君曰性是菩提處處融無邊明鏡照虛空但能體用相輝映乃信乾坤闢混蒙萬象虛明含滿月一真顯露協蒼穹玄玄妙理人難識玉帝分身顯一宗孚佑帝君曰體用歸源要性空十方化現十方同交光互顯重重月無礙生明處處通總是先天真景象要看神室透蒼穹乾坤一鏡相涵入妙旨真傳帝座中斗母天尊頌曰先天後地煥朗通圓總歸性海萬鏡高懸爾時十方諸化玉皇俱復一體從法席起北向長跪天尊言曰往昔去世有國名號光嚴妙樂其國王者名曰淨德時王有后名寶月光其王無嗣嘗因一日作是思惟我今將老而無太子身或崩歿社稷九廟委付何人作是念已即便敕下詔諸道衆於諸宫殿依諸科教懸諸幡蓋淸淨嚴潔廣陳供養六時行道遍禱真靈已經半載不退初心忽夜寶月光皇后夢太上道君與諸至真金姿玉質淸淨之儔駕五色龍輿擁耀景旌蔭明霞蓋是時太上道君安坐龍輿抱一金容身諸毛孔放百億光照諸宫殿作百寶色幢節前導浮空而來是時皇后心生歡喜恭敬接禮長跪道前白道君言今王無嗣願乞此子為社稷主伏願慈悲哀愍聽許爾時道君答皇后言願特賜汝是時皇后禮謝道君而乃收之皇后收已便從夢歸覺而有孕懷胎一年於丙午歲正月九日午時誕於王宫當生之時身寶光焰充滿王國色相妙好觀者無厭幼而敏慧長而慈善於其國中所有庫藏一切財寶盡將散施窮乏困苦鰥寡孤獨無所依怙饑饉癃殘一切衆生仁愛和遜歌謠有道化及遐方天下仰從歸仁太子父王加慶當爾之後王忽告崩太子治政俯念浮生告敕大臣嗣位有道遂捨其國於普明香嚴山中修道功成超度過是劫已厯八百劫身嘗捨其國為羣生故割愛學道於此後經八百劫行藥治病拯救衆生令其安樂此劫盡已又厯八百劫廣行方便啓諸道藏演說靈章恢宣正化敷揚神功助國救人自幽及顯過此以後再厯八百劫亡身殞命行忍辱故捨已血肉如是修行三千二百劫始證金仙號曰淸淨自然覺王如來教諸菩薩頓悟大乘正宗漸入虛無妙道如是修行又經億劫始證玉帝說是語已法筵淸衆異口同聲歎未曽有發明本行章第十五天師張真人曰玉帝以道化身自然而然不假修證何有本行蓋道無定體以大生廣生之羣生為其體帝有全身即以萬物萬形之萬體為真身所以厯劫行化劫劫分明從實度人實實踐履以一身入萬身之中而為之質幹即以一氣融羣形之內而為之主宰所以治理平成經綸不歉醫療教化泛應兼長作止因時隱顯有道接待則貴賤平等貧富一心且忽焉化現王公忽焉化現修士忽焉舍庫藏而不惜即捨血肉而不吝乃一心不退於多劫苦行厯徵諸百世通萬古如一息顯真常於億劫今者總握萬天無為致治高居金闕夀量無疆回憶降生之年直如前日事也雖曰三千二百劫不過略說其苦行之規格而已可易量其度人無量之實際乎至於抱送金容則表其從道而來國王皇后則表其育秀天地光嚴自然妙