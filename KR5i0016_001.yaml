種法體難名是故汝等欲見是帝乃不可得者緣以汝等尚於身口不捨結習煩惱行業由是障故不能得覩是帝慈顏吾今為汝時會衆等宣示斷障之法汝等大衆宜各奉行時諸大衆不勝喜躍各於至尊几前稽首作禮俱欲願聞天尊言曰斷障之法當生大悲無起疑惑無起貪嗔無起淫欲無起嫉妒無起殺害無起凡情無起凡思無起貪妒無起聲色無起是非無起憎愛無起分別無起高慢無起執著凝神澄慮萬神調伏心若太虛內外貞白無所不容無所不納無令外邪亂其至道牽失真宗敗其靈根盜其至寶致爾萬劫永墮凡流透入俗網萬魔來攻百千萬劫不聞妙法鬼神執誅從生入死是故汝等應當志心善護真宗無令喪失如前所說如是諸障汝等各各當除斷之身得淸淨超度諸難是名道寶持法棟梁更當修奉是此經典如近是帝生尊重心著想尊容稱揚名號然後汝等得覩慈顏咸蒙護度普聞妙法親奉供養永無流轉是時四衆聞已歡喜歎未曽有斷障見帝章第十九天師張真人曰元始祖氣化現玉帝並化現一切大衆故大衆莫不各有道體法身但能道體法身莫不顯露則元始玉帝精神已通當前明現自然移接瑤京聽法淸微得大解脫起大堅固天尊聖果程功超證奈何明明道體一墮人間種種諸障牽連而起卒使道身墮為披毛戴角之身法體淪為痛苦傷殘之體萬劫幽陰三光不見萬重羅網何日出離悲哉然而天尊慈憫普示妙法上帝好生開度無盡因於放光顯瑞寶蓋蔭覆之後即厯厯稱揚上帝功德猶恐入道者心不堅固離道者心不速悔於是再為四衆開示斷障之法夫障有多般道無二致心含一道塵去則鏡自明沙去則水自淸障斷則道自現道現則法身顯而本體明矣本體既明則真宰無為自理祖氣復還不失由是乾金剛大之體重建頂天立地朝上帝而證位玉淸是亦道體也是亦諸真聖衆也是乃真見帝光親聽法音實聞妙香而朝夕悅慶於天花寶蓋之下果有誠心尊奉是帝則當佩服天尊法言勿以斷障為難箋釋玄天上帝曰悲哉衆生惡貫滿盈牽失真宗黑籍書名敗其至寶永隔蓬瀛斷其本根滅性流情往來惡道徒苦哀鳴籠中刀上誰管怨聲何以至此可憐衆生總為一障濁而不淸牽連滋長愈障愈深寧有貞白惟墮幽陰愈趨愈下異類傷心今幸覺悟得聞妙法元始金言率履無越如是諸障當實斷之心君為主一善為師昭事上帝再莫差遲默想金容誦持寶號境若太虛神明來告萬氣調伏一真獨抱上帝鑒誠明傳法要親見是帝超證道妙急早回頭終須有靠悲哉衆生誰皈聖教何祖元君曰障礙百千誤我身致令萬劫受沉淪天王慈憫諸天少上帝光明普世仁至寶維持誰敢盜真宗調護不留塵金容觀想徽稱熟斷萬魔兮伏萬神正陽帝君曰離道都由障礙多欲心妄想動邪魔重重陷阱重重網步步氷霜步步波口訣留傳須早斷帝恩深重轉天和真宗至寶真心護煞鬼毒龍奈我何文昌帝君曰鬼國魔山幾萬重隔住靈光永絶蹤帝境崇高何日到先天悠遠那年通陰雲掃盡看紅日蔓草難圖仗劍鋒縱有樊籠須跳出乘鸞跨鶴是英雄孚佑帝君曰帝心原與我心通障礙千層不少空劖斷靈根因愛欲原無悔意叩蒼穹虛言寂待庚方月妄想高乘閬苑風勇決當天發誓願纎塵不染出樊籠斗母天尊頌曰靈根育秀皇路聯登全憑慧劍斬斷葛藤太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷上終太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷中太上大光明圓滿大神咒品第二爾時天地始祖五老上帝稽首長跪白天尊言伏聞高上玉皇慈念蒼生普放神光照燭法界六凡四聖普叨道蔭竊以凡夫短景劫運將終正道宜行以濟兆民使修真之子有期輕舉末代蒸民俱獲夀考表揚五老章第二十天師張真人曰一元大道即元始也穆處無為而付其權於玉皇上帝則帝又為道之主矣所以總握玄綱推數劫會生成民物其政治俱歸之大羅金闕然尊無二上何以復有五老上帝物無兩大何以又有天地始祖嗚呼玄教之精微在是矣夫大道一元劫終不變劫始不遷即萬劫以前之萬劫萬劫以後之萬劫俱是不搖不動但即現在之劫而言混沌之後忽焉生天忽焉生地忽焉生人生物有何具乎蓋道本一理中有動靜道本一氣體分陰陽動靜互為根陰陽兩相濟有動靜乃有消息終始元會運世年月日時刻分之循環有陰陽乃有寒暑燥濕淸濁高下剛柔健順顏色骨肉之分四時五行之數人能外此五行乎五行根乎陰陽陰陽根本乎道彼元始祖氣道也陰陽五行之祖也陰陽五行又為天地之祖也不有陰陽不有五行有天地乎是故言道者不知天地之始祖在陰陽在五行又何以結撰五行交會陰陽而建立天地以立性立命故於此經發揚主宰大道之帝種種神靈不測化理有經既於上卷極力敷揚因於紫微金格中提出上帝當曰宣付五老妙旨以明經理天地之大道而特標之曰天地始祖五老上帝乃知五老即五行之精神實為穹蒼真老運御乾坤之大臣所以慈憫衆生與帝同德代衆求請問法救濟而願玉皇上帝時時普放神光箋釋九天應元雷祖天尊曰五老上帝五行之精主治五方最神最靈根本元始禀治帝庭乾坤以正氣運不停召龍止水保劫延齡順序三辰斡運萬星各安職守興國太平法會放光常繫厥情為衆悲憫代衆經營進叩元始奉法施行蒸民永濟運會常亨真機將轉道運將興兆民有主上帝有臣神咒流行天下同仁經標意旨參悟在人傳經教主大法將伸乘時校正以濟斯民吾為箋釋學者良因正陽帝君曰五德乾元亨利貞五行金木水火土雙修性命有真傳烹鍊鼎爐要真主玉皇本行經最微天地始祖悉皆歸五氣朝元今有日啓問天尊啓慧機麻祖元君曰五老原從一老來乾坤得此永無災淸寧合撰民生泰上下歸真意氣偕南北東西歸皇極木金水火會天階惟有天尊知奧妙真經啓問莫疑猜文昌帝君曰信是天王會說經五方五老叩天庭地天交泰星辰序金土無差水火寧妙法須參圓滿咒真機全在玉皇經蒸民夀考當千劫化度光明感衆靈孚佑帝君曰因何感得衆真來舊日天光尚繫懷解脫方方皆錫福政權處處不生災真功圓滿真言力道妙機關道祖裁總為蒸民維劫運天門進叩為君開斗母天尊頌曰五氣流精天地淸寧赤文當顯再請帝庭自昔元始洞玄靈寶赤書玉篇真文生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗無氣無象無色無名無形無緒無音無聲混沌太無靈文菴靄乍存乍亡二儀待之以分太陽待之以明靈圖革運玄象推遷乘機應會於是存焉赤文妙藴章第二十一天師張真人曰赤書玉篇真文即顯露一元大道之精藴也著其光彩則曰赤書至陽之氣本赤條縷可會則為書著其秀靈則曰玉篇至粹之精如玉實有片段則為篇著其體用則曰真文至靈之理有信莫不結搆以成文是道也即太上洞玄靈寶之所掌者也生於元始之先空洞之中可知其玄妙獨出精光獨顯莫先於元始而猶居其先則又元始之所以為元始劫終而不見其終劫始而無與為始者矣浩浩難名渺渺誰說自非五老上帝親身厯證孰能知之然難名而必欲名之難說而必欲說之則但想諸天地未根日月未光之際只有一幽幽冥冥氣象而是赤書玉篇真文已存乎其中卒之微妙難識把捉無據似有似無誰聞誰見是先天之景象也無極之義理也太無之機緘也混沌赤文今古罕聞無迹可見微渺何存冥冥無光空洞無根既無方所惟有推遷奧矣妙矣靈焉神焉參悟到此乃契玄玄大哉赤文吾道精傳箋釋正陽帝君曰赤書玉篇天下玄文微妙難識精藴誰聞大道體段雲篆氤氲乾坤正氣默運流行幽幽誰見蕩蕩難名無終無始亦充亦盈全無迹象惟有真誠先天之先後天之後主宰維持自然結搆順理成章金石能透撰於玉淸宰於玉帝宣於五老包乎天地時時發現世人罔識罔識其機入道無力無力入道聖文遂隱經旨明標振裘潔領玄門奧義最上上乘參悟實見帝境可升無量洞空天帝曰平地成天一卷書最尊最貴是文儒性情已正陰陽合倫理無虧志氣殊手訂赤篇今尚在帝傳雲篆古無虛水精之子衰周出五老同參定世符長春杜真人曰玄教明明闡赤書儒家惟此是工夫五經四子皆天道玉軸瓊編是帝符天文煥爛人文顯帝德輝煌帝世熙本行皇經標要旨先師明證五老知文昌帝君曰儒典佛經總是書天王祕授更同符昌明文教遵經寶貝葉文傳護帝都五老宣揚傳道妙萬方歸極仰皇謨先天景象從茲見混沌赤文存太無孚佑帝君曰當年曽讀數行書歸宿玄門也不殊實證先天赤氣顯祕傳口訣玉文符象天象地存真象無色無名隱太無這段機關人不識也虧五老闡靈圖斗母天尊頌曰先天奧妙總在赤文根原顯露誰見誰聞玉帝授臣靈寶祕篆大不可思議神咒故天地得之而分判三景得之而發光靈文鬱秀洞映上淸發乎始靑之天而色無定方支勢曲折不可尋詳元始鍊之於洞陽之館冶之於流火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書靈圖既煥萬帝朝真飛空步虛旋行上宫燒香散花口詠靈章是時天降十二玄瑞地發二十四應上慶九天之靈奧讚三天之寶明神風既鼓皇道咸暢元始登命太真按筆玉𡚱拂筵鑄金為簡刻書玉篇五老掌録祕於九天靈都之館玉女典香太華執巾玉童侍衛玉陛朝軒九天上書非鬼神所聞雲篆功用章第二十二天師張真人曰雲篆即赤文也赤文言其實雲篆著其用實本乎道用發於人昔在元始天王立於天地未生之前觀於日月未光之會尋得其詳知洞陽之氣赤達玄象之推遷上淸洞映色無定方天地因之而分判日月因之而光明於是摹其靈紋播為靈圖取其光芒法其規模鍊之於洞陽之館冶之於流火之庭成為祕篆凝聚靈秀惟時陽光煥發陰德安貞乾體高明瑞氣布於二六之辰坤體博厚祥光映乎三八之節品物因之而育秀鬼神不得而知聞祕之靈都之館藏之無上之宫五老上帝曽受之於穹蒼真老至是又欲行於下世故特表其功用述其因由以傳來學乃知雲篆之文如是貴重如是神奇識之者神明煥發得之者造化在手其實微妙難言玉淸貴重上帝鑒臨當會之於言思擬議之表不可忽視赤書玉篇本無正文摹為雲篆煥朗氤氲演為神咒流傳古今尊為誥命一畫千金箋釋九天應元雷祖天尊曰赤書煥發赤氣光明赤心一點通達三淸其妙難識其理難名先天之象祕在瑤京惟茲雲篆品節分明支勢曲折功用神靈五老而外誰傳其精元始摹繪顯於始靑掌於上帝品物咸亨三辰照耀天地淸寧性真妙用大道真形洞陽之館流火之庭鍊筆成圖役使萬靈字皆一丈藏之杳冥色無定方象有定體參悟在斯實關倫理玉皇寶誥惟是為真玄玄神功妙用惟人正陽帝君曰千古誰識雲篆文光輝朗耀氣氤氲乾坤日月真形體神鬼魔𡨚敢聽聞分判陰陽同五典維持義理過三墳安爐立鼎丹房內安鎮方隅要用君虛靖天師曰龍虎山中別有春丹房丹竈日相親鍊成至寶同雲篆冶就黃金獻玉宸元始洞陽施彩筆先天赤氣在真人維持王化全歸我五老薪傳佩服神文昌帝君曰虎符龍劵總吾身大洞法籙更覺神總是先天雲篆結再看五老授圖真乾坤自此無災劫元始而今錫是人妙用神功當識認氤氲流布萬年新孚佑帝君曰妙用神功歸雲篆氤氲繚繞鎮乾坤不因元始瓊宫鍊誰識吾家玄道尊玉律金科同奧妙馬圖龜書泯言論維持王化憑真一五老真傳要祕存斗母天尊頌曰洞陽赤氣篆就法雲攝歸靈府絳華揚芬故天寶之以致浮地祕之以致安五帝掌之以得鎮三光乘之以高明上聖