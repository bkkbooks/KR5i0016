太微仰注我身腎府鮮開安鎮靈宅萬神總歸身生羽服舉形自飛北方洞陰朔單鬱絶五靈玄老黑帝三元符命上王適月命天仙戊己多力士辟水源三命正戊入力人任曰遣惠無為君適百百九君有臣三千此度己身右玉皇誥命以錫北方洞陰朔單鬱絶五靈玄老黑帝五氣天君令統御北方諸天諸地日月星宿名山靈洞水府泉宫上聖高尊真仙聖衆一切威靈符命所臨如誥奉行帝誥御世章第二十六天師張真人曰太上大光明圓滿大神咒皆上帝之誥命也誥命到處星辰順度神祇安寧魔鬼潛踪水旱不作災疾不干天淸地寧國泰民安此皆天地自然之正氣所結絢為雲篆結為赤字序為真文合為玉篇集為赤書表其感應不爽轉移最神應時如心符合天地之機大道之運則曰大神咒此神咒玉字皆一元赤氣所結非臆說也有人伐木中有楷書天皇太平四字其體獨堅不受斧刃觀者異之以此知天地秀靈之氣何所不有陰陽造化之妙何處非奇是故天文絢爛則如星雲地文璀璨則如流峙人文光華則如詩書况赤氣生成天地其精神煥發更必有萬倍神奇者不能絢而成文乎夫人民何自而生聖賢何自而成不知自己之玄根安能知天地之玄根不知自己之赤氣安能知天地之赤氣且自己不能有大光明圓滿之願安能知天地大光明圓滿之大神咒天降殊恩妙法流行校正經文諸天詮解普福一世利益後人請勿詫異篤信受持以完全自己之赤氣玄根斯不負上帝所錫之大光明圓滿大神咒天地有心民物生成聖人有願世道太平經功圓滿大道流行真言在處帝放光明箋釋藥師琉璃光王世尊曰天下有四聖教有三萬理以定萬國所瞻各有志願明說一番示爾衆生信吾法門四大部洲統於一元三家聖賢學者宜遵教雖分門共此根源聖同此心滿願誰論願在安懷儒者本根願在救度佛子本原菩提慈心超絶語言玉皇上帝我佛世尊玄綱總握運御乾坤三教之主下定崑崙治四天下億載無更慈心廣大億兆生生靈哉帝子治世太平梵氣融結梵唄音聲梵天宗仰梵典流行梵王功大拜上瑤京口誦靈章逸韻誰賡摩訶般若吽泮分明集大神咒圓滿吾心藥乂神將護持功深琉璃光中帝鑒慈忱同心救度災劫不侵吾有真言帝有妙音舌根圓滿教化至今三教經書莫非神咒萬理歸源不遺不漏本行集經超乎宇宙包盡文章團結靈秀一切語言誰出其右順星治魔留淸去垢諷誦真言人天護佑諸天詮解經旨獨透我降靈壇不先不後賜以箋釋禪關誰扣毗盧家風依然靈鷲神咒流行帝光依舊我是藥師琉璃光王觀照世間同帝恩光一十七種十二大願交朗互發無虧無缺稽首皈依莫尤莫怨成仙成佛總要大緣諷誦神咒福惠自天今日吉慶又啓法筵聖賢仙佛感應百千觀音勢至文殊普賢先天凖提定慧光圓各抒妙解各示真傳神咒圓滿世界三千讀是經者吾為摩頂受記不遷必來指引一切咸聽凡夫短景速證速修大羅天境吾願如是爾誠必秉敬奉帝書夙夜凛凛詮經說法醒乎不醒留示後人當躬深省正陽帝君曰佛門立教重威音音宜梵唄意思深真傳普作真言誦神妙祕於神咒吟圓滿帝光開至教宣揚赤氣正天心毗盧祕旨藥師授五老傳來度古今觀音世尊曰從聞思修義理深聞處分明有道臨舌吐靑蓮傳佛法潮平素月見天心輪王日日宣神咒帝座明明說梵音經傳五老觀音釋大悲心契無絃琴文昌帝君曰願心圓滿何須咒功不圓兮咒必真尊勝楞嚴徵佛力靈書赤字頌皇仁聲音顯處光明現效驗靈時梵唄神三教從來歸一理詩書誦讀道歸身孚佑帝君曰真言也放大光明圓滿皇心處處行一十七般皆祕咒百千萬世坐瑤京有聲不似無聲好無效都由有妄生五老真傳傳世上木金水火永無傾斗母天尊頌曰金石琳琅宣揚帝光保持劫運圓滿瓊章道言是大神咒者元始之妙言玉皇之真誥上淸自然之靈書九天始生之玄札空洞之靈章上聖之祕語玉宸之尊典成天立地開張萬真安神鎮靈生成兆民匡御運度保天長存上制天機中檢五靈下策地祇嘯命河源運役陰陽召神使仙此至真之妙文神應自然致天高澄令地固安保鎮五嶽萬品存焉咒力圓滿章第二十七天師張真人曰至哉神咒大哉咒力奇矣妙矣敻乎絶矣無以復加矣詮經者至此安能再贊一辭惟當泯厥言論無思無慮默會元始立說之心神遊天地未根日月未光之際安固本根可也又安敢浪費紙墨徒供後人覆瓿之用災梨禍棗徒供後人謗議之資然既說到此處既無說亦當勉强立說雖有說亦仍如無說這般大道到底教吾從何處說起雖曰詮經半部於此大道尚只說著三分讀經者至此試觀說經之聖於此大道不得已尊為神咒又解之曰此元始之妙言玉皇之真誥上淸自然之靈書乃復又明之曰九天始生之玄札空洞之靈章上聖之祕語玉宸之尊典不嫌言重語復亦為於此大道無窮無盡無可執捉渾渾淪淪無可攀援至神至妙無可贊美挂一既恐漏萬分疏不勝繁多由是可知道之為道矣由是可知道之神力矣吾於此章勉强分玉宸之尊典以上數句為表揚神咒成天立地以下數句為表揚神咒之力上制天機以下數句為表揚神咒之圓滿以下總讚之拘牽文義不可說道天語渾淪略指其要赤文玉字帝道愈光功圓行滿力量無疆箋釋九天應元雷祖天尊曰天尊憫世下降宏文文本赤氣縹眇氤氲輝煌絢爛結篆成雲回環字勢團結縈紋集字成書是播靈圖有用則靈力量有餘上中下際三才同居保劫禦災處處寧諸是大神咒祕在帝都有得之者處處安居度人無量功德深醇綿彼皇祚享億萬春太平立見生成兆民丹室有此丹道通神為民福主為帝名臣神力獨運本量無垠鬼精破膽聖道彌真天機祕密制御淸寧五方之神安固其形地祗紛紛呵護莫停山林永鎮河海淵渟陰陽太和仙聖效靈萬有萬安咸會帝庭靈意玄札天地之根靈圖祕語至道之門讀是經者契協乾元神咒流行普掃不祥五氣調和萬範開張天威不測天道咸彰既全天德佩服天章天功浩大天語煌煌上天恩重瑞啓南天天開文運天啓法筵本行集經解釋成箋雷從地起雷祖在天詮經而下天語雷傳是經神妙受持無遷神咒力量護持無偏雷尊有願保護聖賢得是經者各宜勉焉關聖帝君曰立德立功學聖賢修真修佛與升仙全憑自已無窮力卓爾英雄孰敢先赤字玉章皆助道真文祕語絶言詮敷揚無盡神通廣舉地安人更補天正陽帝君曰舉鼎移山更負舟這般力量不為優開天闢地憑雙手引聖生仙據上游自此羣生知帝力須教苦海變瀛洲分明神咒神通大何不歸家自已修文昌帝君曰扶得乾坤做得人無虧人道做仙真仙真力量無窮盡力量周圓絶垢塵玉字赤書即我性制天策地即靈神這般力量真然少元老法燈五老薪孚佑帝君曰學道何須力量强全無力量配柔剛無為無作先天體若愚若呆夀命長試看尊經揚玉訣只憑赤氣顯陽光這般力量君須記圓滿之時佐玉皇斗母天尊頌曰神咒力强保制功高處處周圓不缺絲毫玉帝昔授五老上帝是時五帝跪捧其章祕題靈都之館天真皇人昔書其文掌之於上淸真境太玄玉都寒靈丹殿紫微上宫纍經劫運而其文保固天根無有毁淪與運推遷是大神咒混之不濁禾嵗丿之愈淸毁之不滅滅之極明大有之文天真所尊自無金名帝圖刻簡來生斯文隱祕不得窺聞有得之子保萬氣長存勤行修奉刻致神仙妙道體相章第二十八天師張真人曰不圖為說之至於斯也道本難說而說經教主竟自明明說出種種光彩種種真實並種種神異居然日月星雲煥文章於碧落山嶽河漢布境界於坤輿何文不顯何理不明前章已言至矣盡矣不能讚一辭矣乃讀至此章殊覺神志淸虛明見先天之體神思煥發實窺祖氣之根可以上會萬劫以前之萬劫下知萬劫以後之萬劫莫遠於四大部洲舉目若在當前莫微於太末小蟲回觀皆我分內乃知聖賢千經萬典三教正說喻說皆我心中本有者也尚不早思解脫固我天根速讀聖經保此赤氣天恩深重不可辜負自身重大要當愛惜吾即此一章經文而論之玉帝昔授五老明此玉文赤氣原有主宰之帝必須帝宰降臨而後五帝順治一元密布而後五德歸宗一氣淸寧而後五行發育為之溯其本原則皆自先天祖氣而來故說於開天首出之元始而傳於太上靈寶之玉宸證以神明天縱之皇人心心印合而猶必祕藏上淸真境太玄玉都之內寒靈丹殿紫微上宫之中可知明有本原凝會之所並非虛擬其曰保固天根無有毁淪則自天而下之根可知矣與運推遷則其運之長短久暫時刻杪忽可驗矣大哉大有之文莫過於神咒神咒之真即所以傳此赤氣混之不濁禾嵗丿之愈淸明其體之真實也毁之不滅滅之極明明其體之堅剛也合併讀之曰混之不濁禾嵗丿之愈淸毁之不滅滅之極明則體用交輝本源顯露彼凡得此赤氣以為根者其體段亦當如是可知孰意藐哉一身具此玄微奈何任意戕賊自撥本根况天真所尊則人不得不重之矣自無金名則萬理萬端萬有萬真隨取隨擕隨用隨顯不拘一格難定文字即太上道君所謂吾不知其名强名曰道者也斯文隱祕不得窺聞則暗修祕悟惟有一段天機而非泥乎語言文字亦非假乎言語論說者也果有保萬氣長存者乎則當勤行修奉如是之大神咒吾知天真皇人薪傳不替毗盧古佛可以受記元始天尊金書立至矣道即赤文千聖一門三才建立惟是為根一得永得永不沉淪箋釋北極玄天上帝曰嗟爾衆生原有天根奈何不悟萬劫沉淪天根何在赤氣存存存得此氣保爾千春萬載不息以靈以神為民福主為帝大臣天宫尊貴淸淨絶倫自然快樂煩惱無因既無惡魔亦無凶人賢聖往來左右羣真雲嗷樂奏逸韻堪聽祥麟鼓舞瑞鳳齊鳴前執絳節後擁霓旌星軿鶴駕玉殿金城佛國無異極樂無邊玄玄妙境在大梵天奈何不悟自惹迍邅墮落無盡回首何年上天憫世傳示玉篇民歲臘日吾降經筵尊經奧妙開闡有仙箋釋經義世有大緣果能尊重如是經文如是神咒修奉更勤吾必默佑衛以慶雲災殃永斷惡劫不臨靑雲路上報爾真心天宫妙寶隨意而獲舉步安車隨處樂國爾等試思樂好苦好死好生好人好禽好凡好仙好自己心驚速尋好路勤奉真經如此金言句句神靈况有箋釋開導分明世界衆生俯首咸聽吾即金闕上帝化身好生救劫來此度人是亦神咒謗者必嗔雷部聽令念佛不神九天應元雷祖天尊曰一聲震動即回心枉把千經萬典尋到此乃知神咒力從茲不敢一塵侵皈誠向道天根固去濁留淸萬劫存修奉勤行如是法維持護衛有雷尊正陽帝君曰正陽帝果吾修證保得天根萬劫存任爾禾嵗丿汚淸更顯隨人毁滅體難淪尊經修奉得神咒金格流傳顯道門法嗣從今天下出當遵妙旨復乾元文昌帝君曰吾自天香殿上來天香隨我正縈回闡揚神咒真機透開導羣生元始偕去濁留淸功已久生明少禾嵗丿福當加瓊林宴上誰居首當代哲人吉士家孚佑帝君曰人世從來不信神分明帝主語言真既有天香為後驗當憑神咒助前因不生不滅禪機透萬氣萬年至道親幸有真心還赤氣再從七曲覲皇人斗母天尊頌曰至道淵微體相分明帝圖修奉萬載生生洞玄靈寶玉皇功德品第三爾時玉虛上帝白天尊言惟願慈悲願為四衆帝釋等及四梵天王一切諸天一切諸仙及未來一切衆生持是經人說利益事爾時天尊告玉虛上帝言快哉斯問不亦善乎汝以慈悲愍念衆生故請問於我天尊言曰若有三界十方無量國土及國王大臣或兵戈並起疫氣大行水旱蟲蝗凶災饑饉是其國君后𡚱太子宰輔大臣當發慈悲為其黎庶遍敕國內州縣鎮宰令諸道流淸淨嚴潔於其觀內設大齊醮六時行道為轉此經當得國土淸平五穀豐熟黎庶安泰請經保國章第二十九天師張真人曰天尊憫世上帝度人說此經法傳斯妙道有道乃有經則求道於其經經在則道在故讀經以明道持經以修道從來法不孤起教無往授故我元始天尊玉皇上帝高處天宮晏坐無為皇皇穆穆巍巍蕩蕩依然天地未根日月未光時氣象雖曰玄機默運濳孚萬方其神明則度人無盡而足跡要未嘗有所偏著力量未嘗有所震動體相未嘗有所滯礙又何假於言說自非有誠心向道進求祕密者專懇之忱迫為肫切指示則何處又尋大藏法寶來玉虛上帝親與法會見上帝之光聞玉女之香聆上帝之法音於寶蓋會下至是又見五老上帝為衆心切求請經法與聞神咒之力量本原惟恐已入門者或生退悔未入門者難起信心故欲以修奉力指利益功庶乎道不虛行經不虛讀惟時天尊感動為衆說法於是玉皇功德品著矣夫經以演道道在經求道以救人人惟求經其實經者徑也道之階梯也讀經而不知道經又何為故凡讀經之士當明經旨何在經語何為是此經也即是此道也昔阿難尊者於佛將涅槃時請問結集經文首置何言佛云但置如是我聞四字試思語尚未發如是二字果何所指乎我聞者又何在乎妙哉佛乎可謂善於立言矣非即指此不能說而又不可不說之道乎非即指此人人共具一人各足之道乎不然吾門經首所謂道言者此道字將何所指一切道經中所謂轉誦此經者豈在口中喃喃之語乎哉且所謂國土淸平黎民安泰轉禍為福轉死為生者豈口中喃喃遂足以致之乎所謂轉之云者運行之謂也所謂此經者即言語中所指當身中所具之奧妙也然則經可不必轉誦乎非也誦之者求其理也轉之者詣其實也今於請經保國章特明此意以為讀經者之勸試觀經云十方國土遇災逢劫為轉此經必云先發慈憫又曰六時行道果何所指耶即云圓滿大神咒神而且靈所謂圓滿者何在也神而且靈者何在也知吾此說則讀此經得之矣即讀三教之經亦得之矣不然舍本求末反曰經之言不驗可乎至於真經保國自然之事不必疑惑箋釋協天大帝關聖帝君曰一部尊經玉皇心印以順氣機以順時令以御乾坤可神感應故誦之者宜昭誠敬悲此衆生舍本求之經言義理不肯修持惟徒口誦為衣食資建立道場愈滋疑惑託言祈年託言祝國或以禳星或以祛疫聚斂貨財充已私槖假公濟私何嘗有益虛名動衆全無誠心徒延法衆酬經以金福利不得災禍已深不知聖人立說立經總為度人共樂帝庭災劫不作國土淸寧正道既興五穀豐登一心皈善樂境必升示諸衆生度之無量成就保持終超無上善心圓滿祕語如神要知此義讀誦無愆天師慈憫發此言詮經旨大明是為真傳吾是漢代關聖帝君德可協天天威共聞保持國土扶助黎民災難我救𡨚抑我伸我還扶助孝子忠臣功在萬世心在億人詮解尊經教訓皆真不是僞撰信念當純讀是經者我皆降臨保佑到底不負真心讀是經者凛我法音阿難尊者曰山海慧自在如來一切佛書親手裁可恨世間徒口誦遂令天上共悲哀毗盧又闡釋迦行妙典今傳神咒開說不盡玉皇功德稽首經筵歎善哉正陽帝君曰仙聖當筵欲哄堂一點真誠動十方解到天機皆爛熳自然法界普馨香從來三教難歸一由此千真永不忘總在昭昭明明處窮經共見帝輝光文昌帝君曰七曲山中著述多胥疑僞造奈人何不知皆自天經出從此堪平苦海波救劫真心今道出延年妙道咒非訛聖君賢相同修治如意揮時轉太和孚佑帝君曰孚佑帝君慈願多說經救度又如何真言祕語傳沙界保國安民絶險波今朝詮解咸歸一後世聽聞自不訛全是天真靈性發天香鼓動播天和斗母天尊頌曰心誠願滿國泰家寧煌煌天語運轉通靈若復有人入諸山林遇毒惡獸但能存想一念真經山神衛護猛獸自退終不害己若入江入海採寶求珍值遇惡風如法持念是此真經風浪頓止安穩達岸若在軍陳戈㦸既接兩刃相交存心默念是此真經是諸惡賊悉自退散若在牢獄枷鎖之中淨心定慮存念真經𡨚枉自伸即得解脫若為邪精鬼賊衆苦所加如法持念是此真經衆邪遠避自然除愈若人為求嗣息如法尊重持念此經帝敕天曹明檢丹籍九品之內四果仙人運應數合謫降下生為其作子才辨明慧人中尊貴若婦人臨難之月如法持念是此真經即得母子平安生福德男女人所愛敬若為求官進職爵祿亨達貴遇人君如法持念是此真經即得職務遷轉子孫榮遇世世不絶若人欲求資財殷富如法奉持是此真經即得財寶充溢衣食自然慶流子孫傳之萬世若人被諸惡星之所照臨困苦床枕如法持念是此真經是諸惡星返降吉祥若人命過應入地獄注名惡籍父母師長夫妻男女當為亡人持念真經或安置道場幡花供養即得亡者鬼籍盡除神生淨土同苦罪衆咸蒙護度承斯勝利皆生天上濟生度死章第三十天師張真人曰人生世上何事為大生死為大夫生死人之常也生則隨之而生死則隨之而死生有何歡死有何懼但恐生也徒生則生為虛生死也徒死則死為浪死斯真無歡而有懼矣何謂虛生以大道全具之身不能信及自為戕賊既不肯忠主孝親廣行慈惠由義居仁動循典則而所行者皆是殘忍詭譎貪叨貨利害衆成家謀人利己之事是舍天地之生氣而取天地之敗氣矣如是之人生為虛生而猶自鳴得意不知死則浪死而猶望好處託生蓋人以為浮浪而死消歸烏有故生前任意作孽不知其生也有因其死也有果既不能勤於修持參悟大道則還元無日何處出頭背覺合塵全歸情念蓋人有性情道分情想節情乃能復性純想乃能無情故禪家亦謂九情一想則墮落純想無情則大覺純想者念念不斷純真九情者節節全流愛欲故聖人說經指出種種景象種種境界種種法則無非欲人收此放心消磨情愛斯可守一而還貞留淸而去濁則生氣勃發生機活潑生命延而鬼路絶矣故曰但能存想又曰一念持經皆是欲人心上洗滌心君有道五官順令萬神調伏萬魔退散一身之萬神調伏萬魔退散則外來之神自然調伏外來之魔自然退散此亦明義理之自然以見經功之浩大山神衛護風浪頓止內則氣固血榮外則水陸胥安也惡賊退散𡨚枉解脫內則惡念消而鬱氣伸外則惡人退而直道行也母子平安福德男女職務遷轉子孫榮遇內則十月功圓脫胎神化無位真人天爵寵錫外則德門善人嗣續不絶也財寶充溢返降吉祥內則德可潤身道乃富有善氣迎人外則令聞廣譽災難不干也凡此皆由死致生生而順其生死而得其安者也惟經能濟之至於注名惡籍神生淨土同苦罪衆護度生天內則敗氣不存本命延長快樂無邊百體胥安外則煞鬼退避族類康榮同度善道也惟經能度之箋釋正陽帝君曰堪嗟世人不了生死形山不顧死而後已苦海無邊浮游還喜刀劔叢中快活過日枉道徇人也為色身羅剎鬼國出離無因生死不明卑賤為榮忘身事人願財豐盈雖足衣食慶退災臨惡星纏度惡籍書名同苦罪衆同墮幽陰三光不見直到於今甚至淪墮為獸為禽要想解脫再無信音大哉帝力妙哉神咒一念轉移回心向道持念真經脫離有靠或驅猛獸或除毒龍或伸𡨚抑或避羣凶或退衆邪求子保宗資財充溢貴遇人君死者欲度生者求榮皆如所願道協人情皆由經力諸難皆平千祥百福性命咸亨生死受賴恩自瑤京悲哉衆生速速轉移得此至寶出離有資殷勤遵奉黽勉修持如志如願不必驚疑經功浩大為我證見神咒流行上帝默鑒布告學人光陰有限觀音世尊曰一念吾名百難平况讀尊經念帝名咒顯大悲悲觀遠書留赤字字光盈箕風畢雨人殊好怕死貪生世共情到此方知神咒力教君如意自咸亨麻祖元君曰世人情念太繁多萬種千般是網羅一念精誠消衆念心魔退散遠邪魔總由上帝真經力何怕𨶒羅記姓訛有願皆償生共死不皈大道奈君何文昌帝君曰不知死也不知生生死為皆富貴營採寶求珍求顯達逢魔遇鬼遇災星償他萬種千般願方信赤文玉字靈案有尊經即樂土回光誦讀莫留停孚佑帝君曰無窮無盡願欲繁舉世因之障道門生死惟知貪富貴營求還欲庇兒孫皇天有靠終如願寶訣多靈不待言何似當初學大道玉虛門下不勞煩斗母天尊頌曰上帝威權栽培傾覆如願相償讀經去垢又此經所在之處常有十天至真大聖無極飛天神王侍衛供養持是經人當得自稱為正一真人是人在處自得十方至真至聖金剛力士潛護其人如護已身若出若入遊行之處百邪避路魔鬼殄除精靈伏藏一切災殃不能侵近是持經人命欲終時更不見諸地獄惡相即見天宫一切玉女持幢下迎而生天上如天福盡下降人間即得千生萬生中常為帝主令國土淸平人民樂業兼得為王獲宿命通遵奉大道展轉修持至登道岸是持經人獲福如是保登道岸章第三十一天師張真人曰茫茫大道並無津涯故佛曰性海曰香水海曰七寶池或曰海會一切功德法力皆以海名儒曰逝者如斯不舍晝夜盈科而進成章而達遊於聖人之門者難為言亦必觀於海也吾門淸淨不受一塵所謂混之不濁禾嵗丿之愈淸毁之不滅滅之愈明者非性海乎非香水海乎非七寶池乎一切經文即總池之海會矣然又何曰道岸蓋衆生淪於愛河墮於欲海實安身於此岸之中而不知有彼岸之樂上天不忍涕泗無從將欲拔諸污禾嵗丿寒冰之處而置諸高明淸淨之天故太上元始化現萬天以待學人化號萬方以教學人又以一理分為三教隨方化導因風氣以立科條因性情以廣接引是故中國為文明之地降生孔聖以廣詩書禮樂之傳以正倫理以立性命或為聖賢或為忠臣孝子浩氣充滿於宇宙之間正氣扶助乾坤之體安懷一世黼黻皇猷以開太平繼往開來永千聖之薪傳而宏仁於萬世如是以登道岸西方天竺禀天地之金氣為多其地尚音降生釋迦而以梵音立教所傳諸經諸咒神靈無比故曰威音又曰雷音又曰一音蓋耳根洞達徹乎三界本體分明感應自然言為心聲吐於廣長之舌六通洞達音韻為多由是參悟以登道岸吾門為大道之宗而尊經又為一切典籍之宗故赤文播為文教玉音即是梵音神咒統乎真言所以帝光無所不被寶蓋無所不覆佛門以華嚴為圓教儒門以羲易為通靈吾門則以皇經為圓滿本於大洞開乎道德黃庭千經萬典千法萬門而宏廣大度人之願如是以登道岸所以玉經尊貴無比供養之處千真侍衛受持之人惡魔遠避萬聖維持命終之時玉女下迎受生之劫尊貴無比國土淸平獲宿命通輾轉修持至登道岸則是經真苦海之慈航迷津之寶筏矣正一自稱豈虛言乎箋釋九天應元雷祖天尊曰天師奉敕降校尊經神來法席理契天庭周旋萬聖左右千靈共詮帝典言妙理精法傳當世義本始靑三才會集三教一家世人不信毁謗喧譁豈知世界皆帝光華國王帝主富貴無加學士大臣聲勢交加民生年歲帝澤休嘉莫非上帝主持幽遐所以世界安樂千春讀書士子須養性真不究根本不固真身泥於文字謗毁斯頻金章闡發大稱吾心吾為箋釋一字千金遵循福至毁謗罪深莫聞莫見動有雷霆各遵教法各固本根各養性情莫泥語言生順死安光大其門保爾後來道契玄元道岸必登位列十天見是經者修誦誠䖍雷祖保護在爾身邊一念歸正如在帝前一念邪妄歘火即傳性命難保何言升仙天尊指示記在心間諸真詮解不可妄刪言言口訣大道攸關應接不暇如在寶山空手而回道岸何攀吾言不謬信者勉焉玄天上帝蕩魔天尊曰欲往靈山拜世尊不知帝典鎮玄門包含三教無窮理總括千真萬聖言真言祕語咸持受度死安生再不淪北極玄天為保護巍巍道岸大真人正陽帝君曰上天一理分三教此語人間孰信之詮解真經明闡發精微妙道斷羣疑地天泰運從茲轉教化文明自此基道岸先登安國土明明上帝是嘉師文昌帝君曰吾為三教大宗師典籍經書盡總持賴有尊經為明證幸從詮解去人疑巍巍道岸誰先入處處天心爾自知正一真人非浪許天經聖典不差池孚佑帝君曰天經妙義誰能識解釋紛然孰信之豈料筆花飛爛熳皆從天性作根基人稱正一人人愛字刻瓊瑤字字宜吾願化身千萬億接登道岸總無疑斗母天尊頌曰法性無邊藏諸壬癸渡出迷津最尊最貴又若有持是經人若雨下時起大悲心如法向空念此經三卷一遍其雨所霑面所向方一切衆生五逆十惡一切重罪悉皆消滅一切重病便得痊愈是諸衆生命終之後不墮地獄神生淨土蓮花化生何况持是經者又若有持是經人若行於道路值大風起吹是持經之人觸身之塵是塵所霑一切衆生一切惡業悉皆滅盡更不墮三惡道當生天上故知持經功德不可思議是持經人若在江在河在海沐浴其身是水所霑其中衆生魚鱉黿鼉一切水族是諸罪衆悉得除滅盡此一報之身命過之後更不受胎卵濕化一切等身是持經人口出一切語言或善或惡一切天魔外道聞者皆是淸淨法音是持經人若遇諸神廟能為其神誦詠是經是諸鬼神得聞是經即脫鬼趣登真仙道恭敬是人如奉是帝有象圓滿章第三十二天師張真人曰此與下章皆是發明經功圓滿判此章為有象圓滿判下章為無象圓滿蓋因帝光圓滿則帝圓滿神咒圓滿則帝力圓滿故經在處則其功德自必圓滿而此圓滿之功德不能盡說下章所謂雖窮劫難言者也於是先即有象者以形之夫持經者得升道岸則其人之心即上帝之心其人之身即上帝之身其人之瞻顧動作與夫服用器具無往非上帝之運用矣是以到處皆神用處皆靈執持履涉之處皆霑勝利存思想望之時莫不圓滿先即有象者論之雨霖降處皆帝恩澤而持經者迎機運法自然潤澤下土生活焦枯則謂雨所到處即帝澤之所到帝澤所敷之處即持經人惠利所敷之處可也然則雨可盡乎經之功德可盡乎至於風動之塵細小輕微何關乎撮土又何論乎大地而即風動之輕塵莫非人間之福利則撮土於大地可知矣持經之功德可盡乎若夫水更普遍更非雨澤之涓滴輕塵之微細繁多無比彼夫天一之精能載坤輿萬彙滋生則皆帝之恩波也而持經者隨身挹注霑被無窮澤及水族則人可知矣夫雨也塵也江河海也猶有形之有定者也若言語則可聽而不可執且隨時隨地隨用而不可盡矣而恩澤又被及於無形之靈異經之功德可盡乎然則天下雖大盡乎有形者而皆利益可知地水火風皆上帝功德之具胎卵濕化皆由上帝功德化形何論乎人何論乎持經之真人以此形容功德之圓滿則真處處圓滿矣若從丹理布置則須彌甘露起死回生也戊己運於真氣生生不斷也天一華池真精布滿運動皆春即四生業盡也口訣祕傳逆順合度吐屬皆金即語言或善或惡六道輪回永脫也經義無窮正說喻說皆精閲者其深參之箋釋正陽帝君曰妙哉聖經最神最靈功德圓滿盡乎有形雨雨風風皆施福惠剎剎塵塵仁深品彙江河淮海拔出風波一切水族胥霑太和胎卵濕化可憐四生魔趣鬼趣六道咸亨一切惡業除籍勾名盡此一報返本還原當生天上或極樂國况持經人不能脫卻一切鬼神皈依大覺如奉是帝尚且誠恪况在其人一家眷屬比閭姻黨國邑衆族不能福惠豫以安樂令其皈依勿滋疑惑同修善道同讀靈書同近帝光同到帝都得是經者不可糊塗勤行修奉功德非虛有形有象普度非誣經功圓滿無量無邊我許是人巍巍上仙觀音世尊曰四生六道一光中直到而今度不窮帝敕靈書傳世界還原返本盡和融山河大地皆春雨言語得聞盡惠風總是持經功不盡得丹圓滿證圓通白祖仙師曰化雨和風處處施恩波流到楚王祠語言誦詠宣天敕人鬼神祇普帝慈盡此一身還苦報遂離惡業步天梯經功到處皆圓滿正一真人福惠齊文昌帝君曰明有人兮暗有神總多惡業染埃塵春風春雨生機轉魔苦魔身脫殼新全要天經為解釋乃能帝座勢嶙峋從今莫慢窮經士出語浴身係上真孚佑帝君曰誰稱正一大真人一部尊經玩味真出語浴身皆係道四生六道認為親有形有象全沾惠無量無邊廣播仁如此方能天意合功圓行滿不沾塵斗母天尊頌曰有形有象處處生機經功圓滿普錫銖衣若人在世不孝父母不敬三寶殺生偷盜邪淫妄語作種種極重罪業將命終時若有道心正信衆生於其亡者未氣斷時起大悲心於其頭邊念帝尊號或一七二七三七四七乃至百遍千遍是其亡者生前所造諸不善業悉得消滅更不墮諸惡趣神升九天何况受持是此經者又若復有人自從往劫乃至今身輪轉人天漂沉世域積千愆萬過在於已身若遇是持經人影暫映其身如為帝光之所攝受或與同語或聞其聲如奉帝言道語慰諭彼人罪障永得除滅又若持是經人造作長幡書帝名號於其幡上懸諸長竿或是觀宇或在家庭是幡被諸風吹所指方面一切衆生皆霑勝利一切惡業悉得除滅又若有持是經人書帝名號在一切有聲物上或鐘或磬鈴鐸鐃鈸一切道具法事之屬或以道場或以戲擊或被風觸是聲出時或遠或近一切衆生聞是聲己所有罪障悉得淸淨又若有持是經人了悟生死深入山林修真學道或時登臨上山顧望目所及處山林溪谷含生品類有形無形胎卵濕化動植飛潛種種諸類所有罪業永得除滅身心淸淨命終生天何况受持是此經者當知是人即是道藏功德身也無象圓滿章第三十三天師張真人曰此章發明無形無象者經之功德無不圓滿甚矣無形無象其誰見乎其誰聞乎其誰可得而言之乎又何以圓滿功德無怪讀道經者詆吾門為虛無之學將太上指示先天氣象杳杳冥冥之語亦為訾議嗚呼誤矣夫大道一元其體為先天其用為後天先天之境不容思慮自然而然只可默會而不可以言傳即儒經所謂隱也後天之用生發開舒化形造有錯雜紛紜呈露於宇宙之間即儒經所謂費也然後天不能離先天之體先天不能不發後天之用故洪濛未判之景象至今猶在即祖氣也即赤氣也夫既曰氣可得而見之乎即神也即機也其可得而言之乎然以不可言不可聞見之處而經功無不被及則玉皇之功德為何如圓滿乎持經之人至於無形無象之處亦運慈心而普惠利則持經者之功德其圓滿又何如乎於是舉心運想無非普上帝之恩光指顧周旋無非揚玉皇之道妙啓口皆運靈機持行無非妙義所謂信手拈來頭頭是道隨心動作處處生春游戲散爛熳之天花行坐擁高虛之寶蓋維持有力聲音笑貌盡含生轉移如神謦咳語言皆作福隨人豫返魂之神香隨地施延齡之妙藥金丹一點滿地皆金春光乍回盈園布錦斗柄移而璇璣自轉朝暾出而萬戶皆溫駕無象之慈航拯衆生出離欲海灑無聲之甘露蘇萬彙活彼枯株所以造罪無邊之衆生死期將至之惡業皆遇之而得生皆逢之而得果山林溪谷品類含生動植飛潛色身復性居然攝受以帝光而為帝言之所慰諭前章云正一真人非即此道藏功德身乎然而功德無盡效驗神奇厯劫難言正說不盡反從積惡衆生以形持經者之境界則其神驗當何如以是有象無象二意釋經功之圓滿則真隨取隨擕隨用隨靈既不遺於一息亦不懈於百年既不遺於一物亦不有間於天地則真無不圓滿之經功無不圓滿之神咒無不圓滿之帝光矣箋釋正陽帝君曰大道無形精微奧妙大德無窮淵默為要况此氣機更覺幽微捉執無物境界何歸不可目見不得耳聞其實運動春意氤氲無色無象無形無名來焉不覺去焉不明不識不知自然發生潛移默運品物咸亨妙哉經功如是如是持經之人同歸一致登臨顧望四境吉祥山林溪谷品彙含光建壇梵唄寶蓋長幡鐃鈸法具鐘磬笙簧但書名號高上玉皇聞者罪滅見者吉昌或與同語觸彼衣裳身形暫映流連倣徨如帝同語如近帝光如聞上界不斷天香經功圓滿福被無疆可知帝號如是輝煌可知帝典必須頌揚誦是經者德不荒唐無象圓滿有象愈彰功德至此惟滿惟圓不可思議帝澤無邊觀音世尊曰無形無象亦無名奧妙天經是梵聲受持圓滿功須證微妙機緘物亦生性是菩提潛運用氣因神咒更安寧游戲登臨皆佛事真空至理更神靈麻祖元君曰誰訾吾道是虛無無象居然太極圖不見不聞機自轉造形造色理偏殊語言動作皆天道游戲登臨奉帝書只要䖍心書帝號潛移不必費工夫文昌帝君曰性靈開處筆生花天道回時世界嘉只要一真通萬界自然海角會天涯天香密布無形影大慧發生那障遮可信先天圖奧妙帝經靈驗不爭差孚佑帝君曰詮解尊經景不同一番和氣一番風無形無象先天合成象成形妙道融彩筆贈君堪奪錦天香啓慧自生紅無邊迹象何曾著妙悟决然處處通斗母天尊頌曰先天大梵赫赫無象品物流行恩施浩蕩爾時天尊謂玉虛上帝言今我略說未盡其妙若廣說之凡流邪見疑惑不信是經功德窮劫難言爾時玉虛上帝聞是說已心生歡喜不勝踴躍瞻仰慈顏稽首讚歎而作頌曰九天之上謂之大羅玉京金闕雲層峩峩中有天帝仁慈惠和至道無敵降伏衆魔天寶靈符玉律金科神仙億萬幢幡衆多聞者罪滅永出愛河是號玉皇穹蒼真老妙圓淸淨智慧辨才至道至尊三界師混元祖無能勝主四生慈父高天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦爾時玉虛上帝說是頌及十號已是諸天衆異口同音歎未曽有帝號圓滿章第三十四天師張真人曰上帝之德無不圓滿則上帝之號自然無不圓滿何以至此處而始曰圓滿夫天尊明明說出今我略說未盡其妙若廣說之凡流邪見疑惑不信是經功德窮劫難言試思窮劫難言者非道乎我以為玉帝之功德亦是窮劫難言若廣說之人即見信亦自說不能盡不惟我一人說不能盡即千經萬典任其橫說直說正說喻說或多言說或少言說亦說不能盡也故天尊玄座說法可謂無不詳盡而猶以為我略說之夫天尊尚自以為我略說之則必無有能盡說之者矣然則玉帝之功德可易量乎不可量而必欲廣說之則雖獻一萬二千三十六偈讚不為多頌揚法號符乎一萬二千五百當朞之數符乎十兆九萬五千九百四十二之數猶以為少而僅獻以十號可乎不知此即略說之意也約略說之則稍舒敬獻之忱稍明臣子之意略序其萬分功德中之一分而巳我於是即玉虛上帝所獻之十號而略明之所謂穹蒼真老者至誠無息莫出其右其功德上繼乎老君而下開乎五老也妙圓淸淨者玄微通融無僞無雜其功德若天體之充周天光之明潔也智慧辨才者明無不照睿無不入宣萬變之理以開化萬方制萬幾之宜以臨御萬天也至道至尊者全備一元之理以歸於神化總握玄綱之運而極其崇高也三界師則千真萬聖皆受法混元祖則天地日月不能先無能勝主言攝伏乎萬魔修羅四生慈父擬惠育乎崑崙四部高天上聖則巍蕩之德同乎元始大慈仁者則好生之德洽於萬世具天地生成之數於無疆則曰十號圓滿說不能盡而總該之曰萬德周身則合聖賢仙佛之道而全盡無量度人拔生死苦乾元不息大生廣生即略說之而已廣大充周如是安能盡言斯真大無不包小無或遺遠無不到近無或忌者矣我故曰帝號之圓滿可以明帝德之圓滿箋釋正陽帝君曰大哉帝主妙哉帝經功德圓滿積於無形有形有象倍覺神靈無量無邊窮劫難言可知大道無有言說能說之者即非道德但在衆生成性存存經功到處遍滿乾坤人物各正滴滴歸元經功如此帝德玄焉所以感戴出於諸天普放神光救度周圓寶蓋會下被覆無偏神咒流行普示周全帝德無盡帝號無邊處處充滿處處周圓天經奧理參悟真焉拔生死苦度人無量約略說之已超無上可知道法惟在心悟心體淸明不失故步自無魔擾敦朴守素吾言不煩後人謹記白祖仙師曰從來帝力最通神成地開天事事真十號聲稱說不盡千靈敬仰頌皆誠任君廣說無窮劫由爾朝參億萬春說經教主猶略說存心默朝免傷神何祖元君曰饒君聰慧過顏閔不斷𡨚魔也徒然帝德在身千聖保天心莫亂萬般圓濟生度死無私意滿行圓功慶昊天從此靈臺須潔洗䖍恭侍演聽真詮文昌帝君曰學真志士莫輕言一念差失誤入門既奉天經為祕旨須除妄念滙心源千真傳法非容易十號周天也不繁可是一真無百僞穹蒼真老許歸元孚佑帝君曰萬般世事靠於天天道十分人要全天縱神明猶要學真身大道總無偏皇經祕義君參得外道邪魔那許纏不是千真同在坐空遭毒手又何言斗母天尊頌曰十號圓滿帝德無邊速修速證玉軸金編太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷中終太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷下天真護持品第四爾時昊天上帝聞說經法從座而起長跪帝前白言玉帝願為大衆及諸人天持是經人說利益事爾時玉皇尊帝興方便意開利益門宣玉匱科傳靈寶法告於昊天上帝言汝今諦聽當為汝說受持功德扶危拔苦利益存亡神妙之事衆真稽首俱發聲言弟子臣等今日幸聞湛然常住之法莫不上福三界諸天下消三途毒害惟願慈悲愍臣等故演斯妙義請常住法章第三十五天師張真人曰此為天真護持品首章前兩卷闡發玉皇上帝放千載常煥之天光發萬劫不散之妙香宣億年有韻之法音橫則結三百六十五度四分一之寶蓋以蔭覆十二萬九千餘年之天人而竪則傳萬劫以前萬劫以後大光明大圓滿之大神咒以為天地之玄根不朽仙聖之薪傳誠所謂混之不濁禾嵗丿之愈淸毁之不滅滅之極明者也不得湛然常住之法何以至此凡一時在天尊玄座聽法上帝光明座下稽首者若夜光玉女高虛淸明天主五老上帝玉虛上帝莫非寂淡逍遙以經億劫周遍十方不損一毫是皆得湛然常住之法者一時大衆雖聞天尊說持經功德之圓滿而猶欲上帝之俞允故昊天上帝當機啓請猶恐不知說經本意遺卻指歸衆真於是為大衆對越上帝而特申明之曰今日幸聞湛然常住之法欲大衆回光返照須從自已湛然之心源以歸湛然之性海而永住於淸淨泓之境則凡傳玉匱科得靈寶法者可忘卻自已之光明乎箋釋正陽帝君曰天尊憫世垂此宏文諸天大衆何幸得聞放光發慧帝乃分身妙音宣布寶蓋庇人圓滿神咒功德胥真是玉匱科是靈寶法湛然光明常住不滅尊經奧旨一言包括畫龍點睛一網千目既舉宏綱衆條皆悉道本玄微功必歸一亦不險怪亦不神奇心源瑩湛保守無虧玄根自固性體維持永劫不壞三途不迷不負天尊諄切提撕昊天上帝殷勤啓請金口宣揚乃得要領天尊上帝開利益門受持功德明示元元衆真稽首俱發聲言請演妙義普福無垠告播天下共樂長春惟斯功德何以為報惟有誠心遵奉聖教教導斯人皆歸道妙爾等衆生洗滌心思勤行修奉天真護持麻祖元君曰昊天稽首玉尊前利益門開福萬天不有光明圓湛體安能億萬百千年家常言語皆精藴永住蓬萊是正傳說到西天成佛事畫龍畫餅豈真傳白祖仙師曰今古何人得正傳從赤松遊億萬年玉匱金科靈寶法守先待後子孫賢門開利益誰人信帝普慈悲示爾玄說到西天吾不許自今再莫妄談禪文昌帝君曰理學通明古大儒何須佛地覔安居真空雖是先天體精實方得象罔珠靈鷲雷音多喻說金科玉匱範真吾玉皇寵錫天言祕希少慈悲報有餘孚佑帝君曰人間惟有道為尊這段佳文爾屢言誤入虛空羅剎國何能真實我家門金科靈寶傳真法玉匱天王總一元萬法千門歸一是從今方寸滙真源斗母天尊頌曰金科玉匱上帝心傳湛然常住普福無邊玉帝告曰若有衆生孝養父母恭敬三寶竭忠於君不殺不盜不淫不妒不嗔不恨不驕不詐奉戒持齊冥心大道生尊重心持誦是經我即敕下周流沙界遍傳十方無極世界我敕東方東華帝君靑騎神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕東南扶桑大帝與其部衆神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕南方朱陵大帝赤騎神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕西南太華元老與其部衆神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕西方皓靈皇老白騎神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕西北皇天上帝與其部衆神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕北方紫微帝君黑騎神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕東北沖虛天君與其部衆神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕中央天皇大帝崑崙蒼老黃騎神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕上方來和天君名山大洞神仙兵馬無鞅數衆悉令下降覆護受持是此經者我敕下方一切金仙四衆八部及諸眷屬悉令下降覆護受持是此經者我敕十方飛天神王飛天大神三官四聖二曜九星北斗南斗東西中斗二十八宿周天衆星金剛力士神王等衆各與部衆悉令下降覆護受持是此經者我敕降魔力士四天門王五嶽四瀆及餘諸山四海九江十二河源山林川澤一切主者令與眷屬覆護受持是此經者諸險惡處令得安穩我敕所在一切土地靈官并溝渠等一切諸大力鬼王皆令覆護受持是此經者令衆魔外道悉皆懾伏潛形遁跡高飛海外遠避他方如是山林社稷廊廟血食之屬一切鬼神當自消滅五方行病瘟疫鬼帥諸惡鬼神並風王水怪孽龍妖神土精木魅盡自消滅五虛六耗夢寐乖常野道咒詛蠱毒之類皆自消滅心欲願者一切如意皆得滿足覆護圓滿章第三十六天師張真人曰前章天尊所示種種經法廣大無比神驗無比至奇至妙要不過教大衆各各完全此一段湛然性體以永住真常永不墮於生死苦海中以致淪於異類即玉帝之玉匱科靈寶法也彼不知湛然常住之法者為之奈何如有一旦覺悟知色身無常而欲尋湛然真常之性體又或愛慕天尊所說經功圓滿之神驗於是信向是經擔當承受持守真修雖其人真心求道知必不為效驗然而天真之護持所必加也即由愛慕效驗而後持此經則天真之護持亦必如其願也夫上帝金口宣揚龍章敕命千靈默護萬聖保持利益無窮神妙無比若廣說之厯劫難盡今略就上帝金言而論之或問吾何以判此章為護持圓滿蓋大道本來圓滿故帝之光明圓滿帝之功德圓滿經之光明圓滿經之功德亦圓滿則受持此經者其功德亦無不圓滿可知於是乎護持之功德亦圓滿矣所以覆護盡十方之聖衆保持盡衆聖之眷屬可謂一氣感通所在如意且能魔鬼消滅心欲願者一切如意皆得滿足則覆護尚有遺漏而不圓滿者乎至若帝曰生尊重心持誦是經必曰孝順父母恭敬三寶竭忠於君以敦人倫又曰不殺不盜不淫不妒不嗔不恨不驕不詐以淨其身奉戒持齊冥心大道以淨其心似乎持經之人皆得遵守又何必分言之不知人持帝經則已能置其身於帝光赤氣赤文之中是元始祖氣帝宰無上之功德已合而為一已之性與命亦合而為一矣斯時也真氣歸體真理歸元則十方之真氣自蓬蓬勃勃而歸於我故五色交輝無非水火金木土之彩主與眷屬象五德真精華采之殊騎按五色顯五氣萬神之布悉皆下降真氣自天上而來退散諸魔則死氣從地祇而滅由是至寶歸爐朝元有日斯真傳玉匱科靈寶法者非實行忠孝淸淨諸條又何以至此乃知所謂經者即道也即靈丹也是經道理廣大任人深用淺用皆可故下章又就衆生根器而淺說之非我所謂覆護圓滿者乎箋釋伯陽魏真人曰靈寶玄科金笈玉匱祕於上淸掌於玉帝金口宣揚覆護衆生衆生有幸處處咸亨十方聖衆勇騎良兵眷屬不少來會玉京悉奉帝命覆護安寧蓋以是人受持帝經帝經功大最神最靈四方響應四維來庭天上地下一切咸聽不敢怠慢左右無傾惡魔永斷鬼籍無名從此保守可達三淸昊天上帝叩請維誠帝宣玉敕布散紛紜保護維持悉覆慶雲心欲願者咸許如心一切滿足不吝加臨可知是人功德最深我是漢代伯陽仙翁為釋帝經特下雲中言雖淺近心與帝同慈憫斯世勸諭由衷要愛性體太和冲融湛然淸淨無翳無蒙真常乃固稽首天宫持經證道福利無窮切莫自誤戕賊其躬吾言雖繁穆如淸風大衆遵守舉頭蒼穹明明照鑒必報爾躬千真護持太和冲融正陽帝君曰真氣真文天上來有人得此性真回十方神聖皆歸我八景冠裳盡結胎已注生門離死戶高超人類趂天懷玉皇敕命紛紛下許爾為鹽和鼎梅白祖仙師曰曽為天上狀元來且向人間往復回為奉帝書傳妙道保君赤氣結靈胎神仙兵馬無鞅衆外道邪魔敢入懷衣鉢親傳親覆護高高穩取上林梅文昌帝君曰上林梅子一枝紅得者終須入帝宫給爾七騶通御道看人一路笑春風干戈平靜烽烟息魔鬼潛藏覆護同總是帝經無盡德自然安穩太虛中孚佑帝君曰未曽箋釋笑嘻嘻祕語人間總不知校正尊經宣玉匱聯登雲路漸天逵十方兵馬神仙衆無數歸來覆護宜從此人間宏福澤邪魔懾伏露生機斗母天尊頌曰玄玄帝宰惠及十方赤氣降臨精邪滅亡是持經人或不依科教未能修齊未具淨戒以能信受尊重景慕是此經典并同修齊護淨戒者是人功德坦然無礙自在逍遙號人中聖德慧長新同諸真人功德無礙章第三十七天師張真人曰此章亦是覆護圓滿中事就此章言愈見覆護持經功德之圓滿夫入道者必依科教必修齊醮必具淨戒而今皆無之似無與乎道矣乃以信受尊重景慕是此經典并同修齊護淨戒者經之言毋乃任人之褻侮乎非也蓋人之入道而成聖者心也既能景慕是經則其心已具信根尊重是經則其心已具卓識特見而有超然無上之想信受是經則已承受實行是其人本體湛然真常可以永住以視夫徒依科教修齊以祈福持守規戒以安身者遠矣况得見是經實有大緣勤行修奉自登道岸所謂舍末而圖本棄流而尋源遺跡而求真者故與修齊護戒者同其功且在修齊護戒之人果能一誠無僞感格皇天純是淸淨乃為法器不然則無功有過尚懴罪之不暇又何功之有反不如專一信受敬慕是經者矣上帝恐人疑惑是經功德故再說此章為持經而不修具文者明告之曰是人功德坦然無礙可知受持是經之不拘何人也自在逍遙號人中聖可知覆護是經之同一格矣德慧長新同諸真人可知持經功德之同一圓滿也其曰并同修齊護淨戒者可知同一覆護并不禁人之修齊護淨戒矣總之天之為天因材而篤栽者培傾者覆果能信受是經則大道有根上帝自必培之原不拘乎具文也不然人中之聖不易稱同諸真人亦不易致而可輕以許人乎總之以是經為湛然常住之法以勤行修奉求為人中之聖同諸真人自不遺於天真覆護之圓滿者已是之謂功德無礙又前章八方及上方之說人無疑惑惟下方二字人猶不解蓋大道一元充滿天地天包地下地居其中則天體上下皆是一色日月星辰運行或上或下皆在空虛之處上方有神下方亦有神故佛典有從地湧出寶塔之事是之謂十方以此言覆護則真圓滿矣則真無礙矣箋釋玄天上帝曰經垂明訓聖有真傳真傳不朽明訓無邊何為明訓訓者皆明何為真傳傳者皆真真為心法真為祕訣祕訣授人比訓更切有心信受心志當决大哉妙經尊重無比得讀之者緣大無比受持之者功德無比誠格皇天覆護無比信受景慕是此真經心田淸淨性體熒熒湛然常住必到帝庭其功甚大坦然無礙其德已全逍遙自在號人中聖神化無倫三界十方同諸真人乃知修道不在修齊遵依科教必求本懷能具淨戒必結靈胎靈胎是道團結乃來道為何物即是赤氣赤氣赤文先天一致讀是經者心在帝前修是經者道全先天先天無礙功德圓滿圓滿功德巍巍無上上帝好生發大慈心興方便意處處遙臨說利益事為世功深凡爾衆生聽吾法言治世福神勸教宜遵誦是經者各求本根必來接引朝覲天門正陽帝君曰修道修心那在齊修齊那得結靈胎靈胎皆是先天物經旨全將赤氣該覆護無窮無所礙持行有德有仙來功圓行滿同成道個個堪擕到上臺麻祖元君曰修齊個個誦皇經那個知得義理精神咒赤文何所指神仙兵馬便欲臨心君有道方方應命體還丹處處熒玉皇玉旨須遵奉淸磬木魚自此停文昌帝君曰皇經不誦不為仙科教徒遵也枉然但使真心求赤氣何難帝敕下諸天勤行修奉人中聖真行滿圓地上仙自在逍遙無礙日方知覆護不虛傳孚佑帝君曰到底皇經讀不讀忽然撤去木魚聲總因俗見忘根本遂使真人變性情赤氣赤文皆是道玉淸玉帝本同行人中稱聖諸仙合自在逍遙達上淸斗母天尊頌曰天有大道人求玄根真參實證帝啓天門爾時昊天上帝聞是說已即於帝前乃為歌曰大哉至道無形無名渺渺億劫黃道開淸神淸朗耀九魂吐精玉虛澄輝太霞高明玉皇開化普度天人三元道養二象攝生朽樹故根已枯使榮蠢動蜎息長生化形懷胎含孕俱得生成亡者命過魂歸三淸魄受鍊度南宫飛升今日大吉皆得光明五帝鑒映普告萬靈天神地祇及與河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至真尊神無窮無極普監度生惡根斷絶玄都記名衆真班列咸聽帝言經是帝敕保誦持人至度道岸無使災侵我奉帝命一切咸聽頌揚帝敕章第三十八天師張真人曰昊天上帝玉帝分身主治天下名號同新體用交徹互顯其神樞機並運普度天人殷勤啓請利益無垠帝乃鑒誠宣敕金庭普告萬聖慰諭衆靈龍章寵錫鳳詔莫停布告天下與道同貞蓋此大道咸在衆生類有萬品一理而分奈何不悟不慕玉京墮落萬劫何日三淸仁哉福主昊天上帝為民迎祥天言宣示大哉王言如綍如綸天書帝謂恩溥乾坤帝敕在經覆護法門上天下地仙聖神明手捧瓊章下觀太平保誦持人億載咸亨衆生當知大道無名無迹無象得者長生蓋能持經以結金丹圓滿神咒赤氣歸垣天根永固會合三元真陰真陽至此同原天上地下黃道開淸神明煥發九氣吐精魄受鍊度魂更神靈死者忽生枯者忽榮乃知金丹大道留形形有光明揚於王庭十方五帝萬聖千靈山河大地朗朗熒熒普監度生萬氣歸身先天景象處處皆真別有天地上界仙人昊天上帝受帝心傳開化來學普賜真詮大道如是丹道更玄金丹即道本性周圓真功真候本命如天性命雙修道妙無邊切莫自誤謗議招愆切莫墮落苦海萬年頌揚帝敕接引羣仙是言不謬印證帝前以開來學信受無遷可知大道人人本有既已覺悟即當保守保守在身即是還丹丹即赤氣固結盤桓丹即真性全即復還丹即真命流氣保安丹即大道一陰一陽絪緼化醇萬物光昌交媾凝結億載吉祥道在尊經經即丹法廣大浩瀚正說喻說橫說竪說更覺溥博以事顯理理明事彰以言屬事奇事奇言以明大道包括乾坤以顯金丹句句口訣經籍奧妙至此路絶最上上乘無有言說吟咏此章層層明白敕命無虛率履無越天師保任必朝金闕箋釋正陽帝君曰大道無名品物滿乾坤之內金丹無象陰陽歸爐鼎之中七返九還不過復本來之面目千經萬典莫非是入聖之玄功慨自吾道不行妙法指為虛無之說天光欲轉尊經必須校正相同開龍藏之寶函求祕旨於洞玄金格闡金丹之祕旨降神咒於紫微上宫理有源流其淵源必歸諸帝載義分本末其根本咸宰之蒼穹昔焉授受無虛萬聖永薪傳於不絶今也差訛必正千真揚道化以俱通念啓教於昊天復傳於昊天上帝頌錫恩於高上必酬乎高上皇躬帝敕傳來莫匪是金丹之口訣帝歌宣處要皆望大道之專攻惟爾學人當知火候工夫不易從茲入室居然懷胎含孕相融蓋自赤文成輝憑黃道之開淸為主太霞朗映斯九魅之歸正皆紅二象三元攝歸靈府故根朽樹皆遇春風由是萬氣朝宗蠢動蜎息皆活三淸受度身形魅魄同豐由是大地山河神靈獻瑞玄都日月享受非空列衛千真幸天心之歸有道保安萬劫知帝敕之錫大功歌曰我奉帝命一切咸聽俱信王言之不謬解曰天師保任必朝金闕同明至理之由衷誦經者當知人身之難得入道者須憑祖氣以為宗切莫視為閒言自干罪戾何難超出三界實受褒崇麻祖元君曰帝敕傳來聽帝歌言言字字播天和先從黃道回真性必自南宫斷死魔二象三元通九氣故根朽樹沐恩波芳名記在玄都早大地神靈無奈何白祖仙師曰大地千真奉帝靈傳來敕命要咸聽從茲不違真人命自此常隨上帝經總為金丹融赤氣遂令身畔有雷霆歌傳帝子皆真訣讀者實修證紫庭文昌帝君曰讀得天皇一部經神通廣大役千靈三元二象皆歸我玄苑南宫早記名至此方知丹道妙自今九氣亦流精太霞朗映三淸境大地光明大地盈孚佑帝君曰詮經法席有神靈議論風生瑞氣盈讀得帝歌知帝敕開淸黃道即黃庭三才會集三元協二氣光明二象形朽樹故根皆可活九魅那得不揚精斗母天尊頌曰無窮道化光明睿藻祕訣真修千春不老爾時昊天上帝說是歌已告大衆言此玉皇妙法語諸聖祕密言路絶道斷微妙難思巍巍大範為神明之宗保鎮國土拔度生死爾時昊天上帝說是語時法筵淸衆咸仰道言溥得開悟開悟祕密章第三十九天師張真人曰前章玉皇以天真覆護無量地靈皆絶惡機明持經者之功德圓滿是湛然常住之妙法語諸聖之祕密言也蓋以事顯理即權徵實即效驗為工夫學者當即言以見道在諸聖則恐致輕褻之咎故惟祕密而傳幸得昊天上帝保鎮國土拔度生死之念切啓請上帝得聞如是之妙法語然而言辭廣大義理幽深聞者須驚參者難悟於是譜為歌音藉頌揚之微權以發幽玄之實際其實際已於上帝法語昊天頌揚中略為指示學者閲之自明今但即此章而論之當知玉帝與昊天一庭授受開悟無窮有韻淸詞寄託更遠上帝所傳者為妙法語非徒然鋪張神驗昊天所歌者為祕密言非徒然極力頌揚况復為之叮喧旦血諄復惟恐法筵淸衆之不悟也而明解之曰此玉皇妙法語也此諸聖祕密言也路絶道斷則在千經萬典中為最上乘無有能出其右者矣微妙難思則非閉戶參求盲悟即可入室不待真傳口訣即可登真者矣是誠巍巍大範雖有靈文不能出其軌則神明之宗雖有妙悟亦當奉為楷模以此理為之保鎮則一人有道而四海同風以此理為之拔度則遐齡頻增而苦海永離一時法筵淸衆不覺開明悟入方知諸聖所傳者此也玉帝所示者此也此即金丹大道也此即湛然常住之道也此即神咒種種圓滿之道也此即法會放光分身救度妙香薰染妙音宣示寶蓋覆庇之道也其實皆赤氣也是法筵淸衆之所咸有即四天下之人之所咸有也咸仰道言則溥得開悟矣夫世人之情厭故而喜新惡常而好奇喜聞祕密之言不欲聞真實之語若讀此經則以為常道可也即以為真實可也即以為神奇祕密之言亦可也含無盡之真機示生民以法眼雖有瓊編吾不敢請矣亦惟讚之曰路絶道斷微妙難思巍巍大範為神明之宗箋釋正陽帝君曰教啓玄元太上傳金丹之旨書藏金格紫微祕赤氣之篇良以天地玄根非赤氣不能建立鼎爐妙藥外赤文那得成仙可知赤氣即先天之祖氣金丹求祖氣於先天祖氣凝時大地山河盡赤先天返處一身形體皆乾初則取坎填離全由於留精保氣繼則法天象地當賴乎添汞抽鉛看月出庚方即是陽生之候喜日升東海運諸黃道之間戊已真精與丙丁同歸皇極木金不合驅龍虎並伏法筵由是正氣歸於五方萬神敬仰赤文命諸天上萬界皆圓十月功成詫丈夫之有孕九宫門啓驚雷鼓之忽宣由是死裏逃生嬰兒現相人焉入聖毛髮皆研變化如龍隨心應手虛空皆碎擁霧乘烟夀量綿延淸閒似鶴身軀廣大坐臥俱蓮天詔下臨上蓬萊東華考校玄功遠被登金闕上帝瓊編語皆祕密事更幽玄昔在帝前稽首之歌有據今臨法會開明之語當傳微妙難思允矣巍巍之大範道途卓絶誠哉上上之真詮神明之宗有在真常之道勉旃麻祖元君曰路絶道斷有真傳聞者俱登上上仙大範巍巍包萬象靈機祕祕透千天拔死度生安國土淸言咸仰悟幽玄自今證果何人力心印相傳上帝前白祖仙師曰玉帝金言祕祕宣昊天於是永真傳保安國土歸皇極開悟羣生坐法筵玉軸金編包括盡神明大範道途玄分明一部尊經裏口訣真機句句圓文昌帝君曰巍巍大範是玄宗玄理幽深總不同天地一元壺裏會陰陽萬象掌心融真經玉訣須祕授元始真機也暗通說到真修原不易真言開悟要真功孚佑帝君曰吾家處處播皇風大範巍巍此是宗微妙難思天道現真靈開悟道機融最上乘法超最上無窮義更妙無窮皈誠稽首黃金殿如是祕言處處通斗母天尊頌曰祕密真機難思難議開悟羣真皈依上帝於是天尊而說偈曰玉帝功德大玄理極幽深生於浩劫前運化於古今我今說妙經愍念諸有情此誠極妙法功德中功德名號最上乘無比為第一大光明王尊威德聖希有能破暴惡魔皆令心降伏能滅極重罪皆令得淸淨若人聞是經或聞是帝名稽首生恭敬一切罪消滅十惡四重罪五逆於父母信心一稱名隨聲盡消滅保護人天衆四相與五衰三塗極重苦人間見厄難凶年饑饉喪毒藥及厭魅刑獄與𡨚家軍陳鬬戰苦山林惡道中虎豹豺狼等江海毒龍類迅雷風雨雹水火及盜賊蠱毒所中心失志發狂亂蛇蝎毒惡蟲邪魔凶怪神伺求人便者由持是真經普皆自散滅惡病久沉綿夢寐亦不安非理欲殘命殄滅不為殃緣遇是經故安穩得自在所有希求願財寶及富貴以此經功德如意皆稱遂神威自在仙諸天十一曜三十二天主二十八宿星靈𡚱玉女等天神及地祗三界虛空神江海諸龍王水火及風神宫殿與宅舍山林樹木衆溝渠井泉神由持是經故一切皆擁護衣食常自然子孫居富貴出言人希聞所至皆恭敬若為求男女持誦此真經帝詔下天曹落籍天仙人謫降生其家為其作男女顯貴人崇重七祖盡升仙光大慶其門延及父母親吉祥常熾盛災障不能侵是故我今說大衆宜諦聽慈悲度一切皆令達上淸元始偈讚章第四十天師張真人曰天地即道體也而必本於先天之祖氣玉帝即道身也而必本於元始之玄德故元始之道非玉帝不能主宰流行而玉帝之道非元始無從禀承印證所以玉帝則天地之玄綱元始則天地之玄根此品於玉帝親示妙法之後昊天上帝為親傳妙法之嫡派法筵開悟之淸衆則為玉帝親傳妙法之流衍故於前章述昊天上帝歌音以明與玉帝印合之意故其證果必與帝號相協歌中所示之妙法與玉帝所示之妙法不異至此章又述元始之偈讚明玉帝之道不異於元始而元始之道盡傳於玉帝兩相印證同歸一道此義不待玉帝自明而元始早已為之闡發矣且為之極力歌詠而讚揚之矣爰讀其偈而深究之偈中之意分作兩層首四句讚揚是正說然言簡意該已覺至矣盡矣其曰玉帝功德大玄理極幽深則廣大玄妙幽微精深已盡其莫圉之體生浩劫前運化古今則又明其不可限之量是四言已足矣何能再加一辭故於下盡述其功德而反以衆生形之處處圓滿人人圓滿不覺天語之繁也蓋圓滿之道惟玉帝能行之亦惟元始能言之故特以偈讚印合且夫玄座說法玉帝侍側明明探本尋源而為之返本還元至是元始偈讚極力稱道明明大道交付同德同心試觀天尊口中自言我今說妙經愍念諸有情即玉帝無量度人之道也自明之曰極妙法最上乘無比第一功德中之功德不過是說大光明之帝尊威德希有無量度人之實事愈知上帝之功德不外元始之功德而元始之功德亦不外於上帝之功德至是乃知元始與上帝同一道元始與上帝合為一人矣至於偈中分能破暴惡魔以下為降伏如意滅罪如意功德保護人天衆以下為保護如意功德所有希求願以下為希求如意功德若為求男女以下為嗣續如意功德此皆救度圓滿實事即以丹家功候次序按之亦無不合今不盡述箋釋伯陽魏真人曰大哉元始大道之祖綱維浩劫流衍今古萬法千門以時而傳上天下地無不周圓蓋此道祖本於先天先天之先萬劫之前生而神靈功德玄玄惟是玄德再傳何人大哉玉帝功德更神主持運會救苦行仁功德無量世無知人亦自浩劫以至於今分身救度費盡苦心持經受福亦或稱名受誦帝號稽首皈誠凡一切願必遂其情罪惡雖大奉事心真普為消滅許其自新罪滅迎祥有苦即伸一切神靈救護無垠一切惡道猛虎毒龍水火賊盜迅雷疾風凡害身者悉安其躬一切珍寶降自天宫乃知吾門玄道不同破惡滅罪護善除凶萬方正氣攝引交融隨取隨擕如願不空胎孕含靈聖子賢孫謫仙下降光大其門鍾靈育秀道為根原大道既得自契乾元如是功德皆由上帝無量度人普天匝地蓋此玄德本於元始元始真傳惟帝而已尊經無上功德幽深元始偈讚以心印心一心一德妙義難尋後有學人誰是知音正陽帝君曰玄理幽深境不同萬天總在一天中任君存下般般願有帝即能處處通浩劫前生經萬劫皇風一到盡春風天尊心印天皇得說偈雖多讚豈窮白祖仙師曰大哉生於浩劫前度人無量亦無邊幽深玄遠皇天道廣大慈悲元始傳誦號稱名皆利益讚功說偈總真玄上淸已達真機合又向人間說妙篇文昌帝君曰元始真傳玉帝宫幽深玄遠道無窮一經稽首生恭敬萬種心思再不空浩劫以來施妙德大千沙界播皇風至今參得尊經妙自有雲梯到碧穹孚佑帝君曰元始天尊坐玉淸真傳祕訣總瑤京任他浩浩無窮劫說出般般有道行除惡消愆兼祈嗣誦經禮懴更稱名不差毫黍償心願處處原來賀太平斗母天尊頌曰玉皇偈讚大洞雲章功德無量浩劫嘉祥於是天尊普告四衆凡人持念此經受持帝名皆道根深重宿有善緣此經尊妙普度天人但精心恭奉家國安寧保命度災掃諸不祥天子王侯得奉之者致國太平凶寇自夷邊域不爭兆民歌唱普天興隆運推數周正道當行有得之者天真妙重祕之祕之正道普度章第四十一天師張真人曰元始以己心印合上帝故說前章廣大功德玄理幽深運化古今俱有實事此章又以己心印合大衆其意若曰上帝之度人無量莫過於此經則吾之普度天人亦不能外於此經矣故雖貴如天子王侯賤如天下兆民皆不能外此經以為開度之道爰為四衆印證之曰精心恭奉則吾必保其家國安寧保命度災掃除不祥若在天子王侯則吾保其致國太平禍亂永免人民樂業天降休祥且是經在處即天尊所在之處亦即上帝所在之處彼夫帝光普放天香流布千真拱衛萬氣歸元太和立應將見俄頃之間轉殺機為生機轉死氣為生氣自能變惡人為善人轉凡為愚仙聖矧上帝分身之所親臨即大道元機之所降真故明之曰運推數周正道當行則凡為國廣祝釐之願為身卜安寧之休者不能外是經矣蓋家國天下同在大道之中原不出於上帝光明之外根緣淺薄總由惡業障礙不覩帝經不聞帝號何望乎種種休祥然則得覩帝經得聞帝號其道根深重宿有善緣可知彼其陰陽太和氣機自順沴氣自消惡鬼不逢在一國則天地肅淸民物安泰國祚綿延正道當行於天下在一人則血氣融和百體泰寧萬神保護正道當行於一家此固天尊探本窮源之指示路絶道斷之真言吾正道普度之解誠哉不誣箋釋正陽帝君曰上帝度人法號天經齊降天尊憫世赤文神咒昭垂歌詠稱揚皆是明天皇之至德保持覆護莫非廣大道之敷施念自天地既分帝王首出全憑陰陽迭運兆庶咸熙然必遠播皇風自回心於凶寇果能永光帝德斯寧靖乎外夷總由皇極建中不悖一元之太極於是時幾共凛不差日理之萬幾上帝光明鑒一人之有道皇天感應回普世之生機莫謂舜日堯天難再見中天之景運試看和風甘雨分明樂稔歲之佳時蓋天真盡妙重乎是典斯人世必信重乎誥詞宿有善緣知者當早為修奉欲歸道化聞者須不懈矜持正道當行元始天尊所言有準天人普度王侯兆姓自己深推果信此煌煌天經則宇宙回太和之運奠安上下默朝乎赫赫帝座則身心致百福之來感應神奇白祖仙師曰元始天尊也太慈叮喧旦血普告繼淸詞已稱帝德重重顯又降恩光處處施保國寧家天下治王臣帝主兆民宜總因勤奉尊經力入道升仙自可期何祖元君曰這段機關總不知天經轉處事攸宜陰陽協極和風應道德歸身兆姓熙轉殺為生真火候避刑從德慧心思靈丹一顆朝天子天上光明我不虧文昌帝君曰四大部洲皆祖氣慈光降處共長春一人有道家家活真主回天個個親喜見歌謠民擊壤還因崇奉帝威神太和一播陰陽協正道當興體驗真孚佑帝君曰天尊有敕下人間凶寇外夷一概刪從此中州稱樂土自然四境同靈山天機一轉歸爐鼎正道當興顯洞陽喜見天人皆普度天京朝帝詠瓊章斗母天尊頌曰天放光明蔭庇帝京生機轉動正道當行洞玄靈寶報應神驗品第五爾時慈悲度厄真人尋聲救苦真人濟生度死真人萬福護身真人俱從座起越班而出俱白天尊言若諸世末凡夫雖宿有善緣得遇是經被諸邪障之汙本末疑惑不信是經功德如是之人見在過去於諸地獄得何罪報惟願聖慈說其報應惡趣之苦罪報因緣章第四十二天師張真人曰此章序四真人當機啓請以明如是經法莫非慈悲度厄莫非尋聲救苦莫非濟生度死莫非萬福護身夫機以理應事因人顯明指出一經大意讀是經者當知天尊玄座說法以至正道普度章玉帝放光分身以至覆護圓滿章種種奧義詳示法門莫非為是人慈悲以度厄救苦而尋聲莫非為是人濟生而度死萬福以護身二聖人為人如是之切救人如是之盡此亦如天地之生人既與以命必與以性既廣其生必贍其生且既命天子為之主致治平亂保護而安全焉又必命聖人立之教詩書倫理戒董而誘掖焉在上古則穴居野處使知上棟下宇飲血茹毛使知耕種粒食至於今則婚姻死喪無不遂也衣冠禮樂無不華也干戈貨財無不足也無一非聖人引導之天地之生人可謂費盡苦心矣而二聖人之慈憫如是又如父母生子自胎孕以至生育自幼小以至成人由弱而之强由愚而之智由貧賤而之富貴其間保護愛惜更非一端而二聖人之用心亦如是試思發慈悲以度厄不難尋聲而立至其生也則濟之其死也則度之無非欲其萬德周身自為保護此說法度人分身衍道之苦心也况經中所說無所不通在上根法器者讀之必於言下了悟全此大道在中等人讀之自能因事明理因言解義而漸幾乎上達即下等人讀之亦能懴悔積孽消滅重罪求福如願種下善根以為超度輪回之本隨人隨心無不如願隨時隨地無不通天蓋以其人得乎大道之原也禪家以華嚴為圓教謂其塵塵剎剎莫非法性形形色色皆歸性海吾則以此經為吾門之圓教盡天下之人盡天下之理有能出其範圍者乎然非果報分明則空虛之理人或疑而不信信而不堅四真人慈深願重名與德顯為衆生啓問果報又觸動天尊慈憫不覺又大為開示於是乃有下文諸章箋釋正陽帝君曰三教同源儒者不言果報玄門示法凡為皆有因緣蓋善有善因惡有惡因修因時必當愼重而善得善報惡得惡報受報者自己牽連草木當春其根荄必生枝長葉風雷應候其聲勢自動地驚天既然種下芳田自收成之有望未曽金埋密處雖鋤掘之徒然總之一飲一啄莫非前定或生或死徒自焦煎夫天降真經原為慈悲而度厄乃人難信法反為褻慢以招愆於是上界真人憫下方而啓請天宫福主開人世以真傳地獄幽深慢經者於諸地獄得何罪報天宫高遠退道者在彼天宫豈無罪愆須信天網恢恢疏而不漏當知天威赫赫苦不能捐然罪報雖由於自取而消釋實賴乎上天所以聖澤無窮重演玉皇之本行天心有在只遵金格之靈編靈寶洞玄文存報應本末疑惑報必迍邅五品昭然仙子則當機而問法一經大旨世人須信受以求全麻祖元君曰禍福休祥降在天也從人世自牽連真經不信難辭苦春繭作絲自己纏幸有真人求妙典還從人世說因緣濟生度厄尋聲至求福莫輕妙有篇何祖元君曰禍福因由更問誰行藏檢點自家知真經妙典還難信萬劫千生少出期報應品中明報應仁慈世上普仁慈天尊玉律真人啓神驗無虛要信之文昌帝君曰休祥禍福皆天定惹罪招愆在自家上帝尊經還不信陰司苦海自無涯尋聲救度真人福慢道顚連一念邪至此方知天上澤真文捧讀少虛花孚佑帝君曰君說人間何事好算來惟有玉皇經一疑退去千般福有慢必登十殿庭地獄幽陰無赤日天堂高遠有雷霆真人救苦求真法從此勤修自有靈斗母天尊頌曰赤氣赤文解脫幽陰真人度厄萬福來尋是時天尊謂四真人云若諸世間剛强暴惡不善衆生終日竟夜對諸道像無恭敬心出誹謗語是罪當墮五無間獄若得值遇是持經人設諸方便誘引勸諭如是之人暫滅惡心信向是經彼人罪業淨盡無餘又若有邪見愚執惡人覩持是經生諸惡逆偏眼邪視乃至起一惡心發一惡言謗讟如是持經之人其罪過是命終之後墮大地獄永無出期何况世間衆生得遇是經不生敬仰禾嵗丿手污觸葷口讀誦牀榻不淨便將安置或讀是經講習俗語共同戲笑以為常典如是之人命過之後墮無間獄永無出期殃緣九祖受考酆都纍及後世害纏子孫是人於地獄中厯無量劫受大苦惱遇無邊聖纍承救拔罪惡小減又遇聖人救拔得出生餓鬼中厯千萬劫不聞漿水之名鬼報得出生畜生中畜生報出若生人中更生邊夷外域而復女身貧窮困苦癃殘百病受無量苦人所棄擲求生不得求死不得輕斯經故獲罪如是毁謗致罪章第四十三天師張真人曰經即道也道在經也謗經者慢道毁經者失道是輕一己之道而不知已輕天尊上帝之道矣夫天尊道之祖也上帝道之主也二者均有慢焉其自外於道為何如夫天尊上帝方千方百計萬法千門引誘是人入於是道之中而人乃終日竟夜積惡造罪自越於是道之外悲哉不知修因者結果修善因則成善果修惡因則成惡果有果則有報矣蓋天地之大不過一陰一陽迭運而不息而陰又必隨乎陽故大道以陽為主而以陰載之至於陰陽偏勝則發為沴氣苟非有道主於其間則乾坤或幾乎息矣其在陽之性則發舒而淸明陰之性則斂抑而濁暗在人之造罪雖有陰惡陽惡之不同而皆屬乎陰陰濁之氣一行則地獄之相自己結成陰暗之氣自己凝聚陰冷之地自己驅入此十二大地獄五無間獄之所以日陷日深並非冥司之所設也是故謗毁經書輕慢道德雖有剛惡柔惡之分種種不同皆所以自滅陽光自撥根本至於淸明之氣淸夜無存則濁暗之陰成矣所以毁謗之罪自己作成則地獄之苦自己承擔雖然人苟不淪於禽獸則尚可轉移故人雖惡貫滿盈而天尊上帝又望其懴悔向善漸引入於是道之內所以稱誦帝號崇奉是經皆有莫大利益乃不能感悟而反為之毁謗且不一其人不一而足焉奈何今姑就經文而繹之終日竟夜對諸道像蓋指有象之道像其實即無象之法像也試思大道充塞天地間不以天上而必有不以人間而或無不以大廷廣衆而必有亦不以暗室衾影而或無舉目即在明現當前彼終日竟夜與之相對而乃終日竟夜侮慢百端任其造惡非種無間地獄之因者乎至於信向是經而罪業滅盡者道心一現而萬惡盡滌也得見是經而謗讟致罪者惡業既深則一隙之光明不能勝也况乎肆無忌憚不生敬仰則心不淸淨禾嵗丿手汙觸則體不淸淨葷口讀誦則舌根不淸淨牀榻不淨便將安置則居處不淸淨講習俗語共同戲笑以為常典則口三業一時俱犯矣即一經而十惡業成焉其罪可懴改乎殃緣九祖受考酆都纍及後世害纏子孫俱是慢經實報若以理論之則上不能返還乎祖氣而下必受纍於千生由是三惡道成則世間一切苦境皆以一身親厯之冥司無量果報皆以是人親受之轉移不能則曰求生不得回避不能則曰求死不得苦哉何讐於自己之妙道而不信是真經也哉箋釋玄天上帝曰天有慈悲救衆生不遭惡劫人無志氣對上帝且少欽思一部尊經視為常典千般惡事造就陰司夫目擊則道存原不離乎語言文字况言輕則事悖何論乎真實修為朝於斯夕於斯全是毁經謗道口不淨心不淨莫非慢法淩師既天真之盡失斯地獄之攸宜地獄十二重又有三十六重苦深無間天經共五品分為五十二節讀要精思受苦無窮受纍無窮尚有何人替得報善如是報惡如是全在自己裁之莫言遼遠天宫原與人間隔越須信神靈玉律全為經語維持天尊慈憫人間羅列品品大衆愛憐自己日夜孳孳不悖天經自必天垂默鑒果參大道必須大錫恩施嗟爾衆生何人見信靈哉帝主雷令饒誰欣妙典之將成執事者可稱勤苦看天經之永布勤持者必為提擕有始有終上天灼見愼言愼行大衆莫疑九天應元雷祖天尊曰可憐大衆不回心徒費天尊惠澤深造就千般無盡業自然一命墮寒陰輕經謗道全忘己褻地讟天苦盡侵求生不得難求死何用雷尊處處尋正陽帝君曰地獄天門上下開升天入地任人裁勤行修奉功無盡謗毁輕淩禍必來羅網重重難解脫傷殘種種但悲哀何為自外真經法一墮三途永不回文昌帝君曰天經本為救斯民何為輕言謗毁頻一語違心千歲苦百般毀道萬年因層層地獄層層陷劫劫三途劫劫身幸有天尊明指點勤修那得畏艱辛孚佑帝君曰大道分明在眼前舉頭即已見靑天大含細入方方顯口慢心非事事全造就幽陰諸地獄多因褻慢是瓊編三途並少出頭日千生苦楚自交煎斗母天尊頌曰言行俱非造就鐵圍皈依三寶跨鶴而飛又若復有人初雖信受後復慢易善惡童子上奏三官黑簿添名靑編減算身殁之後拘閉幽牢往復三途無由解脫或於見世受種種病疥癩癰疽以為果報憂悲苦惱日夜相煎而身或被橫逆所加或牢獄繫鎖非分自害誤食毒藥或被虎狼毒蛇之所食噉或為𡨚家之所讎對或行山林值遇惡人被他屠割推落崖岸或被邪精魍魎之所殘害或值水火之所焚漂或被刀兵之所橫誅輕斯經故橫喪天年獲如是果獲如是報可不悲歟可不痛歟故報汝等依此奉行勿生邪念若諸念不生萬緣頓息塵沙惡業隨心消散一切災魔自然殄滅此之功德不可思議是誠無比最上妙法諸經之王有大利益非人勿示堅固信心章第四十四天師張真人曰人自道中來斷未有不愛慕是道者故極惡之人亦有善心儒經云苟志於仁矣無惡也非言道心一現則塵沙惡業隨即消散乎又曰仁遠乎哉我欲仁斯仁至矣非言道心在內回光返照道體即顯露乎又曰萬物皆備於我矣非言上蟠下際充滿宇宙萬有萬形之道皆全具於我心乎以此知千經萬典之義理千聖百王之心法莫非我一人分內事世界之大人物之衆皆與我一體故古人云六經皆我住腳梵典亦如是也即我玄典亦如是也然心雖有道道本無為必待人之力量以運之道有體用本體雖淸明而流行之用必堅固不失初由一念之淸明必堅固其力使之念念淸明初則信心之甚篤必堅固其力使之永久其信至於全體皆道真信無息造到無思無慮無作無為之天即是先天之境於此乃得祖氣之因赤文之實不然一念之淸明不勝其萬念之黑暗暫時之信受不勝其無盡之戕賊及乎人罹惡報乃曰為善無益持經無用罪上加罪何日解免悔不常悔何時出離經云初雖信受後復慢易善惡童子上奏三官以受種種苦報明乎信心不堅固之罪也諸念不生萬緣頓息則非慢易者比矣塵沙惡業隨心消散一切災魔自然殄滅明乎堅固信心者之大功德也此皆是實事實報未嘗或誣再就經文而思之退悔道心者死後沉淪地獄决然之事若於眼前道心既退則其身中口中心中無往非造惡之所眼耳鼻舌身意何能有淸淨之根以惡召禍以禍償惡故身業則致害於身口業則致害於口心業則致害於心况六根不淨則萬惡咸聚萬苦交煎即三惡道之根本也則畔經者見世受報何待後來故尊是經為諸經之王有大利益則種種不可思議功德而求無比最上妙法者不能外是經矣非人勿示其即謂此信心之不堅固者乎箋釋玄天上帝曰咄哉衆生敢大膽輕經慢典惟茲冥府為上天收獄加刑夫上帝恩深乃垂此煌煌之上法天尊慈憫全賴茲赫赫之天經不惟成聖成賢接引人超升天界亦以消災解厄庶免爾逢遇雷霆萬劫幽陰一念之淸明頓解千層苦海道心之退悔彌深良由自撥本根則花葉枝柯何靠枉拋珠玉則艱難困苦相尋不修三業不淨六根處處皆蠶叢鳥道難見三光難容兩大層層皆血浪寒冰或為水火漂焚總是逆陰陽之運或為虎狼噉食全因害億兆為能納人於罟擭陷阱之中報在推落崖岸奸心設魑魅魍魎之計償以吞咽銅針讐對𡨚家疾善如讐之報癰疽疥癩當天呌苦無音說不盡種種因緣皆由退道任憑爾時時疼痛難轉吾心蓋地獄冥冥或難見信須當前之共警天威赫赫法在必懲看雷令之親臨正陽帝君曰衆生困在三惡道輕經慢法是其因層層地獄俱親厯種種𡨚家報爾身百苦交煎何日解萬年墮落少人尋諸經之王功德大解免皈誠莫悔心麻祖元君曰太陽一現萬方明一點真心萬罪淸何故違心頻變計居然退道失真情三官黑簿須添計東極靑編早落名自此人間千萬苦交攻總為把經輕文昌帝君曰五刑之屬有三千玉律金科更可憐一墮幽陰須萬劫難逢日月有千年人無可取違真道罪莫大於讟上天桎梏堅牢羅網密自家退悔自家纏孚佑帝君曰萬典千經為救人尊經一部更為神奈何退悔淸明意遂使幽牢纏害身解脫雖然難藉口轉移還要自修因從茲穩坐靈山塔消盡𡨚魔拜帝真斗母天尊頌曰覓得衣珠什襲深藏塵緣淨處萬載輝光若諸天人五衰四相輪回侵逼能捨除妄想受持是經坐招自然天福益固身度三界與道常存是此經典無與等無能勝是大威德大神咒能令一切枯槁便生枝葉花果茂盛能除衆生極重苦惱能令短命衆生而得長夀此經功德不可思議歎莫能盡若不宿植道種廣種福業乃至名字亦不得聞何况得見是經依三洞真格八萬劫一傳此淸都至真上聖所寶祕於玉京金闕宸宫甚為微妙難可得遇此經宿有仙骨當為九天真仙之人得遇斯文承斯緣故後當齎金寶從師告盟受之方當承機應運乃可付焉不得輕泄敬之愼之傳授不易章第四十五天師張真人曰經法之顯晦關乎道運之通塞夫道自流行於宇宙之間何以云有通有塞則氣運為之也蓋道本先天無極無為因氣機之動以為動因氣機之靜以為靜故氣運當其通則斯道因之而明氣運當其塞則斯道因之而晦此一定之理也故天地因道建立萬物乘運發育而仙聖神靈亦乘機應運以揚道化儒釋二教經書因方化導隨人授受不有隱祕處處流通惟吾玄門斡運陰陽主張造化以保天地之玄根而維持無盡之劫運故金書玉篆祕於玄都不得輕泄考大度人之真文則六萬劫一傳此經則八萬劫一傳八萬劫者蓋謂玉帝自浩劫以來修行證果經八萬劫自子字起每三字為一劫此可易量乎天地一開則此文一傳此文傳於下世斯人方得乘機應運藉此證真故道藏有準度二十四萬人之語過此數之後已當未字末會則氣機將塞道運將晦矣彼時氣機不全道將隱晦仙聖神靈至此不能度人即修之者亦不能上升矣茲幸猶當盛世道運亨通但能回心向道愛此時光速參性命早求解脫以充彼二十四萬人之數中自與大道同符在當初墮下一點靈光至此復還統體太極之內而全先天之祖氣永免墮落於幽陰矣然而石火電光之中誰是能保此淸明者欲海愛河之中誰是能回頭到岸者夫大道本欲遍傳而人之根器有殊大衆皆可升度而人之緣分各別道不可輕泄而又不可私匿故仙之求人更甚於人之求仙果有仙骨當為九天真仙之人自然得遇是真文而修奉之則心在道中身全萬德其緣大矣自有真師當機一撥口訣親付盟誓而修入室用功密密結搆故曰乘機應運乃可付焉此章從化度天人說起以明天人尚欲藉此經以求超脫輪回况世人乎於是再為稱歎是經不易聞見不易傳授以引誘乎學人箋釋正陽帝君曰大道流行斯天地有開通之候真機運轉斯乾坤有合撰之符念自太極未分則陰陽五行渾淪無迹一自後天啓運則日月萬象燦爛非虛其實先天隱於後天之中莫謂洪濛太遠所以無極存乎太極之內須知義理無殊教啓玄宗有性命雙修之訣經傳本行存神靈赤氣之書是有玄根兩儀之迭運因之不息總歸帝德金丹之要旨於焉不誣大放光明知機者即承光於玉鼎天傳神咒知時者即寫咒於金爐歸真氣於十方天真護道說妙經於五品道妙非虛元始讚揚八萬劫一傳之典當重羣真傳授三千界獨出之人當扶齎金寶以從師自己家珍非是真師愛寶符靈圖而應運低言口授全因氣運開圖密密鍊密密修不得輕泄層層功層層候全恃天樞不可思議之功不可思議之德歎莫能盡若非宿有仙分若非宿有仙骨亶其然乎故得人而傳依三洞之真格蓋上聖所寶祕九天之玄都試看天人四相五衰不畏輪回侵逼雖然塵俗五行三界居然解脫安居莫愁傳授為難惟宿植乎道種自可慈悲普及看穩坐乎鸞輿白祖仙師曰玉帝生於浩劫前今修八萬有餘年尊經至此方行世得者斯能證九天金寶從師承口授告盟度世契真玄真師規格依三洞不是仙胎不妄傳何祖元君曰天人何故轉輪回未鍊金丹墮下來三卷尊經能受誦大羅天境可延捱勸君早具仙人骨與我同看劫仭臺八萬劫傳須愼重赤文速速結靈胎文昌帝君曰誰是九天仙子骨從師傳得玉皇經曽經八萬春秋永早度天人歲月新金寶齎來爐鼎物告盟發願性情真從茲不畏輪回逼丹果瓊花喜遇春孚佑帝君曰一臨壇席笑嘻嘻此意人間總不知大道有傳傳不朽求真如子子偏奇告盟何用齎金寶附耳偏然有帝師三界輪回堪解脫瓊花先奪上林枝斗母天尊頌曰八萬餘劫赤文一出告盟親傳宿有仙骨於是天尊重宣此義為說偈曰設使江河水波浪能生蓮慈烏毛能白如經故難遇設使龜生毛堪採為衣服夜月能消冰如經故難遇設使蚊蠓足堪搆為舟橋能載一切重如經故難遇設使黃口雀能銜諸太山擲之他方界如經故難遇設使一葉舟力能載崑崙浮渡於大海如經故難遇設使諸水蛭口能生巨齒其大如象牙如經故難遇設使蓬蒿葉能覆無鞅界蔭庇無鞅衆如經故難遇設使烏梟類同樹一巢棲銜食共相飼如經故難遇設使兔生角堪用為梯磴上窮有頂天如經故難遇設使鼷鼠等緣於兔角梯至天能食月如經故難遇設使驢顏脣色如蘋婆果復能作歌舞如經故難遇設使蠅蟲等能飲鍾石酒迷荒而沉醉如經故難遇玄機無礙章第四十六天師張真人曰惟宇宙之無窮莫非一元道化歎機緘之既轉斯成有象真形神矣天經形形色色包含無盡奇哉帝力剎剎塵塵充塞莫圉試看天地之間何所不有須信神奇之事原匪無徵夫至味無味至文無文故先天歸於平淡乃不靈而靈不幻而幻這玄機更覺分明要皆一道之所為乃百出而不竭蓋此妙道原巳塞滿天地知無一物不在大道之中惟茲玄理既能生成民物自爾萬變皆有玄機之運活潑潑觸動處即是真靈看種種發現時皆成妙道所以大可為小小可為大有者能無無者能有造形隨心蠢者能靈靈者更靈弱者能强强者更强生成如意於是鳥獸草木各成其性而可互相為用山林河海各效其靈而更交呈其變以此為圓則真無缺陷之處以此為滿則真無間隙之時說不盡般般靈異讚不完種種神奇隨手拈來皆關妙緒舉目望處盡是靈機允矣頭頭是道誠哉面面靈通玄莫玄於此矣功更何有礙焉真是泥丸土塊皆放光明馬勃牛溲盡成丹藥故根朽樹可以結果而開花頑石層崖可以點頭而飲羽怪事紛然更幻於齊諧之記矣然讀此偈者當知道之靈妙變幻無窮取擕不竭而在上帝則造化在手運用皆神即以此種種奇事形容大道之靈機即以此種種之靈機形容真經之難遇體用互顯事理皆神誠能遍觀而有悟焉則知此經之玄機無礙即知大道之玄機無礙矣偈中比喻玄妙今不能遍釋之請諸真分解之以示學人是望箋釋正陽帝君曰鯨波湧十丈之紅蓮根株更穩古木棲聯巢之烏雀潔白生輝卜則灼龜長羽翰而六銖可服人欣望月掃霜雪而一陽來歸莫笑蚊蠓足可任人來往不輕黃雀山須任彼推移崑崙為萬嶺之宗在泥洹直如一葉象王為百獸之長其牙齒不如蝤蠐人𠷣飛蓬不賓放神通則須彌可覆最恨黠梟食母感孝鳥則反哺同飛奇矣瓊蟾不踏雲梯而朝玉闕怪哉鼷鼠竟隨兔角而拜嫦娥有子題驢能變色而共相歡笑看蠅入甕竟沉酣而不望提擕凡此皆人間之奇事而亦動古聖之品題以之形道則不測之機緘互顯形形色色以之讚經則無雙之靈妙居然怪怪奇奇乃知天地之間無所不有惟在聰明之子自為參稽麻祖元君曰江河波浪能生蓮穩坐如來更自然反哺憂親毛變白演疇致主服當玄淩陰深錮日長至蚊蚋頻驅夜泛船天機祕祕誰人識山禽黃口莫輕傳白祖仙師曰太山一夜載虛舟逆溯崑崙上上頭為探河源防蛭齒還從象罔看靈榴無鞅世界蓬蒿葉莫大須彌燕子樓鳥鼠同穴山下過天機參悟正夷猶文昌帝君曰玉蟾引爾去朝天鼷鼠相爭亦枉然月到滿時餐桂子梅當尋處著驢鞭蘋婆難比瓊林杏歌舞還圍御苑仙洗髓伐毛非一日天機到處自生妍孚佑帝君曰三醉嶽陽人不識洞庭回首望紅蓮龜毛兔角皆虛語黃雀蚊蠓不許喧承載崑崙力比象包含大海量同天莫管烏梟食蓬葉給騶賜果拜君前斗母天尊頌曰道化敷揚處處生光惟靈惟妙無上瓊章爾時天尊宣說偈已普告四衆是故持是經人名功德身一切有情被其蔭故持是經人名神通身一切吉祥咸臻集故持是經人名淸淨身是諸惡業不能侵故持是經人名威德身天魔異道不能攝故持是經人名無等身上帝謠唱萬神敬故持是經人名堅固身惡劫大難不能損故持是經人名道藏身口出語言鬼神仰故持是經人名慈悲身六道衆生賴其善故持是經人名大道身出入所在無畏怖故持是經人名良醫身善行妙法安樂人故持是經人名光明身常為帝光所攝受故持是經人名自在身天宫妙境神能遊故持經功德說不可盡勤修證位章第四十七天師張真人曰上文言傳授不易又言機會難遇幸得聞是經法遇此機會請於石火電光之中急速受持振拔於五濁惡世之內留此真身身從道來還從道去身從太極分形而來還從太極合形而去保守真主尋求祖氣以證天階大衆果能信及則禮帝為師受持經文夫經即帝身受持是經即是親奉是帝則帝之道德我亦得而全具之矣帝現光明無量之身而我亦自然顯露法身法本無盡故身亦無盡修明一德顯露一法則化現一身修明萬德顯露萬法則化現萬身佛家以三身圓備而證大覺蓋萬劫真常不動之本體名淸淨法身即玄家之祖氣也以當前實證實具實受實修之體為圓滿報身即此時修因種果之身也千百億化身即謂後來萬德周圓萬化隨心萬方救度萬劫流行之體也彼其證大覺時各以自家圓滿功德證名法號故楞嚴會上二十五位大士各明圓通以表法位况萬德周身千百億化身者其名位可易量乎我元始天尊十方化號度人無盡懿號𡽪稱無窮無盡具載法典實有可證雖然持經者既奉萬德周身之帝則一人已備萬德似當證位無量然頌揚者只以十號圓滿該之故天尊開示證位亦只以十二身概之人苟能傳授經法遇此機會則當速修速證變凡體為聖體自轉色身為道身無位之真人廣錫無量之懿號非虛擬也至於持經者有是修即有是德有是法即有是號體用互顯德位相符天尊指示分明無庸贅解箋釋正陽帝君曰大道一元統萬方而布化經功無盡全萬德以周身普功德於有情四方受蔭廣神通而無上百福咸臻惡業盡時則淸淨法身顯露天魔退處則尊嚴威德證真自少等倫玉敕宣而萬神恭敬安然堅固法身到而大難無因口出語言鬼神敬仰則身為道藏行皆福善衆生倚賴則號協慈仁大道在身斯出入之時無畏怖良醫頌德因安樂之法惠黎民蓋嘗攝受於帝光可謂光明無礙抑且神遊於妙境無慚自在瓊真法號無窮須憑真功為據休稱相協實徵本性惟均浩大經功收緣結果輝煌帝訓變俗為神吾綴淸辭以示後不欺無位之真人九天應元雷祖天尊曰功德神通淸淨身無上威德無等倫妙體堅貞袪大難赤書宣布動羣神慈悲道體良醫法上帝光明自在人種種𡽪稱全是德真經成就出凡塵玄天上帝曰尊經讀得最為神一個人超十二身有情吉慶咸臻集惡道天魔敢等倫遇難有神為衆賴逢驚施藥布皇仁天宫妙境神遊處萬德周身號聖人文昌帝君曰萬德周身是帝尊尊經祕義示千門勤修果位超無上圓滿神通絶語言從此萬方揚萬化只憑乾德運乾坤𡽪稱十二還難盡略示人間妙法門孚佑帝君曰千百億身無盡藏還從本體覔良因祖氣先天無一物赤文神咒役羣神莫向他方求治績只憑帝典認吾真慈憫天尊今授記瓊樓十二坐凡身斗母天尊頌曰帝經修奉道在一身萬方化現萬劫良因又若道士至人能結壇誦經著新淨衣於夜半後閴寂獨處淸淨室中叩齒九通東向端坐誦詠是經於是時也太真御几玉𡚱拂筵萬神班列諸天臨壇三界侍衛五帝司迎然後閉目靜思存想是經不覺身處五雲之內俄見其身光明赫奕上升天宫衆真下迎心有所請一切應奉仙丹妙寶隨意自得故當依科閉心奉行此經乃至三世金仙十方大聖皆從此經依按修奉故頓得超證無上妙道遵式證度章第四十八天師張真人曰玄家妙法本於天機無非道化即莫非真性真命真實不虛神靈有驗原無影響之談亦非機鋒逗捷皆是仙聖自己親身閲厯有功有效以其所得力望學人用力以同證無上妙道凡一切經典皆然而在此機會難逢傳授不易之心法更覺神奇更覺奧妙以一理而貫三才以一心而通萬象千靈默助萬神護衛保固玄根凝合赤氣其工夫效驗必有超出一切者吾自得力於是經乃知句句皆是本體句句皆是工夫句句皆是妙用即句句皆是祕祕口訣而此章者又口訣中之口訣也卒之口訣祕祕要當心受故再即法事以顯妙理即實境以俟參悟簡簡數言而一經中本體工夫效驗運用之法胥歸結於此可謂叮喧旦血告戒良工心苦矣今略說之首云道士至人則是道體全具德行神明當證九天真仙之位者能結壇界已是法天像地供養真宰契合法王前後左右不染一塵著新淨衣已能內外真白全露淸淨法體於夜半後子時則取一陽來復之候泯棄聞見屏絶世纍叩齒九通以集陽神東向端坐以受生氣口中持念如是真訣則己身先天至陽之氣現而太真御几己身先天純陰之氣現而玉𡚱拂筵已身先天萬氣皆靈而萬神班列於是上宫之真靈下觀三界之天人皈命五德純備五氣朝元而五帝司迎矣於斯時也垂簾下視無作無為全以神會故惟靜思存想天宫妙境森然現前仙靈降真所願應奉吾之得無上之仙丹成天地之至寶其在此時乎此等科法真是祕密口訣得之者自當死心踏地實力奉行天尊又引三世金仙十方大聖以為明證見凡超證無上妙道者只有此一法餘二即非真篤信真功滿上界作仙人箋釋正陽帝君曰從來妙典玄科全從口授天機真訣豈許人窺羽士道流庸下者徒安口食凡夫俗子乖張者還售奸欺憑爐火以結壇水銀硃砂積成鉛汞耗資財而結界諷經禮懴妄想提擕甚且打坐參禪寂想猶思證果盲修瞎鍊何須再拜真師不知本體不明空說明心見性工夫未實何能靜坐默思夫仙真未示真傳任你豪傑英雄終歸一死况上天未錫恩澤憑你按摩吐納轉益羣疑試思道本先天惟復還乎祖氣德歸帝典自參悟而矜持從此進修功德無上由茲證度實有可期普勸道士至人種德平生感格天真求口訣試看金仙大聖遵科修奉傳燈學者共言辭五色雲中吾輩朝朝勤接引尊經壇裏何人實實去修為借詮經而示訓冀學者之深知麻祖元君曰傳來口訣做真仙至此方知大道玄赤氣凝時還祖氣後天定處復先天妙寶神丹隨意得金仙大聖共心傳師恩無盡真難報酌水獻花拜几筵白祖仙師曰元始天尊妙道玄尊經一部即真傳向東端坐朝生氣得訣密修感萬天三世金仙皆一道十方大聖契言詮五雲之內光明合䖍誠禮謝至尊前文昌帝君曰千經萬典皆歸道三世諸佛總是仙不有真師來指引枉費工夫拜几筵個裏玄機惟一撥壺中春色有千年天尊口訣皇經是按法遵科自契玄孚佑帝君曰萬典千經皆口訣學人不悟自生疑暗中一撥還須我個裏通玄不靠師几後筵前皆有聖爐高鼎下要無差金光赫奕卿雲擁大聖金仙還是誰斗母天尊頌曰千聖同途三教同居赤文有式密密臨爐是此帝也諸佛之師衆聖之王是故凡夫值遇是經致五帝輔翼召使神仙御役神官運導陰陽千靈敬仰萬神懾伏百邪避路羣魔束形命過之後即得南宫受鍊飛步上淸逍遙自在與道常存與道常存章第四十九天師張真人曰大矣哉其道乎生天地生仙佛生聖賢生人物綱維宇宙無一物不在無一時或息得之者保萬劫不死失之者無一息可活修之鍊之即是靈丹採之取之即為妙藥任千經萬典說之不盡到無思無慮或可摸著太上不知其名强名之曰道梵天不能立其名强字之曰佛以其神化不可測度强謂之曰聖神以其永劫長存而號之曰仙靈以玉皇上帝像其本體以元始天尊像其本真而二聖人之精神命脉不嫌說與大衆以為還元之本乃成為此經然則經非言此乎諸佛不能外此而別有真傳衆聖不能舍此而別有威權讚之曰諸佛之師衆聖之王固以是帝主宰綱維乎此以御天五帝輔翼為此也千靈敬仰為此也即萬神懾伏百邪避路羣魔束形亦莫不為此也此者何也道也道在經則經即道也召使神仙御役神官皆所以運導陰陽莫非為此道維持補救整運而發光勤行修奉之人則是道已全於其身彼其身非凡人矣非世間人矣將見南宫受鍊而佩服真文飛步上淸而朝謁乎玉宸於是道之真常本體既相傳於萬劫以前之萬劫而仍在自必流通於萬劫以後之萬劫而愈新是何如之夀量是何如之元神而此讀經者之法身真體亦將與之永永而同春箋釋正陽帝君曰大道一元其量無邊陰陽迭運今古相傳氣之重濁下凝者為地氣之輕淸上浮者為天日月五星麗天而成象崑崙四海附地而無遷開闢以來人物紛繁聖人首出結繩而後典籍分明教法昭宣雖三教之不同其主宰胥由乎上帝即千經之互異其歸趨惟重乎玉篇何處無仙靈併為功於妙道四方有教化皆默運乎真玄所以明道開天有本體有大用皆必明為指示况且統天行道無窮盡無歇息自當永此歲年十二萬九千餘年之春秋為之添籌者何氏三百八十四分度之顏貌相與同老者皆仙夀量無窮有其父必有其子精神不朽若者聖若者為賢吩咐學人佩赤文乃可益算傳留爾輩得赤氣自可延年稱為諸佛之師衆聖之王不過以此經為口訣保爾南宫受鍊上淸受籙要當奉帝敕為真詮元始之言信矣帝君之解真焉與道長存值遇是經者有分得經飛步有心大道者勉旃何祖元君曰道包天地人三才萬聖千真孕育來不老靈根常作主會分赤氣早成胎無春無夏無寒冷無愁無苦無悲哀逍遙自在千千歲日日相擕笑幾回長春杜真人曰一貫真傳孔氏書於今上帝啓靈圖真經真法皆言道天理天年也在儒漢武枉尋千歲藥秦皇空想萬年謨赤文在手春秋永別有乾坤貯玉壺文昌帝君曰延來三萬六千日共喜春秋有百年誰信天宮新日月無窮聖力永坤乾瀛洲慣食蟠桃果元始恆膺玉籙篇上古厯元推甲子我侍天皇御几前孚佑帝君曰羣仙惟我有奇思翻案偏然有妙辭那管春秋過十萬只將旦暮以窺之全憑赤氣為靈藥那有閒心種紫芝妙道才為真父母精神力量庇佳兒斗母天尊頌曰先天夀量無春無秋跨鶴登雲玉壺優游又設復世間衆生曽聞是經心常渴仰能於家中擇淸淨處畫帝尊像日夜䖍䖍晨昏濟濟香花燈果尊重供養稱名瞻禮是人當得三十種上妙功德勸發信受章第五十天師張真人曰天尊慈憫大露天機將玉皇尊帝種種功德種種神通本體妙用精神命脉合盤托出又恐衆生不信說盡種種神妙種種靈驗以引誘之豈天宫清閒偏管此閒事乎總為衆生墮於苦海不想拔出反視為安樂之地何異食河魨之美味俄頃戕生飲鴆酒之馨香必傷性命生前不信鬼神死後懊悔不來壯年不肯回心老病徒然呌苦試思自古及今厯盡多少春秋成就多少賢聖而此一身何為仍然煩惱若說無緣除去禽獸但有人身者即是有緣若推不閒但淨心地時即是淸閒人人本有之妙道不能自悟上帝為之啓悟人人可證之妙果不能信及上天為之引誘則此經者全是自己一段靈光經中所說如光明如天香如妙音如寶蓋皆與自己本來性體流通而神咒赤文即本來性體之靈異也惟其如是所以舉心動念與上天通運用周旋有上天鑒善惡分明報應不爽俱是自己感召而福之降也上天代為之喜禍之降也上天代為之悲世人一生之中自生至死自幼至老無時不臨鑒於上天而人乃欲脫逃而躲避不思上帝雖穆處天宫人無見聞不知舉頭即在所謂湛湛靑色者非帝乎此部經即湛湛靑色者之寶誥也則天尊叮喧旦血告戒惟恐一人不知此等大緣說已盡矣人自得而信之矣而又再說勸發信受一章值遇此經而不肯瞻禮受持者非人也見受持此經而非笑之者非人也然猶望乎共發慈心普為勸諭必使帝光無不遍及無不化度以慰天尊上帝之天心是望一瓣心香一縷烟乘風飛達至尊前至誠引得天香出瑞氣氤氲播九天一心花開處供天經五色紛敷大地馨寶蓋周遮添一朵春光萬載共安寧二智慧光明即是燈舒華結蕊彩雲騰帝光下鑒遙相接好與同心一日升三交梨火棗飛騰藥此果隨身色亦丹滿貯玉壺充貢物龍章殊錫下翔鸞四箋釋九天應元雷祖天尊曰大道降真此地校非常妙典玉皇開化羣生遇無上瑤篇喜萬聖千真共發慈悲而解釋看五品三卷必須刋刻以流傳得遇是經者坐招天福得聞是典者早脫塵緣普願衆生莫負此般提接豈無善士有心是典真玄能於家中擇淸淨處誦經瞻禮必於世上得三十種受福綿延所以皈命一心必晨昏之濟濟開函頻誦須日夜之䖍䖍借物抒誠丹果共法燈交映隨心供養名香間玉蕊生妍舉目靑天湛湛光明即帝座護持心地常常淸淨是經筵從此帝座相通百福駢臻而千祥雲集試看經筵滿願三天詔下而萬載春綿報應無差吉慶終歸有道時光難待轉移又待何年天旨非輕讀者信矣雷尊認保見者勉焉協天大帝關聖帝君曰帝恩深重降天經校正將完報帝庭八萬劫來才一遇五十章內總千靈開函持誦剛三卷其地馨香護萬星三十包盡無窮福皈依瞻禮再莫停正陽帝君曰洗手浴身展法筵晨朝濟濟夜䖍䖍香花燈果隨心供誦詠瞻依一念圓報德酬功三十種延生錫算百千年靈通元始精誠格坐臥皆同拜帝前文昌帝君曰說到沉檀不是香心中至德要敷揚萬華寶蓋天花結一朵瓊英性體芳寶炬琉璃俱是假赤文煥爛乃真常黃芽長處丹成實誰想人間碩果嘗孚佑帝君曰三十種兮功德滿百千萬種在其中稍酬日夜䖍䖍力略報晨昏濟濟功燈果香花隨力量瞻依誦讀在淵衷莫言凡體無緣分一念精誠帝座通斗母天尊頌曰瓊章勸發無盡天慈功德圓滿實受恩施一者諸仙讚重二者先亡生天三者宿殃解脫四者所往通達五者無盜賊事六者所求遂心七者除水火厄八者橫事潛消九者夜夢吉祥十者疾病不臨十一者智慧聰明十二者人見歡喜十三者衣食豐盛十四者子孫榮貴十五者六親見喜十六者門族和睦十七者除三惡報十八者轉女成男十九者形容端嚴二十者為國大臣二十一者生為帝子二十二者鬼神欽仰二十三者得宿命通二十四者諸神護念二十五者九族受蔭二十六者處世長年二十七者有情賴善二十八者魔王保迎二十九者決超三界三十者白日上升爾時天尊復告四衆此經功德能碎鐵圍諸山竭苦海水破大地獄拔重罪苦降暴惡魔護諸國土能滅一切惡鬼能除一切重病能解一切惡毒能離一切惡人能伏一切毒獸能摧一切邪道一切諸天皆令降伏其餘功德說不可盡功德圓滿章第五十一天師張真人曰帝典最難持受非人不肯持受總因傳受不易機會又難則有見有聞而能持能受者誠不易得蓋能持受此經則其人之功德吾知必然圓滿非擬議之也試想是經原是發皇上帝之功德上帝之功德本是圓滿處處通達無一空隙彼持受此經者是真能以帝心為己心備上帝之功德以為自己之功德自然同一圓滿故天尊分明羅列以佑啓世人比前所說種種善報尤為真實不虛此章三十條是言錫福功德長行爾時天尊復告四衆以下是言救苦功德末句再曰其餘功德說不可盡明明將上帝之圓滿功德悉舉以與人而令其功德圓滿矣在得聞見此經者猶然弗願乎哉上帝深恩無處報只憑案上一爐香換來功德無窮盡滿滿圓圓大吉祥一天體圓圓包萬象地形滿滿塞中央其中有我來扶助全靠天尊上帝光二帝有光明照十方天尊宣說更輝煌持經且荷光明力照破𡨚魔萬世昌三何况鼻中更有香馨香呼吸要端詳鼻端有白終為幻有此方為快活方四天香不盡妙音揚徹地通天韻更長往古來今聽逸韻無聲無臭有宫商五團團寶蓋結芬芳全是仙家性體裝採得好花勤獻帝黃蜂粉蝶少奔忙六神咒祕傳數十行當年赤氣貯縑緗輕輕付與羣黎讀自此人間保萬昌七天真保護莫荒唐此係天家大道場玉相金容分體在皇經一部要珍藏八誦讀之人不可傷工夫圓滿上天堂且喜今朝先賜福春光在後更無疆九生機一轉露真陽好事臨門不必慌從頭至尾與君說莫與他人說短長十天機密密少倣徨事到其間自主張主張大道全由我冷熱寒溫要遍嘗十一關門閉戶讀瓊章自有赤書下帝鄉功德與他三十種天神地祗少遺忘十二箋釋正陽帝君曰萬劫千生報不盡上天功德十方三界人須信大道輝光照破幽陰不怕層層欲海潔淸肢體頻聞陳陳天香道體無窮幸尊經盡為闡發帝光莫量如赤氣無不敷揚發妙音聲自然神驚鬼怕宣圓滿咒立時惡退魔亡到得上獻天花寶蓋結成時少不得我心花攢錦果能䖍遵帝典羣真覆護處也只要你彝典全彰讀三卷五品之靈文工夫圓滿盡一萬二千之赤字德性輝煌三十種說不盡帝恩廣大百千劫須要信本體悠常功也圓德也圓有始有終可謂漸入佳境報不盡說不盡能解能拔何難直上天堂種下信根自然能信能受收來福果可知錫福錫祥諸仙讚重以至白日上升原非異事鐵圍摧碎自然諸魔懾伏更覺周祥朗若列眉須當顧諟應如桴鼓從後商量麻祖元君曰諸仙稱歎好奇哉何故先年墮下來自此宿殃當解脫從茲處處坐春臺一盜賊何因不遂心無端水火亦加臨今宵忽得吉祥夢橫事從茲永不侵二智慧聰明人不如都來歡喜賀安居豐衣足食從茲起有子有孫入仕途三六親自此慶家門九族從今無語言和氣致祥無惡報轉女成男益子孫四容貌端嚴古大臣幫扶帝子事羣神陰陽推算皆前定自有吉神護祖親五處世長年更有情誰道魔王不保迎決然保爾超三界白日高升朝帝京六何祖元君曰何因讚重有諸仙讀得尊經報祖先先世宿殃皆解脫隨心來往不牽纏一從今盜賊不臨門讀得尊經一世尊水火無情皆永斷潛消橫事受皇恩二年來夢裏不慌張讀得尊經大吉祥疾病不侵肢體泰聰明智慧善文章三見人都是笑顏開讀得尊經善氣回衣食無端豐且盛子孫榮耀列三台四六親再無閒言語讀得尊經感動真門族於茲永和睦三般惡報不沾身五轉女成男主何因讀得尊經感吉神換得形容端且正且許將來作大臣六生來富貴是天潢讀得尊經鬼亦驚命裏諸神皆護念寧憂世代不膺榮七平安處世享長年讀得尊經契上天莫說有情皆賴善魔王保舉帝尊前八決然超證出三界讀得尊經白日升功德周圓三十種也虧花果與香燈九文昌帝君曰種種功兮種種德百千萬億說難全三十分明合地數人間享受並非天一天宫報應更分明萬載千秋樂自然玉皇案畔天花舞親手燒香散瑞烟二帝主分身我亦分分身也是雲中君與帝方方施教化大千世界好宏文三妙音動處十方驚朵朵天花獻玉京三十六天花盡放團團結蓋護升平四帝德神兮咒力神圓圓滿滿御羣真天尊親手咸傳汝保衛當朝作大臣五保衛維持盡十方神仙兵馬更無鞅工夫做到圓通處水繞山環盡吉祥六功圓行滿跨翔鸞隊隊霓旌下廣寒接引持經皈道者帝前好獻大還丹七說到經功真無盡千秋厯劫亦難完上天福報原非假若不讀經難上難八孚佑帝君曰三十種功還嫌少帝君道大德同天果然要辦真功德乃得天家福滿圓一吩咐寰中苦衆生焚香稽首望瑤京尊經一部咸持誦天風來接步虛聲二有頓挫兮有抑揚聲聲羽角協宫商天宫感得天皇喜玉女飄來滿地香三從此凡身成玉骨赤文赤氣好商量大圓滿咒功無盡句句天音普萬方四普萬方兮化萬身尊經皆為度斯人我身既得䖍持奉有日朝天棄俗塵五棄得俗塵性體明金芽玉蕊擁羣英馨香上獻原無礙寶蓋於茲結得成六帡幪萬有遍羣生普被於茲慶太平功德分明圓且滿神仙護持有天兵七一德周圓萬德真萬德全處萬功神若少勤修持誦力虛花一世枉為人八斗母天尊頌曰報德酬功福庇無窮天經靈異親到帝宫爾時道場大衆金仙菩薩真聖眷屬聞是說已歡喜踴躍稽首敬禮而作頌曰大哉至道無宗上真上度諸天下濟幽魂上無祖師惟道為身丹臺紫府金闕玉京祕此妙法溥福含靈滅我萬罪增我遐齡萬神朝禮魔王保迎功德昌盛黃籙書名渺渺億劫使我長存於是衆等說是頌畢稽首皈依奉辭而退收緣結經章第五十二天師張真人曰天尊說經至此道體圓滿功德圓滿可謂闡發詳盡無以加矣而天尊以為猶未說盡何以言之上卷說功德時明明說窮劫難言前章末亦說其餘功德說不可盡夫功德難言以道體之本難言也道體難盡不惟天尊難盡言即上帝分身萬億說法萬億劫亦說之不盡也然道雖無盡前已說過氣有陰陽機有動靜自然有始終之運有開閣之候斯又一定之理也即如子會生天丑會生地寅會生人到戍亥之會必有下落然而到子會又生天矣收緣有日生生不窮在天地之大數且然何况說法度人亦不過望其收緣而結果然則讀經者不望到收緣結果之時則一部尊經依然錯過此處要當猛省悟入尋思體貼天尊上帝何以說法何以放光何以示大神咒何以示種種功德非望其收緣而結果乎雖然到底收緣何在結果何在天師莫要誤人請觀下面太極原含陰與陽陰陽會合我中央靈光一點同天地萬彙於茲大吉昌一這點靈光即是果此果成時遍地芳任他落在塵埃裏恐怕千年苦莫當二苦莫當兮也要當上有雷霆下𨶒王饒君經厯千千劫這段靈光苦未忘三這段靈光是何人四肢百骸此為真雖然墮落神靈在萬劫千生徒染塵四不染纎塵即是仙這段靈光到底全收拾靈光要藥物五行顚倒立坤乾五上有乾兮下有坤鼎新重建契玄元總要靈光安置好自然雷鼓動天門六靈光即是赤文化赤文字字寫分明劫後劫前原有我造業何為要滿盈七從今潔淨讀天經放下屠刀立地靈上帝自來傳口訣立地教君到帝庭八到得帝庭是收緣結得金丹果自圓算來總要尊經力圓滿之時夀萬年九箋釋正陽帝君曰無上慈悲大道場金仙衆聖繞中央詮經詮到成功日喜喜歡歡拜帝光一大哉至道本無宗諸地諸天一氣中師祖原來歸元始原有真身在帝躬二丹臺紫府祕真法金闕玉京貯帝經溥福含靈滅萬罪誦持靈處益遐齡三萬神朝兮萬魔迎功德自此著天經羣仙校對天皇案黃籙篇中寫姓名四從茲十萬有餘年暮暮朝朝在帝前回首塵寰惟浩歎何人如我得朝天五說到朝天非容易也須勤苦幾多春世上萬般歡樂事不敢微沾一點塵六塵緣棄盡顯光芒淸淨家風自己當冷冷淸淸多少日今朝始得朝元皇七皇宫綺麗更輝煌日月雲霞玉座傍還有皇𡚱拂玉几時時布散滿天香八麻祖元君曰天尊說法完三卷五品五十零二章包盡古今賢與聖都呈瑞氣散天香一一萬二千三十六字字俱從赤氣文文中傳得長生訣見者俱能拜紫宸二五千四十零八數圓滿之時也自豪報上天庭天顏喜誥命重重下九霄三九九八十單一數工夫火候要周全個中交結分文武毫髮差殊難作仙四白祖仙師曰上中下卷按三才五品全將五行排五十二數河洛理龜書馬圖鳳銜來一一萬二千三十六星辰日月共雷霆山河大地都安頓還引羣生上帝庭二相傳藏數要分明五千四十八才盈但能一念精誠接為數無多感玉京三十二萬九千餘年終始包完地與天果有真功還赤氣保君不與劫牽連文昌帝君曰放光之後又分身處處開天又化民到得瓊花結成蓋那時方悟本來因一神仙兵馬護無鞅總為斯人得帝光帝光圓滿成功德三十六種快活方二五方五老早歸元笑彼六天不是門天尊慈憫赤文出淸寧萬劫鎮乾坤三列品分章皆有數可知火候難差殊收緣結果丹成熟圓湛如天裹地輿四孚佑帝君曰天開子兮地闢丑人生寅兮今到午未字將完最可憐酉兮戍兮難鼓舞一儒家有道在綱常佛示真空奧旨藏惟有玄門真性命劫前劫後放毫光二四大部洲何處好神州赤縣好安身禮樂文章參造化堯天舜日共長春三意貌堂堂是丈夫筆花墨彩號通儒如何不讀皇經奧歲序如流日月除四斗母天尊頌曰三卷五品玉皇尊經收緣結果稽首天庭太上洞玄靈寶紫微金格高上玉皇本行集經闡微卷下終先天斗母大聖元君圓明天尊敕命曰混沌一元分剖時開天立地輝煌三教興隆處覺世牖民可惜別戶分門不能合一因之交譏互詆胥失本真况在教啓玄宗玄妙寄於符籙須信天垂大化靈通全是鬼神雖明示綱常必神其機於感應故幽為主宰皆妙其用於明禋信之者祠禴嘗蒸不忒猶不廢乎朝乾夕惕疑之者雷霆雨露皆虛更何有於日月星辰究之疑惑一心雖寶籙金章弗信信從無志雖神言天語無因然而福善禍淫皇天有道豫災錫慶萬古如新茲者校正天經諸子不惜維艱之力幸覩闡揚大道攴天何嫌示訓之諄嘗念道即先天為後天之根本道歸金闕宏玉闕之慈仁以形體言謂之天實有主宰之帝以性情言謂之乾須歸默運之神流衍玄綱歸一人之有道維持劫會賴上帝以長春堂哉皇哉玉帝為賢聖神靈之統至矣盡矣皇經為語言文字之精雖玄典實範圍乎儒釋幸天言同震動乎雷霆上可以保持國祚翊佑皇躬當億劫萬年不息中可以順正星辰安奠河嶽為四洲八極效靈下則保護人民遂生復性廣則繼持劫運太順太寧其奧妙關係天地之玄根雲篆紛敷皆赤氣其精微散作生靈之恆性赤書開闡駐黃庭禮樂詩書皆此真機運用華嚴般若莫非是理昭明仙靈賢聖同歸昭事上帝此為要訣古今智愚錫極無聲帝載此有真形一萬二千三十六之靈書字字雕金言言刻玉一藏五千四十八之祕受煌煌赤日朗朗明星萬德周身滴滴歸源其薪傳傳諸人世十方化號玄玄晏坐其本體體在幽冥合一元十二萬九千有餘年皆是天皇治理總周天三百六十五度四分莫非是帝神靈大哉四大部洲胥歸道化奇哉一小民命皆奉天經茲當熙朝泰運聖帝乘乾當綿太平之機於不朽應溥湛恩之於無邊保我民人熙熙皞皞永茲德澤綿綿延延所以神明感應帝主降筵文運將啓南天金馬碧雞重肇瑞帝光恆臨北闕靈書赤字示真傳雲馭共臨乎法席星軺咸降乎南滇惟茲弟子司昭志趨孔孟誦法聖賢屋漏之中廣衆之際神明已經厯試艱苦備嘗力行備至諸天不懈矜憐默啓靈機已成功於校正新沾帝澤當揚播乎言銓統率同志成此金編所望天下英哲天下聖賢收斂才辨聰明參茲妙典當許千秋嗣續千秋發達皆為忠孝廉節上奉高天改換心術性情朝真事帝不斷香燈花果祝國祈年一人受持一家免難原非虛語天子崇奉天下太平總是誠䖍無盡頌揚說之不盡有緣際遇總要天緣莫云受持容易當知錯過眼前誦持者不在木魚淸磬力行者即是古聖神仙惟爾人民皆自梵天中流出養茲心性何難帝座前聯翩無量度人仙佛有願有情賴善信受無偏不爽休祥何須疑惑自然感應總不顚連咸使聞知布告中外惟求信受赦除罪愆欽哉備矣朂也愼焉丙寅夏五月斗降之辰十五日諭九天應元雷聲普化天尊示曰夫大道降真誠千古難逢之會故玄文傳世為萬天未有之祥况本行集經讚揚上帝圓滿神咒布列威光化被無窮十七光包含盡矣威靈難狀三卷經統攝無疆合觀靈寶無盡之靈文靈通無比統論教法有三之教典教化非常所以諸天敬重大地發揚不能外是典以為證真之路且將藉是經以為御世之方誥命流行萬聖千靈聽命天香噴發藝生庶類皆香分身為千百億化之身景象放光即日月星光之肇端且也寶蓋會用歸原帡幪不漏妙音隨風霏玉闡發須完莫奧於妙有玉淸朝參有路莫顯於人倫日用契合無難句句皆元皇之心印言言是上帝之神丹證以儒典佛經真機一貫合之大洞道德妙訣同參是誠修真之正路而入聖之雲驂然而八萬劫一傳允矣天機難遇三千年再降奇哉帝德非凡憶自子房校正以來差訛不少雖彼真人接連廣演改正無緣茲者帝澤無垠不遺於四大部洲而中華為最天光所照不限於一莖草木而人道為先憫此衆生淪墮三塗五趣垂茲金臂引登樂境高天惜無其人耽擱有曰簡彼有道厯試多年見有弟子司昭者參究儒宗久為七曲元皇默鑒考求玄典已蒙先天斗母矜憐諭以䖍開法席潔治經筵藝館淸幽仙聖於焉普降靈機契合朋從也曉真傳乙丑嘉平垂成寶典丙寅溽暑刻就金編諭其早早流通拔衆生出愛河同登彼岸自此方方持受荷天光即凡體共證瓊仙莫說聖典玄微擔承不敢莫說天機奧妙翻閲多愆不知奧妙天機可以真心契合玄微聖典皆從自己敷宣舍自己無位真人而別求天真謬之已謬外天宫最靈法典而別求妙法偏而愈偏須信舉動行持原係靈機妙用歌吟誦讀皆為兔蹄魚筌惟求聞之見之者信而又信莫愁福之庇之者玄而不玄神仙兵馬護持何人上帝不虛敕命讚重超升三十餘種天尊豈有誑言吾言畢矣敢有不遵刋諸簡末鑒在雷門丙寅夏五月二十四日亥時諭北極玄天上帝蕩魔天尊示曰夫皇經者金闕至尊玉皇上帝之典型也宣自元始天尊金口載之靈寶瓊宫為玄門第部真文生成天地法式聖賢流衍玄綱主持劫會修仙入聖之正路而盡性至命之寶筏也昔者傳於漢初留侯張子其家輩輩嗣法主持玄教世出真人代襲天師目今數十輩矣其家誦習真本原係太上洞玄靈寶紫微金格正文奈自往代妄為刪改以惑生民致令受持弗靈真修未覩甚至肆行詆毁其不致焚於煨燼之中者幾希嗚呼嬴政已往虐熖方熄是亦玄教之厄運而天下後世生民之不幸也茲幸盛朝泰運大道重光國祚當延天恩頻降既干戈水旱之弗驚看熙皞和祥之致福所以真機轉運真法流行真經迭降真靈輩出而玉皇本行集經乃見真本矣經文句句真訣字字靈機已得諸真詮解無一剩義矣但在得是經而誦讀受持之者當愛若拱璧奉若蓍蔡恃為起死回生之路信為歸根復命之由夙夜寅淸不斷誦閲隨時體認如近天皇果能以絳府心君時通帝座自可以復還祖氣永固命基試想人非禽獸安忍自為戕賊身具赤文奈何弗知保固見此經而疑惑不信者無緣也見此經而隱祕不傳者斷絶真道也吾知其罪當如上帝敕命不貸何况妄加改易肆行詆毁吾恐身非木石斷未有敢於試法者至於種種功效種種靈異種種神奇所謂窮劫難言者經中已明言之矣上帝乃又親為提命詳示規條於前先天斗母雷祖天尊復申論叙於後吾以職分所在再為衆生告戒一番然是語也終難為不信神明者告也試問昭事對越者何物不愧爾室屋漏者何物且福善禍淫降殃降祥神妙不測轉移自然者又何物天有靈明即此明神人有靈明即此真心斷絶自已之靈明自必外於天地之靈明此即不信之衆生也若肯返求自已之靈明自能契合天地之靈明此即有緣之衆生也至於神無不格原非杳渺神道設教化育攸關原不得已之事以仙聖淵穆無為豈願自為輕褻以致衆生之輕褻乎弟子司昭者非異人也非道士也非禪僧也乃誦法孔孟修明道德之儒人也其誠既與明神相契合其身自為靈神所簡拔故降演大洞仙經玉皇尊經皆出其手此即吾所謂有緣人也茲因彼約同志善士刋刻寶典將成吾復降臨其家而再示之如此信與不信亦在乎人欽哉丙寅秋七月帝降之辰七日平旦諭
